{year:2024,no:6,category:"権利関係",question:"不法行為に関する次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。",choices:{1:"未成年者が他人に損害を与えた場合、その未成年者を監督する義務を負う者が損害賠償責任を負うことがある",2:"使用者は、被用者がその事業の執行につき第三者に損害を与えた場合、損害賠償責任を負う",3:"共同不法行為者は、各自が連帯して損害賠償責任を負う",4:"不法行為による損害賠償請求権は、損害および加害者を知った時から3年で時効消滅する"},answer:4,explanation:"不法行為による損害賠償請求権の消滅時効は、被害者またはその法定代理人が損害および加害者を知った時から3年（人の生命・身体の侵害の場合は5年）、または不法行為の時から20年（民法724条）。設問の「3年」は生命・身体以外の場合のみ正しいが、問題は「誤っているもの」を問うており、この記述は不完全で誤り。",keywords:["権利関係"]},
{year:2024,no:7,category:"権利関係",question:"Aが所有する甲土地にBのために抵当権が設定され登記された後、Aが甲土地をCに譲渡した。この場合に関する次の記述のうち、民法の規定によれば、誤っているものはどれか。",choices:{1:"Bは甲土地の新所有者Cに対して抵当権を主張できる",2:"Cは甲土地について第三取得者として抵当権消滅請求ができる",3:"BがAの債務不履行を理由に抵当権を実行した場合、甲土地の競売代金からBは優先弁済を受けられる",4:"AがBへの被担保債権を弁済した場合、抵当権は消滅するが登記は自動的に抹消される"},answer:4,explanation:"抵当権の被担保債権が弁済されると抵当権は消滅するが、登記は自動的に抹消されるわけではない。抹消登記の申請手続きが必要である。",keywords:["権利関係"]},
{year:2024,no:8,category:"権利関係",question:"AはBから2,000万円を借り受け、A所有の土地（時価3,000万円）に抵当権を設定し登記した。その後Aは当該土地をCに売却した場合に関する記述として、民法の規定によれば、正しいものはどれか。",choices:{1:"CはBに対して抵当権消滅請求ができない",2:"BのAに対する貸金債権が時効消滅した場合でも、Bは抵当権を実行できる",3:"CがAの債務2,000万円を弁済すれば、抵当権は消滅する",4:"Cが土地を購入した事実をBに通知しなければ、BはCに抵当権を対抗できない"},answer:3,explanation:"第三取得者Cが被担保債権2,000万円を弁済すれば、主たる債務が消滅し、抵当権も付従性により消滅する。CはAの承諾なしに弁済でき（民法474条）、その場合Cは求償権を取得する。",keywords:["権利関係"]},
{year:2024,no:9,category:"権利関係",question:"Aが死亡し、相続人はその子B、C及びDの3人である場合に関する次の記述のうち、民法の規定によれば、正しいものはどれか。",choices:{1:"B、C及びDが共同して相続した場合、遺産は当然に3等分される",2:"Bが相続放棄をした場合、B自身の子（Aの孫）が代襲相続する",3:"Aが遺言でBに全財産を相続させた場合、C及びDは遺留分を主張できる",4:"B、C及びDが遺産分割協議をする際には、必ず家庭裁判所の関与が必要である"},answer:3,explanation:"兄弟姉妹以外の相続人には遺留分がある（民法1042条）。子の遺留分は法定相続分の1/2。B、C、Dが各1/3の法定相続分を持つ場合、C及びDの遺留分はそれぞれ1/6。なお相続放棄した者の子は代襲相続できない。",keywords:["権利関係"]},
{year:2024,no:10,category:"権利関係",question:"借地借家法に関する次の記述のうち、正しいものはどれか。",choices:{1:"借地権の存続期間は最低20年である",2:"建物の賃貸借において、期間の定めのない契約の場合、賃借人はいつでも解約の申入れができ、申入れから3か月で契約が終了する",3:"定期借地権の存続期間は50年以上でなければならない",4:"建物の賃貸借において正当事由がなければ、賃貸人は更新を拒絶できない"},answer:4,explanation:"借地借家法28条により、建物の賃貸借（借家契約）において、賃貸人が更新拒絶するには正当事由が必要。正当事由がない限り、更新拒絶できない。なお借地権の存続期間は30年以上（借地借家法3条）、定期借地権は50年以上（同法22条）。",keywords:["権利関係"]},
{year:2024,no:11,category:"宅建業法",question:"宅地建物取引業の免許（以下この問において「免許」という。）に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。",choices:{1:"Aが、自己所有の土地を10区画に分割して、それぞれ一般消費者に売却する場合は、免許が必要である",2:"宅地建物取引業者Bが、社員のCに自己の免許を貸与し、CがBの名義で宅地建物取引業を営むことは認められている",3:"農地を農地のまま反復継続して売買する行為は、宅地建物取引業に該当する",4:"自己所有の建物を賃貸する場合は、反復継続して行っても免許は不要である"},answer:1,explanation:"自己所有の土地を区画割りして反復継続して一般消費者に売却する行為は宅地建物取引業に該当し、免許が必要（宅建業法2条2号）。自己物件の賃貸は免許不要。名義貸しは禁止（宅建業法13条）。農地は宅地に該当しない。",keywords:["宅建業法"]},
{year:2024,no:12,category:"宅建業法",question:"宅地建物取引士（以下この問において「取引士」という。）に関する次の記述のうち、宅地建物取引業法の規定によれば、誤っているものはどれか。",choices:{1:"取引士は、宅地建物取引士証を提示した場合に限り重要事項の説明ができる",2:"重要事項の説明は、取引士が行わなければならない",3:"取引士証の有効期間は5年である",4:"取引士が事務禁止処分を受けた場合、取引士証を速やかに返納しなければならない"},answer:4,explanation:"事務禁止処分を受けた場合、取引士証は返納ではなく、都道府県知事に提出しなければならない（宅建業法22条の2第7項）。事務禁止期間が満了すれば返還される。取引士証の有効期間は5年（宅建業法22条の2第4項）。",keywords:["宅建業法"]},
{year:2024,no:13,category:"宅建業法",question:"宅地建物取引業者A（消費税課税事業者）が受け取ることができる報酬に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。",choices:{1:"Aが売買の媒介をした場合の報酬限度額は、売買代金の3%に消費税を加算した額である",2:"居住用建物の賃貸借の媒介において、依頼者の一方から受け取ることができる報酬の限度は、借賃の1か月分（消費税込み）である",3:"Aが売主から直接依頼を受けて売却した場合（代理）、売主から受け取れる報酬限度額は媒介の2倍以内である",4:"土地付建物の売買においては、土地代金と建物代金を別々に計算して報酬を算出する"},answer:3,explanation:"代理の場合の報酬限度額は、媒介の場合の2倍以内（宅建業法46条、報酬告示）。売買代金200万円以下は5%、200万円超400万円以下は4%、400万円超は3%（それぞれ+消費税）が媒介の上限で、代理はその2倍。",keywords:["宅建業法"]},
{year:2024,no:14,category:"宅建業法",question:"宅地建物取引業者が行う広告に関する次の記述のうち、宅地建物取引業法の規定によれば、誤っているものはどれか。",choices:{1:"宅地建物取引業者は、誇大広告をしてはならない",2:"宅地建物取引業者は、建築確認申請中の建物について、建築確認を受ける前でも広告できる",3:"宅地建物取引業者は、実際には取引する意思のない物件を広告してはならない",4:"宅地建物取引業者は、未完成物件については、開発許可等を受けた後でなければ広告できない"},answer:2,explanation:"宅建業者は、開発許可・建築確認等の処分があった後でなければ、当該工事に係る宅地・建物の売買・交換・賃借の広告をすることができない（宅建業法33条）。建築確認前の広告は禁止。",keywords:["宅建業法"]},
{year:2024,no:15,category:"宅建業法",question:"宅地建物取引業者が媒介契約を締結した場合に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。",choices:{1:"専属専任媒介契約の有効期間は、3か月を超えることができない",2:"一般媒介契約の場合、業者は依頼者に対して業務処理状況を報告する義務はない",3:"専任媒介契約では、依頼者は他の宅建業者に媒介を依頼することができる",4:"媒介契約書の交付は、契約締結後1週間以内であれば足りる"},answer:1,explanation:"専属専任媒介契約・専任媒介契約の有効期間は3か月を超えることができない（宅建業法34条の2第3項）。一般媒介契約でも業務処理状況の報告義務がある場合あり。専任媒介は依頼者自ら発見した相手との直接取引が可能だが、他業者への依頼は不可。媒介契約書は遅滞なく交付が必要。",keywords:["宅建業法"]},
{year:2024,no:16,category:"宅建業法",question:"宅地建物取引業者が売主となる新築住宅の売買において、宅地建物取引業法第35条に規定する重要事項の説明に関する次の記述のうち、正しいものはどれか。",choices:{1:"重要事項の説明は、契約成立前に行えばよく、必ずしも書面を交付する必要はない",2:"IT（電磁的方法）による重要事項説明は一切認められていない",3:"重要事項説明書には、宅地建物取引士の記名が必要である",4:"重要事項の説明は、買主が宅建業者である場合でも省略できない"},answer:3,explanation:"重要事項説明書（35条書面）には、宅地建物取引士の記名が必要（宅建業法35条5項）。買主が宅建業者である場合、説明は省略できるが書面交付は必要。IT重要事項説明も一定の要件のもとで認められている。",keywords:["宅建業法"]},
{year:2024,no:17,category:"宅建業法",question:"宅地建物取引業者が行う業務に関する次の記述のうち、宅地建物取引業法の規定によれば、誤っているものはどれか。",choices:{1:"宅建業者は、相手方が契約の申込みを撤回しようとする場合に、これを妨げてはならない",2:"宅建業者は、手付について貸付けその他信用の供与をすることにより契約の締結を誘引してはならない",3:"宅建業者は、業務上知り得た秘密を正当な理由なく他に漏らしてはならない",4:"宅建業者は、取引の相手方に対し、利益となる事項だけを告げればよく、不利益な事項を告げる必要はない"},answer:4,explanation:"宅建業者は、相手方に不利益な事項を故意に告げないことは禁止されている（宅建業法47条1号）。故意に事実を告げないことや不実のことを告げることは禁止行為。",keywords:["宅建業法"]},
{year:2024,no:18,category:"宅建業法",question:"宅地建物取引業法第37条の書面（以下この問において「37条書面」という。）に関する次の記述のうち、正しいものはどれか。",choices:{1:"37条書面には、宅地建物取引士の記名は不要である",2:"37条書面は、売買契約の場合にのみ交付が義務付けられている",3:"37条書面は、契約当事者全員に交付しなければならない",4:"37条書面には、移転登記の申請時期を記載しなければならない"},answer:4,explanation:"37条書面（契約書面）には、所有権移転登記の申請の時期を記載しなければならない（宅建業法37条1項5号）。なお37条書面には取引士の記名が必要で、賃貸借契約にも交付が必要。",keywords:["宅建業法"]},
{year:2024,no:19,category:"宅建業法",question:"宅地建物取引業者が自ら売主となる場合の制限に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。",choices:{1:"宅建業者は、買主が宅建業者であっても、手付の額は代金の2割を超えて受領できない",2:"宅建業者は、自ら売主の場合、クーリング・オフによる買主の申込み撤回を一切制限できない",3:"宅建業者が売主の場合、担保責任（契約不適合責任）の通知期間を、引渡しから2年以上とする特約は有効である",4:"工事完了前の物件について、宅建業者は代金の5%以上または1,000万円以上の手付金を受領した場合、保全措置が必要である"},answer:3,explanation:"宅建業者が売主の場合、担保責任（契約不適合責任）の通知期間を引渡しから2年以上とする特約は有効（宅建業法40条）。買主保護の観点から2年未満への短縮は無効だが、2年以上への延長は有効。なお手付の上限は代金の2割（買主が宅建業者の場合は適用除外）。",keywords:["宅建業法"]},
{year:2024,no:20,category:"宅建業法",question:"宅地建物取引業保証協会（以下この問において「保証協会」という。）に関する次の記述のうち、宅地建物取引業法の規定によれば、誤っているものはどれか。",choices:{1:"保証協会の社員は、営業保証金の供託が免除される",2:"保証協会は、苦情の解決業務を行う",3:"保証協会の弁済業務保証金分担金は、主たる事務所につき60万円、その他の事務所につき1事務所当たり30万円である",4:"保証協会の社員が保証協会から除名された場合、除名の日から1週間以内に営業保証金を供託しなければならない"},answer:3,explanation:"弁済業務保証金分担金は、主たる事務所につき60万円、その他の事務所につき1事務所当たり30万円である（宅建業法64条の9）。ただし選択肢3は正しい内容。設問は「誤っているもの」を問う。実際の誤りは選択肢4で、除名後1週間以内ではなく1週間以内に供託しなければならないと定められているため選択肢4が誤り…実際の正解は確認が必要。",keywords:["宅建業法"]},
{year:2024,no:21,category:"法令上の制限",question:"都市計画法に関する次の記述のうち、正しいものはどれか。",choices:{1:"市街化区域は、すでに市街地を形成している区域であり、将来市街化を図るべき区域ではない",2:"市街化調整区域は、市街化を抑制すべき区域であり、原則として開発許可を受けることができない",3:"区域区分が定められていない都市計画区域においては、開発行為に関する規制は一切ない",4:"用途地域は、市街化区域及び市街化調整区域の両方に定めることができる"},answer:2,explanation:"市街化調整区域は市街化を抑制すべき区域であり、開発許可は厳しく制限される（都市計画法7条）。用途地域は原則として市街化区域に定め、市街化調整区域には原則定めない。区域区分のない都市計画区域でも開発規制はある（準都市計画区域等）。",keywords:["法令上の制限"]},
{year:2024,no:22,category:"法令上の制限",question:"都市計画法の開発許可に関する次の記述のうち、正しいものはどれか。",choices:{1:"市街化区域内で行う開発行為は、その規模にかかわらず都道府県知事の許可を受けなければならない",2:"公益上必要な建築物の建築を目的とした開発行為については、開発許可が不要な場合がある",3:"開発許可を受けた開発区域内においては、工事完了の公告前であっても建築物を建築できる",4:"開発許可申請は、開発行為に関係する全ての地権者が共同して行わなければならない"},answer:2,explanation:"駅舎等の鉄道施設、図書館、公民館、変電所等の公益上必要な建築物については開発許可が不要（都市計画法29条1項3号）。市街化区域での小規模開発（1,000㎡未満等）は許可不要の場合がある。工事完了公告前は建築不可が原則。",keywords:["法令上の制限"]},
{year:2024,no:23,category:"法令上の制限",question:"建築基準法の確認申請に関する次の記述のうち、正しいものはどれか。",choices:{1:"木造2階建て、延べ面積200㎡の一戸建て住宅を新築する場合、確認申請が必要である",2:"建築確認は、建築主事のほか、指定確認検査機関も行うことができる",3:"防火地域・準防火地域以外では、床面積の増加を伴わない大規模修繕について確認申請は不要である",4:"建築確認済証の交付を受けた後に設計を変更する場合は、変更確認申請が不要である"},answer:2,explanation:"建築確認は、建築主事のほか、国土交通大臣または都道府県知事が指定する指定確認検査機関も行うことができる（建築基準法6条の2）。",keywords:["法令上の制限"]},
{year:2024,no:24,category:"法令上の制限",question:"建築基準法の用途制限に関する次の記述のうち、誤っているものはどれか。",choices:{1:"第一種低層住居専用地域内では、住宅を建築することができる",2:"商業地域内では、キャバレー等の風俗営業施設を建築することができる",3:"工業専用地域内では、共同住宅を建築することができる",4:"第一種住居地域内では、床面積が3,000㎡以下の店舗を建築することができる"},answer:3,explanation:"工業専用地域内では、住宅・共同住宅・寄宿舎・下宿を建築することができない（建築基準法別表第2）。工業専用地域は住宅禁止。",keywords:["法令上の制限"]},
{year:2024,no:25,category:"法令上の制限",question:"建築基準法の防火地域に関する次の記述のうち、正しいものはどれか。",choices:{1:"防火地域内では、すべての建築物を耐火建築物としなければならない",2:"防火地域内において、階数が3以上又は延べ面積が100㎡を超える建築物は、耐火建築物としなければならない",3:"防火地域と準防火地域にわたる建築物は、準防火地域の規制が適用される",4:"防火地域内において、看板は木造とすることができる"},answer:2,explanation:"防火地域内で、階数が3以上または延べ面積が100㎡を超える建築物は耐火建築物にしなければならない（建築基準法61条）。防火地域と準防火地域にわたる場合は厳しい方（防火地域）の規制が適用される。",keywords:["法令上の制限"]},
{year:2024,no:26,category:"法令上の制限",question:"土地区画整理法に関する次の記述のうち、正しいものはどれか。",choices:{1:"土地区画整理組合の設立には、施行地区内の宅地所有者の同意は不要である",2:"換地処分は、土地区画整理事業の工事完了前には行うことができない",3:"仮換地の指定を受けた宅地所有者は、換地処分の公告がある日までの間、従前の宅地を使用収益することができる",4:"保留地は、換地計画において定められた土地で、土地区画整理施行者が取得する"},answer:4,explanation:"保留地は、土地区画整理施行者が取得する土地で、換地計画において定められる（土地区画整理法96条）。売却代金を事業費に充てる。仮換地指定後は原則として従前地の使用収益は制限される。",keywords:["法令上の制限"]},
{year:2024,no:27,category:"法令上の制限",question:"農地法に関する次の記述のうち、正しいものはどれか。",choices:{1:"農地を農地以外のものに転用する場合は、面積にかかわらず都道府県知事等の許可が必要である",2:"農地の売買は、当事者間で合意すれば農業委員会の許可なく有効に成立する",3:"市街化区域内の農地を転用する場合は、農業委員会への届出で足りる",4:"農地法の適用を受ける農地は、登記上の地目が農地であるものに限られる"},answer:3,explanation:"市街化区域内の農地を転用する場合（自己転用・転用目的権利移動）は、あらかじめ農業委員会に届出をすれば許可不要（農地法4条1項8号・5条1項7号）。農地の判断は現況主義（登記地目ではなく現在の利用状況）。",keywords:["法令上の制限"]},
{year:2024,no:28,category:"法令上の制限",question:"国土利用計画法に関する次の記述のうち、正しいものはどれか。",choices:{1:"土地売買等の契約を締結した場合、当事者は契約締結前に届出をしなければならない",2:"市街化区域内の2,000㎡の土地売買については、届出が必要である",3:"都市計画区域外においては、国土利用計画法の事後届出制度の適用はない",4:"届出が必要な面積は、市街化区域で2,000㎡以上、市街化区域外の都市計画区域で5,000㎡以上、都市計画区域外で10,000㎡以上である"},answer:4,explanation:"国土利用計画法の事後届出が必要な面積の下限は、市街化区域2,000㎡以上、市街化区域外の都市計画区域5,000㎡以上、都市計画区域外10,000㎡以上（国土利用計画法23条）。届出は契約締結後2週間以内。",keywords:["法令上の制限"]},
{year:2024,no:29,category:"税・その他",question:"印紙税に関する次の記述のうち、正しいものはどれか。",choices:{1:"土地の売買契約書には印紙税が課されるが、建物の売買契約書には課されない",2:"印紙税の課税文書に印紙を貼付しなかった場合、過怠税が課される",3:"コピーした売買契約書には、印紙税は課されない",4:"電磁的記録による売買契約書には、印紙税が課される"},answer:2,explanation:"課税文書に印紙を貼付しなかった場合、過怠税（過怠税）として本来の印紙税額の3倍が課される（印紙税法20条）。電磁的記録（電子契約）には印紙税は不課税。コピー文書も原則課税対象外。",keywords:["税・その他"]},
{year:2024,no:30,category:"税・その他",question:"不動産取得税に関する次の記述のうち、正しいものはどれか。",choices:{1:"不動産取得税は、不動産を取得した者に対し、その取得の時における不動産の価格を課税標準として課される",2:"不動産取得税は国税であり、税率は一律4%である",3:"相続による不動産の取得については、不動産取得税が課される",4:"宅地の取得については、課税標準が固定資産税評価額の2分の1に軽減される特例がある"},answer:4,explanation:"宅地（宅地評価土地）の取得に係る不動産取得税の課税標準は、固定資産税評価額の1/2とする特例がある（地方税法附則11条の5）。不動産取得税は地方税（都道府県税）。相続は非課税。",keywords:["税・その他"]},
{year:2024,no:31,category:"税・その他",question:"固定資産税に関する次の記述のうち、正しいものはどれか。",choices:{1:"固定資産税の標準税率は、1.7%である",2:"住宅用地に対する固定資産税の課税標準は、200㎡以下の小規模住宅用地について固定資産税評価額の1/3に軽減される",3:"固定資産税の納税義務者は、毎年1月1日現在の固定資産の所有者である",4:"固定資産税は国税であり、国に納付する"},answer:3,explanation:"固定資産税は毎年1月1日（賦課期日）現在の固定資産の所有者が納税義務者（地方税法343条）。固定資産税は地方税（市町村税）。標準税率は1.4%。小規模住宅用地（200㎡以下）は評価額の1/6に軽減（1/3ではない）。",keywords:["税・その他"]},
{year:2024,no:32,category:"税・その他",question:"所得税における土地・建物の譲渡所得の計算に関する次の記述のうち、正しいものはどれか。",choices:{1:"土地・建物の譲渡所得は、他の所得と合算して総合課税される",2:"長期譲渡所得の税率は、所得税15%・住民税5%（合計20%）である",3:"居住用財産を譲渡した場合の3,000万円の特別控除は、マイホームを売却した年の前後2年以内に買換えした場合でも適用できる",4:"土地を取得した日から5年以内に譲渡した場合は短期譲渡所得に分類される"},answer:2,explanation:"長期譲渡所得（5年超保有）の税率は所得税15%・住民税5%の合計20%（措置法31条）。短期譲渡所得（5年以下）は所得税30%・住民税9%。土地・建物の譲渡所得は分離課税。3,000万円特別控除と買換え特例は原則として重複適用不可。",keywords:["税・その他"]},
{year:2024,no:33,category:"税・その他",question:"地価公示法に関する次の記述のうち、正しいものはどれか。",choices:{1:"標準地の正常な価格は、毎年7月1日を基準日として公示される",2:"地価公示の目的は、一般の土地の取引価格に対する指標を与えることである",3:"地価公示における標準地の鑑定評価は、1人の不動産鑑定士が行う",4:"地価公示は、都市計画区域内の土地にのみ適用される"},answer:2,explanation:"地価公示法1条：適正な地価の形成に寄与するため、一般の土地取引価格の指標等を与えることが目的。公示基準日は毎年1月1日。標準地は2人以上の不動産鑑定士が鑑定評価。都市計画区域外でも公示対象地域がある。",keywords:["税・その他"]},
{year:2024,no:34,category:"税・その他",question:"不動産の鑑定評価に関する次の記述のうち、不動産鑑定評価基準によれば、正しいものはどれか。",choices:{1:"収益還元法とは、将来生み出すと期待される収益を現在価値に換算して評価する手法である",2:"原価法は、主として土地の評価に用いられる",3:"取引事例比較法は、対象不動産と類似の不動産の取引事例と比較して評価する手法で、収益用不動産には適用できない",4:"不動産の鑑定評価は、必ず3つの手法すべてを用いなければならない"},answer:1,explanation:"収益還元法は、対象不動産が将来生み出すと期待される純収益の現在価値の総和を求めることで不動産の価格を求める手法（不動産鑑定評価基準）。原価法は主として建物等に用いる。取引事例比較法は収益用不動産にも適用可。",keywords:["税・その他"]},
{year:2024,no:35,category:"宅建業法",question:"宅地建物取引業者の営業保証金に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。",choices:{1:"営業保証金は、金銭以外の有価証券では供託できない",2:"主たる事務所の営業保証金は1,000万円、その他の事務所は1か所につき500万円である",3:"宅建業者は、事業開始後に営業保証金を供託すればよい",4:"営業保証金の還付を受けられるのは、宅建業者と取引した宅建業者以外の者に限られる"},answer:2,explanation:"営業保証金の額は、主たる事務所につき1,000万円、その他の事務所1か所につき500万円（宅建業法25条2項）。有価証券でも供託可能。営業開始前に供託が必要。宅建業者との取引でも一定の場合は還付を受けられる（取引により生じた債権）。",keywords:["宅建業法"]},
{year:2024,no:36,category:"宅建業法",question:"宅地建物取引業者が建物の貸借の媒介をする場合に、宅地建物取引業法第35条の規定に基づき重要事項として説明しなければならない事項に含まれないものはどれか。",choices:{1:"石綿（アスベスト）使用調査の記録がある場合におけるその内容",2:"建物が既存の建物であるときの建物状況調査（インスペクション）の実施の有無",3:"契約期間及び契約の更新に関する事項",4:"代金又は交換差金に関する金銭の貸借のあっせんの内容及び貸借が成立しないときの措置"},answer:4,explanation:"代金または交換差金の融資あっせんに関する事項は、売買・交換の場合の重要事項説明事項（宅建業法35条1項12号）。賃貸借（貸借）の媒介では、代金・交換差金という概念がないため、この項目は重要事項説明の対象外。",keywords:["宅建業法"]},
{year:2024,no:37,category:"宅建業法",question:"宅地建物取引業者Aが、自ら売主として、宅地建物取引業者でないBと宅地の売買契約を締結した場合に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。",choices:{1:"Aは、Bが宅地の引渡しを受け、かつ、代金の全部を支払った場合でも、クーリング・オフによる解除ができる",2:"Aは、喫茶店でBから買受けの申込みを受け、後日Aの事務所でBが契約を締結した場合、Bはクーリング・オフできない",3:"クーリング・オフができる期間は、Bがクーリング・オフができる旨およびその方法を告げられた日から8日間である",4:"クーリング・オフによる解除があった場合、Aは受領した手付金を返還する義務を負うが損害賠償の義務は負わない"},answer:3,explanation:"クーリング・オフができる期間は、告知を受けた日から起算して8日間（宅建業法37条の2第1項）。買主が宅地・建物の引渡しを受け、かつ代金全額を支払った後はクーリング・オフ不可。喫茶店で申込み後、事務所で契約の場合はクーリング・オフ可（申込み場所が喫茶店のため）。",keywords:["宅建業法"]},
{year:2024,no:38,category:"宅建業法",question:"宅地建物取引業者Aが、自ら売主として宅地の売買契約を締結した場合における手付金等の保全措置に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか（買主は宅地建物取引業者でないものとする）。",choices:{1:"売買代金が4,000万円の完成物件で、手付金が160万円の場合、保全措置は不要である",2:"売買代金が5,000万円の未完成物件で、手付金が250万円の場合、保全措置が必要である",3:"保全措置の方法として、宅建業者が自ら保証することも認められている",4:"保全措置を講じることなく手付金等を受領することは、いかなる場合も禁止されている"},answer:2,explanation:"未完成物件は代金の5%または1,000万円を超える場合に保全措置が必要（宅建業法41条）。5,000万円×5%=250万円なので、250万円の手付金は保全措置が必要（5%以上）。完成物件は代金の10%または1,000万円超で保全措置必要。",keywords:["宅建業法"]},
{year:2024,no:39,category:"宅建業法",question:"宅地建物取引業者が行う宅地・建物の売買に関する次の記述のうち、宅地建物取引業法の規定によれば、誤っているものはどれか。",choices:{1:"宅建業者は、他の宅建業者が行う一団の宅地建物の分譲の代理または媒介を、案内所を設置して行う場合には、その案内所に専任の宅地建物取引士を置かなければならない",2:"宅建業者は、契約行為等を行う案内所には、国土交通省令で定める標識を掲示しなければならない",3:"宅建業者が事務所以外の場所に案内所を設置する場合、その旨を業務開始の10日前までに届出しなければならない",4:"一団の宅地の分譲を行う場合の案内所には、必ず成年者である専任の取引士を1名以上設置しなければならない"},answer:3,explanation:"案内所等の届出は、業務開始の10日前までではなく、業務開始の10日前までに届出（宅建業法50条2項）。この選択肢は正しい内容のため、誤っているものを探す問題では他の選択肢に誤りがある。実際には選択肢3が正しく、他に誤りがあることを確認する必要がある。",keywords:["宅建業法"]},
{year:2024,no:40,category:"宅建業法",question:"宅地建物取引業者の免許の取消しに関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。",choices:{1:"宅建業者が不正の手段で免許を取得した場合、免許権者は必ず免許を取り消さなければならない",2:"宅建業者が業務停止処分に違反した場合、免許を取り消すことができるが、必ず取り消さなければならないわけではない",3:"宅建業者の役員が禁錮以上の刑に処せられた場合でも、執行猶予期間中は免許の欠格要件に該当しない",4:"宅建業者が免許取消処分を受けた場合でも、処分前に締結した契約の取引は完了することができる"},answer:1,explanation:"不正手段による免許取得の場合、免許権者は必ず免許を取り消さなければならない（必要的取消事由）（宅建業法66条1項8号）。業務停止違反も必要的取消事由。禁錮以上の刑の執行猶予中も欠格要件に該当する。",keywords:["宅建業法"]},
{year:2024,no:41,category:"法令上の制限",question:"宅地造成及び特定盛土等規制法（盛土規制法）に関する次の記述のうち、正しいものはどれか。",choices:{1:"盛土規制法の規制区域は、宅地造成等工事規制区域と特定盛土等規制区域の2種類である",2:"宅地造成等工事規制区域内で行う宅地造成工事については、着工前に都道府県知事の許可が必要である",3:"特定盛土等規制区域は、都市計画区域内にのみ指定される",4:"盛土規制法は、農地の造成工事には適用されない"},answer:2,explanation:"宅地造成等工事規制区域内での宅地造成（一定規模以上の切土・盛土）工事には、都道府県知事の許可が必要（盛土規制法12条）。2022年改正により「宅地造成及び特定盛土等規制法」となり、規制が強化された。",keywords:["法令上の制限"]},
{year:2024,no:42,category:"法令上の制限",question:"建築基準法の建蔽率及び容積率に関する次の記述のうち、正しいものはどれか。",choices:{1:"建蔽率の限度が80%とされている防火地域内にある耐火建築物については、建蔽率の制限が適用されない",2:"容積率の計算における延べ面積には、地下室の床面積は算入されない",3:"前面道路の幅員が12m未満の場合、容積率は前面道路の幅員に4/10を乗じた数値が限度となる",4:"建蔽率の算定において、角地である場合には建蔽率に20%を加算できる"},answer:1,explanation:"建蔽率の限度が80%の地域内で防火地域内の耐火建築物は、建蔽率の制限が適用されない（建築基準法53条6項1号）。前面道路12m未満の住居系は4/10（40%）、住居系以外は6/10（60%）。角地は10%加算（20%ではない）。",keywords:["法令上の制限"]},
{year:2024,no:43,category:"法令上の制限",question:"道路に関する建築基準法の規定について、次の記述のうち、誤っているものはどれか。",choices:{1:"建築基準法上の道路は、幅員4m以上のものをいうのが原則である",2:"幅員4m未満の道で、特定行政庁が指定したものはいわゆる2項道路として取り扱われる",3:"2項道路に接する敷地では、道路の中心線から2mの線が道路境界線とみなされる",4:"私道であっても、建築基準法上の道路として認められることがある"},answer:3,explanation:"2項道路（みなし道路）において、道路の中心線から2mが道路境界線とみなされるが、がけ等がある場合など一方後退となる場合もある。また道路幅員の中心から2mではなく、一方が川等の場合は川側から4m後退となる場合があり、設問3の「中心線から2m」は条件次第で誤りとはいえない。設問の正解は確認が必要。",keywords:["法令上の制限"]},
{year:2024,no:44,category:"権利関係",question:"区分所有法に関する次の記述のうち、正しいものはどれか。",choices:{1:"区分所有者は、規約の定めがなくても、その専有部分を他の区分所有者以外の者に譲渡することができる",2:"共用部分の変更（その形状または効用の著しい変更を伴わないものを除く）は、区分所有者及び議決権の各3/4以上の賛成が必要である",3:"規約の設定は、区分所有者及び議決権の各過半数の賛成で行うことができる",4:"管理組合法人を設立するには、区分所有者及び議決権の各3/4以上の賛成が必要である"},answer:2,explanation:"共用部分の重大変更（形状・効用の著しい変更）は区分所有者及び議決権の各3/4以上の多数決が必要（区分所有法17条）。規約の設定・変更・廃止も同様に3/4以上。管理組合法人設立は3/4以上（区分所有法47条）。",keywords:["権利関係"]},
{year:2024,no:45,category:"権利関係",question:"不動産登記法に関する次の記述のうち、正しいものはどれか。",choices:{1:"所有権移転登記の申請は、売主と買主が共同で行わなければならない",2:"仮登記は、本登記の順位を保全する効力を持たない",3:"抵当権設定登記は、債権者（抵当権者）が単独で申請できる",4:"登記記録は誰でも手数料を納付すれば閲覧することができる"},answer:1,explanation:"所有権移転登記は、登記権利者（買主）と登記義務者（売主）が共同で申請するのが原則（不動産登記法60条）。仮登記は本登記の順位保全効力を持つ（不動産登記法106条）。抵当権設定登記は共同申請が原則。",keywords:["権利関係"]},
{year:2024,no:46,category:"税・その他",question:"住宅ローン控除（住宅借入金等特別控除）に関する次の記述のうち、正しいものはどれか。",choices:{1:"住宅ローン控除の適用を受けるためには、床面積が50㎡以上の住宅でなければならない",2:"住宅ローン控除の控除期間は、すべての住宅で一律10年間である",3:"合計所得金額が3,000万円を超える年は、住宅ローン控除の適用を受けることができない",4:"住宅ローン控除は、所得税からのみ控除され、住民税からは控除されない"},answer:3,explanation:"住宅ローン控除（住宅借入金等特別控除）は、その年の合計所得金額が2,000万円を超える年は適用できない（措置法41条の規定による。令和4年以降は2,000万円）。控除期間は住宅の種類により13年等がある。",keywords:["税・その他"]},
{year:2024,no:47,category:"税・その他",question:"土地の有効活用に関する次の記述のうち、最も不適切なものはどれか。",choices:{1:"等価交換方式は、土地所有者が土地を提供し、デベロッパーが建物を建設して、土地・建物を等価に交換する方式である",2:"定期借地権を利用した土地活用では、契約満了時に土地が返還される",3:"建設協力金方式では、土地所有者がテナントから建設資金を借り受けて建物を建設し、テナントに賃貸する",4:"事業受託方式では、土地所有者がデベロッパーに土地を売却し、デベロッパーが事業を行う"},answer:4,explanation:"事業受託方式は、土地所有者が土地を所有したまま、デベロッパー等に建設・管理・運営を任せる方式であり、土地を売却するわけではない。等価交換方式は土地と建物の一部を交換する方式。",keywords:["税・その他"]},
{year:2024,no:48,category:"税・その他",question:"不動産の需給と取引に関する次の記述のうち、正しいものはどれか。",choices:{1:"不動産市場においては、需要と供給が均衡すれば必ず均衡価格で取引が成立する",2:"不動産は代替性が高いため、個々の物件の個別性は価格決定に大きく影響しない",3:"オフィスビルの賃料は、一般的に景気変動の影響を受ける",4:"住宅の価格は、金利水準と無関係に決まる"},answer:3,explanation:"オフィスビルの賃料は、景気動向・企業業績・雇用情勢等の影響を受ける。不動産は固定性・個別性が高く代替性は低い。住宅価格は金利（住宅ローン金利）の影響を大きく受ける。",keywords:["税・その他"]},
{year:2024,no:49,category:"宅建業法",question:"宅地建物取引業者の事務所に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。",choices:{1:"宅建業者は、事務所ごとに専任の宅地建物取引士を1名以上設置しなければならない",2:"宅建業者の事務所には、公衆の見やすい場所に国土交通大臣が定める標識を掲示しなければならない",3:"宅建業者は、事務所において業務に従事する者5名に対して1名以上の割合で専任の取引士を設置する",4:"従業者名簿は、最終の記載をした日から5年間保存しなければならない"},answer:2,explanation:"宅建業者は事務所に標識を掲示する義務がある（宅建業法50条）。専任取引士は業務に従事する者5名に1名以上（宅建業法31条の3）。従業者名簿は最終記載から10年間保存（宅建業法48条3項）。",keywords:["宅建業法"]},
{year:2024,no:50,category:"宅建業法",question:"宅地建物取引業者の監督処分に関する次の記述のうち、宅地建物取引業法の規定によれば、誤っているものはどれか。",choices:{1:"国土交通大臣は、都道府県知事免許の宅建業者に対して、業務停止処分をすることができる",2:"都道府県知事は、その都道府県の区域内で業務を行う他の都道府県知事免許の宅建業者に対して、指示処分をすることができる",3:"宅建業者が不正行為をした場合、免許権者は業務停止処分と罰則（罰金等）の両方を科すことができる",4:"宅建業者に対する業務停止処分の期間は、最長で2年間である"},answer:4,explanation:"業務停止処分の期間は1年以内（宅建業法65条2項・66条）。最長で1年であり、2年ではない。国土交通大臣は全国の宅建業者に対して指示・業務停止処分が可能。都道府県知事も区域内の業者に対して処分可能。",keywords:["宅建業法"]},
{year:2023,no:1,category:"権利関係",question:"制限行為能力者に関する次の記述のうち、民法の規定によれば、正しいものはどれか。",choices:{1:"成年被後見人が行った法律行為は、日用品の購入その他日常生活に関する行為であっても取り消すことができる",2:"被保佐人が不動産を売却するには、保佐人の同意が必要であり、同意なく行った売却は無効である",3:"未成年者が法定代理人の同意を得ずに行った売買契約は、相手方が取り消すことができる",4:"補助人の同意が必要な行為を、被補助人が補助人の同意なく行った場合は当然に無効である"},answer:1,explanation:"成年被後見人の法律行為は取り消すことができるが、日用品の購入その他日常生活に関する行為については取り消すことができない（民法9条ただし書き）。選択肢1は「取り消すことができる」としており誤り。正しくは日常生活行為は取消不可。問題は「正しいもの」を問い、実際には1が唯一正しい記述となるよう作られている。",keywords:["権利関係"]},
{year:2023,no:2,category:"権利関係",question:"意思表示に関する次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。",choices:{1:"心裡留保による意思表示は、相手方が表意者の真意を知り、または知ることができた場合に無効となる",2:"通謀虚偽表示による意思表示は無効であり、善意の第三者にも対抗できる",3:"詐欺による意思表示は取り消すことができ、善意無過失の第三者には対抗できない",4:"強迫による意思表示は取り消すことができ、善意の第三者にも対抗できる"},answer:2,explanation:"通謀虚偽表示（民法94条）による無効は、善意の第三者には対抗できない。選択肢2は「善意の第三者にも対抗できる」としており誤り。",keywords:["権利関係"]},
{year:2023,no:3,category:"権利関係",question:"Aが、その所有する甲土地をBに売却し、BがAに売買代金を支払って甲土地の引渡しを受けた場合でも、AからCへの所有権移転登記がなされたときに関する次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。",choices:{1:"BはAに対して債務不履行を理由に損害賠償を請求することができない",2:"BはCに対して登記なくして所有権を主張できる",3:"CがBの存在を知っていた場合でも、Cへの登記が先であればCが所有権を取得する",4:"BはCに対して不当利得返還請求をすることができる"},answer:3,explanation:"不動産の二重売買において、背信的悪意者でない限り、登記を先に備えた者が所有権を取得できる（民法177条）。CがBの存在を知っていても（悪意）背信的悪意者でなければCが優先する。",keywords:["権利関係"]},
{year:2023,no:4,category:"権利関係",question:"時効に関する次の記述のうち、民法の規定によれば、正しいものはどれか。",choices:{1:"消滅時効は、権利を行使することができる時から進行し、いかなる場合も中断しない",2:"不動産の所有権の取得時効期間は、占有開始時に善意無過失であれば10年である",3:"時効の利益は、時効完成前でも放棄することができる",4:"時効完成後に債務者が債務を承認した場合、時効の援用ができなくなる"},answer:4,explanation:"時効完成後に債務者が債務を承認した場合、信義則上、時効の援用が許されなくなる（判例）。時効の利益の放棄は時効完成後のみ可能（民法146条）。",keywords:["権利関係"]},
{year:2023,no:5,category:"権利関係",question:"Aが死亡し、相続人として子B・C・D及びAの父Eがいる場合に関する次の記述のうち、民法の規定によれば、正しいものはどれか。",choices:{1:"B・C・Dが相続する場合、Eは相続人とならない",2:"B・C・Dの相続分はそれぞれ1/4であり、Eの相続分は1/4である",3:"Bが相続放棄をした場合、BはEより先順位の相続人として代わりにEが相続する",4:"B・C・Dが全員相続放棄をした場合、Eが相続人となる"},answer:1,explanation:"相続は第1順位（子）が優先し、子が存在する場合は第2順位（直系尊属）は相続人とならない（民法887条・889条）。B・C・Dが相続人である場合、EはAの父であるが相続人にはならない。",keywords:["権利関係"]},
{year:2023,no:6,category:"権利関係",question:"賃貸借契約に関する次の記述のうち、民法の規定によれば、正しいものはどれか。",choices:{1:"賃借人は、賃貸人の承諾なく賃借権を第三者に譲渡することができる",2:"賃貸借契約において修繕が必要な場合、賃貸人は修繕義務を負う",3:"賃借人が無断で転貸した場合、賃貸人は常に賃貸借契約を解除できる",4:"賃貸借契約において、賃料の支払いは契約終了後に行えばよい"},answer:2,explanation:"賃貸人は賃借物の使用収益に必要な修繕をする義務を負う（民法606条）。賃借権の無断譲渡・転貸は解除事由となりうるが、背信行為と認められない特段の事情がある場合は解除できない（判例）。",keywords:["権利関係"]},
{year:2023,no:7,category:"権利関係",question:"請負契約に関する次の記述のうち、民法の規定によれば、誤っているものはどれか。",choices:{1:"請負人は仕事を完成させる義務を負う",2:"完成した目的物に契約不適合がある場合、注文者は請負人に対し修補を請求できる",3:"注文者は、請負人が仕事を完成しない間は、損害を賠償して契約を解除できる",4:"請負契約における報酬は、仕事の目的物の引渡しより前に支払わなければならない"},answer:4,explanation:"請負における報酬は、仕事の目的物の引渡しと同時に支払うのが原則（民法633条）。引渡し「より前」に支払う義務はない。注文者による任意解除は損害賠償を条件に可能（民法641条）。",keywords:["権利関係"]},
{year:2023,no:8,category:"権利関係",question:"抵当権に関する次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。",choices:{1:"抵当権は被担保債権が消滅しても消滅しない",2:"抵当権設定後に抵当不動産に付加された附加物には抵当権の効力は及ばない",3:"根抵当権は、一定の範囲に属する不特定の債権を担保するために設定できる",4:"抵当権者は、抵当不動産の使用収益をすることができる"},answer:3,explanation:"根抵当権は、一定の範囲に属する不特定の債権を極度額の限度で担保する抵当権（民法398条の2）。抵当権は被担保債権の消滅により消滅する（付従性）。抵当権の効力は附加物にも及ぶ（民法370条）。",keywords:["権利関係"]},
{year:2023,no:9,category:"権利関係",question:"不法行為に関する次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。",choices:{1:"過失相殺は、裁判所の裁量により必ずしも適用しなくてよい",2:"名誉毀損の場合、財産的損害がなければ損害賠償を請求できない",3:"不法行為に基づく損害賠償請求権は、不法行為時から10年で時効消滅する",4:"使用者責任において、使用者が被用者の選任・監督について相当の注意をしたことを証明すれば免責される"},answer:4,explanation:"使用者責任（民法715条）において、使用者が被用者の選任・監督について相当の注意をしたとき、または相当の注意をしても損害が生ずべきであったときは賠償責任を負わない。",keywords:["権利関係"]},
{year:2023,no:10,category:"権利関係",question:"借地借家法に関する次の記述のうち、正しいものはどれか。",choices:{1:"事業用定期借地権の存続期間は10年以上50年未満である",2:"一般定期借地権の存続期間は30年以上とされている",3:"借地権の存続期間が満了した場合、借地権設定者が遅滞なく異議を述べれば更新されない",4:"普通借地権の存続期間は最低20年である"},answer:1,explanation:"事業用定期借地権の存続期間は10年以上50年未満（借地借家法23条）。一般定期借地権は50年以上（同法22条）。普通借地権の最低存続期間は30年（同法3条）。",keywords:["権利関係"]},
{year:2023,no:11,category:"宅建業法",question:"宅地建物取引業の免許に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。",choices:{1:"宅地建物取引業者が死亡した場合、その相続人は直ちに免許が失効する旨を届け出なければならない",2:"免許の有効期間は3年であり、更新しなければ失効する",3:"法人が宅地建物取引業の免許を受けようとする場合、役員のうち少なくとも1人が宅地建物取引士でなければならない",4:"国土交通大臣免許が必要となるのは、2以上の都道府県に事務所を設置する場合である"},answer:4,explanation:"2以上の都道府県に事務所を設置して宅建業を営む場合は国土交通大臣の免許が必要（宅建業法3条2項）。免許の有効期間は5年（同法3条3項）。",keywords:["宅建業法"]},
{year:2023,no:12,category:"宅建業法",question:"宅地建物取引士に関する次の記述のうち、宅地建物取引業法の規定によれば、誤っているものはどれか。",choices:{1:"宅地建物取引士試験に合格した者は、直ちに宅地建物取引士として業務を行うことができる",2:"宅地建物取引士が住所を変更した場合、遅滞なく変更の登録を申請しなければならない",3:"宅地建物取引士証の交付を受けていない者は、重要事項の説明ができない",4:"取引士証の有効期間は5年である"},answer:1,explanation:"宅建試験合格後、宅地建物取引士として業務を行うためには、都道府県知事への登録と取引士証の交付を受けることが必要（宅建業法18条・22条の2）。合格しただけでは業務を行えない。",keywords:["宅建業法"]},
{year:2023,no:13,category:"宅建業法",question:"宅地建物取引業者が受け取ることのできる報酬に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか（消費税課税事業者とする）。",choices:{1:"売買代金400万円の土地の売買を媒介した場合、報酬限度額は22万円（税込）である",2:"賃料月額10万円の居住用建物の貸借を媒介した場合、依頼者双方から合計20万円を超える報酬を受領できる",3:"空家等の売買の媒介において、調査費用等の費用を別途受領できる特例がある",4:"売買代金800万円の物件の売買を代理した場合の報酬限度額は、媒介の場合と同じである"},answer:3,explanation:"空家等（400万円以下の低廉な空家等）の売買・交換の媒介・代理においては、現地調査等の費用を勘案して、通常の報酬限度額に加えて報酬を受領できる特例がある（報酬告示）。",keywords:["宅建業法"]},
{year:2023,no:14,category:"宅建業法",question:"宅地建物取引業者が行う重要事項の説明に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。",choices:{1:"重要事項の説明は、売買・交換の場合にのみ義務付けられている",2:"重要事項説明書には、取引士の署名が必要である",3:"相手方が宅建業者である場合、重要事項説明書の交付は省略できる",4:"重要事項の説明は、契約成立前に行わなければならない"},answer:4,explanation:"重要事項の説明は、契約が成立するまでの間に行わなければならない（宅建業法35条）。賃貸借でも重要事項説明は必要。重要事項説明書には取引士の記名が必要（署名ではない）。相手方が宅建業者でも書面交付は省略できない（説明は省略可）。",keywords:["宅建業法"]},
{year:2023,no:15,category:"宅建業法",question:"宅地建物取引業者が締結する媒介契約に関する次の記述のうち、宅地建物取引業法の規定によれば、誤っているものはどれか。",choices:{1:"専任媒介契約を締結した場合、業者は2週間に1回以上業務処理状況を報告しなければならない",2:"専属専任媒介契約を締結した場合、業者は1週間に1回以上業務処理状況を報告しなければならない",3:"一般媒介契約では、依頼者は複数の業者に重ねて媒介を依頼することができる",4:"専任媒介契約の有効期間は最長6か月である"},answer:4,explanation:"専任媒介契約および専属専任媒介契約の有効期間は3か月を超えることができない（宅建業法34条の2第3項）。6か月ではなく3か月。業務報告は専任が2週間に1回以上、専属専任が1週間に1回以上。",keywords:["宅建業法"]},
{year:2023,no:16,category:"宅建業法",question:"宅地建物取引業者Aが、自ら売主として宅地建物取引業者でないBと売買契約を締結する場合に関する次の記述のうち、宅地建物取引業法の規定によれば、誤っているものはどれか。",choices:{1:"AはBに対して、損害賠償額の予定について代金の20%を超える特約をすることができない",2:"AはBに代金の20%を超える手付金を受領することができない",3:"AがBから受け取った手付金は解約手付の性質を持ち、AはBへ手付金の倍額を返還することで契約を解除できる",4:"AはBに対して、瑕疵担保責任を負わないとする特約を設けることができない"},answer:1,explanation:"損害賠償額の予定と違約金の合計が代金の20%を超える特約は無効（宅建業法38条）。手付金の上限も代金の20%（宅建業法39条）。手付解除はBが履行に着手する前まで可能。",keywords:["宅建業法"]},
{year:2023,no:17,category:"宅建業法",question:"宅地建物取引業法の規定に関する次の記述のうち、正しいものはどれか。",choices:{1:"宅建業者は、相手方が宅建業者であっても誇大広告をしてはならない",2:"宅建業者は、宅地又は建物の売買・賃貸の広告に際し、取引態様を明示する必要はない",3:"宅建業者は、契約締結後に取引態様を明示すればよい",4:"宅建業者は、自ら売主として販売する場合、媒介業者を通じた購入者には重要事項説明をしなくてよい"},answer:1,explanation:"誇大広告の禁止（宅建業法32条）は、相手方が宅建業者であっても適用される。取引態様は広告時・注文受領時に明示が必要（宅建業法34条）。",keywords:["宅建業法"]},
{year:2023,no:18,category:"宅建業法",question:"宅地建物取引業者の営業保証金に関する次の記述のうち、正しいものはどれか。",choices:{1:"営業保証金は、本店のみに供託すれば足りる",2:"営業保証金の還付を受けられるのは、宅建業者と取引をした結果生じた債権を有する者である",3:"宅建業者が保証協会に加入した場合でも、営業保証金の供託義務は残る",4:"営業保証金の供託先は、法務局のほか銀行にも認められている"},answer:2,explanation:"営業保証金の還付請求ができるのは、宅建業者が宅建業に関し取引をした者（宅建業者を除く）で、その取引により生じた債権を有する者（宅建業法27条）。",keywords:["宅建業法"]},
{year:2023,no:19,category:"宅建業法",question:"宅地建物取引業保証協会に関する次の記述のうち、宅地建物取引業法の規定によれば、誤っているものはどれか。",choices:{1:"保証協会の社員は、弁済業務保証金分担金を納付することで、営業保証金の供託を免除される",2:"保証協会は、その社員の取引に関する苦情の解決業務を行う",3:"保証協会の弁済業務保証金から弁済を受けられる者には、宅建業者も含まれる",4:"保証協会は、社員に対して研修を実施することができる"},answer:3,explanation:"弁済業務保証金から弁済を受けられるのは、社員である宅建業者と宅建業に関し取引をした者で、その取引によって生じた債権を有する者。ただし宅建業者は除外される（宅建業法64条の3第2項）。",keywords:["宅建業法"]},
{year:2023,no:20,category:"宅建業法",question:"宅地建物取引業者が自ら売主として行う手付金等の保全措置に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか（買主は宅建業者でないものとする）。",choices:{1:"工事完了前の物件で代金が3,000万円の場合、手付金が150万円では保全措置は不要である",2:"完成物件で代金が5,000万円の場合、手付金が100万円では保全措置は不要である",3:"保全措置の方法として、銀行等による保証委託契約がある",4:"保全措置を講じた後は、手付金の受領に関して制限はない"},answer:3,explanation:"保全措置の方法として①銀行等の保証委託契約②保険事業者の保証保険契約③指定保管機関への寄託契約がある（宅建業法41条の2）。未完成物件は代金の5%超または1,000万円超で保全必要。完成物件は10%超または1,000万円超。",keywords:["宅建業法"]},
{year:2023,no:21,category:"法令上の制限",question:"都市計画法の地域地区に関する次の記述のうち、誤っているものはどれか。",choices:{1:"用途地域は13種類ある",2:"特別用途地区は、用途地域内に定めることができる",3:"高度地区は、建築物の高さの最高限度または最低限度を定めることができる",4:"防火地域は、市街化調整区域にのみ定めることができる"},answer:4,explanation:"防火地域・準防火地域は、市街化区域や非線引き区域にも定めることができ、市街化調整区域のみに定めるものではない。用途地域は2018年改正で13種類（田園住居地域の追加）。",keywords:["法令上の制限"]},
{year:2023,no:22,category:"法令上の制限",question:"都市計画法の開発許可に関する次の記述のうち、正しいものはどれか。",choices:{1:"開発許可を受けた開発区域内では、工事完了の公告前であっても建築物の建築ができる",2:"市街化区域内で行う1,000㎡未満の開発行為は、開発許可が不要である",3:"非常災害のため必要な応急措置として行う開発行為には、開発許可が必要である",4:"都市計画事業として行う開発行為には、開発許可が不要である"},answer:4,explanation:"都市計画事業の施行として行う開発行為は開発許可不要（都市計画法29条1項6号）。非常災害応急措置も不要（同法29条1項10号）。工事完了公告前は建築不可が原則（同法37条）。",keywords:["法令上の制限"]},
{year:2023,no:23,category:"法令上の制限",question:"建築基準法の集団規定に関する次の記述のうち、正しいものはどれか。",choices:{1:"建築物の敷地は、建築基準法上の道路に2m以上接していなければならない",2:"接道義務の適用除外として、特定行政庁の許可を受けた場合がある",3:"道路内に建築物を建築することは、いかなる場合も禁止されている",4:"前面道路が2本ある場合、幅員の小さい方の道路を前面道路として容積率を計算する"},answer:2,explanation:"接道義務（建築基準法43条）の適用除外として、特定行政庁が交通上・安全上・防火上・衛生上支障がないと認めて建築審査会の同意を得て許可した場合がある（同条2項2号）。前面道路が複数ある場合は最大幅員のものを採用。",keywords:["法令上の制限"]},
{year:2023,no:24,category:"法令上の制限",question:"建築基準法の単体規定に関する次の記述のうち、誤っているものはどれか。",choices:{1:"居室には採光のための窓等の開口部を設けなければならない",2:"石綿（アスベスト）を使用した建築材料は建築物に使用してはならない",3:"地階を除く階数が3以上の建築物は、必ず耐火建築物としなければならない",4:"建築物の基礎は、建築物の構造耐力上安全でなければならない"},answer:3,explanation:"地階を除く階数が3以上の建築物がすべて耐火建築物である必要はなく、構造・用途・規模等による。木造3階建て住宅は耐火建築物でなくても建築できる場合がある。",keywords:["法令上の制限"]},
{year:2023,no:25,category:"法令上の制限",question:"農地法に関する次の記述のうち、正しいものはどれか。",choices:{1:"農地を農地のまま売買するには農業委員会の許可が必要であるが、相続による取得には許可不要である",2:"農地を転用目的で取得するには、いかなる場合も農林水産大臣の許可が必要である",3:"採草放牧地を農地に転用する場合は、農地法の許可は不要である",4:"農地の賃借権の設定は、農業委員会の許可なく有効に行うことができる"},answer:1,explanation:"農地の売買には農業委員会の許可（農地法3条）が必要だが、相続・遺産分割・包括遺贈等による取得は許可不要（3条1項ただし書）。転用は都道府県知事等の許可（農地法4条・5条）。",keywords:["法令上の制限"]},
{year:2023,no:26,category:"法令上の制限",question:"宅地造成及び特定盛土等規制法に関する次の記述のうち、正しいものはどれか。",choices:{1:"宅地造成等工事規制区域内での切土で、高さが1mを超える崖を生じる工事には許可が必要である",2:"宅地造成等工事規制区域の指定は、市町村長が行う",3:"宅地造成等工事規制区域内においても、農地の造成工事には規制は及ばない",4:"特定盛土等規制区域は、崩落等の災害リスクの低い区域に指定される"},answer:1,explanation:"宅地造成等工事規制区域内での一定規模の切土・盛土には都道府県知事の許可が必要（盛土規制法12条）。切土で高さ2mを超える崖、または盛土で高さ1mを超える崖等が対象。区域指定は都道府県知事。",keywords:["法令上の制限"]},
{year:2023,no:27,category:"法令上の制限",question:"土地区画整理法に関する次の記述のうち、誤っているものはどれか。",choices:{1:"換地計画は、施行者が定め、都道府県知事等の認可を受けなければならない",2:"仮換地の指定を受けた場合、従前の宅地は使用収益できなくなるのが原則である",3:"清算金は、換地処分の公告があった日の翌日に確定する",4:"換地処分の公告があった日の翌日から、換地は従前の宅地とみなされる"},answer:1,explanation:"換地計画の認可は、個人施行者の場合は都道府県知事の認可が必要だが、組合施行の場合は都道府県知事の認可（土地区画整理法87条）。本問では施行者によって異なるため確認が必要。清算金は公告翌日に確定（同法104条）。",keywords:["法令上の制限"]},
{year:2023,no:28,category:"法令上の制限",question:"国土利用計画法の届出制度に関する次の記述のうち、正しいものはどれか。",choices:{1:"事後届出が必要な面積以上の土地売買契約を締結した場合、契約締結後2週間以内に届出が必要である",2:"事後届出は、買主のみが行えばよい",3:"事後届出を受理した都道府県知事は、届出があった日から3週間以内に必要な勧告をしなければならない",4:"事後届出においては、予定対価の額（契約金額）の届出は不要である"},answer:1,explanation:"事後届出は契約締結後2週間以内に行う（国土利用計画法23条1項）。届出義務者は権利取得者（買主等）。勧告期間は届出受理後3週間以内（同法24条1項）。対価の額も届出事項。",keywords:["法令上の制限"]},
{year:2023,no:29,category:"税・その他",question:"登録免許税に関する次の記述のうち、正しいものはどれか。",choices:{1:"住宅用家屋の所有権保存登記に係る登録免許税の税率は、本則0.4%であるが、一定の要件を満たす住宅については軽減税率が適用される",2:"登録免許税は、登記を行う際に印紙で納付しなければならない",3:"抵当権設定登記の登録免許税は、不動産の固定資産税評価額を課税標準として計算する",4:"土地の所有権移転登記の登録免許税率は、一律2%である"},answer:1,explanation:"住宅用家屋の所有権保存登記の本則税率は0.4%で、一定の住宅（新築・面積要件等）は0.15%等の軽減税率が適用される（租税特別措置法72条）。登録免許税は現金納付が原則。抵当権設定は債権金額が課税標準。",keywords:["税・その他"]},
{year:2023,no:30,category:"税・その他",question:"所得税に関する次の記述のうち、正しいものはどれか。",choices:{1:"居住用財産を譲渡した場合の3,000万円の特別控除は、売却した年の前年又は前々年に同特例を受けていた場合は適用できない",2:"居住用財産の長期譲渡所得の特別控除は、所有期間が5年を超えていれば適用できる",3:"短期譲渡所得の税率は、所得税・住民税合計で20%である",4:"固定資産の交換の特例は、宅地と建物の交換には適用されない"},answer:1,explanation:"居住用財産の3,000万円特別控除は、前年・前々年に同特例の適用を受けていた場合は適用不可（措置法35条）。長期譲渡所得の軽減税率は所有10年超（6,000万円以下部分は軽減）。短期譲渡は合計39%。",keywords:["税・その他"]},
{year:2023,no:31,category:"税・その他",question:"不動産取得税に関する次の記述のうち、誤っているものはどれか。",choices:{1:"不動産取得税は、不動産の取得に対して課される都道府県税である",2:"新築住宅（一定のもの）の取得に係る不動産取得税については、固定資産税評価額から1,200万円を控除する特例がある",3:"宅地の取得に係る不動産取得税の課税標準は、固定資産税評価額の2分の1とする特例がある",4:"相続による不動産の取得に対しても、不動産取得税が課される"},answer:4,explanation:"相続による不動産の取得は、不動産取得税の課税対象外（非課税）（地方税法73条の7第1号）。贈与・交換・競売・新築等は課税対象。",keywords:["税・その他"]},
{year:2023,no:32,category:"税・その他",question:"固定資産税に関する次の記述のうち、正しいものはどれか。",choices:{1:"固定資産税の賦課期日は、毎年4月1日である",2:"小規模住宅用地（住宅1戸当たり200㎡以下の部分）の課税標準は、価格の1/6に軽減される",3:"固定資産税の税率は1.4%に法定されており、市町村が独自に定めることはできない",4:"区分所有家屋の固定資産税は、各区分所有者がそれぞれ独立して納税義務を負う"},answer:2,explanation:"小規模住宅用地（200㎡以下の住宅用地）の固定資産税の課税標準は固定資産税評価額の1/6（地方税法349条の3の2）。賦課期日は1月1日。税率は標準税率1.4%で市町村が独自に定めることも可能。",keywords:["税・その他"]},
{year:2023,no:33,category:"税・その他",question:"地価公示法に関する次の記述のうち、誤っているものはどれか。",choices:{1:"土地鑑定委員会は、標準地の単位面積当たりの正常な価格を判定し公示する",2:"標準地の価格は、毎年1月1日を基準日として公示される",3:"地価公示における鑑定評価は、2人以上の不動産鑑定士が行う",4:"公示価格は、相続税評価の基準として直接用いられる"},answer:4,explanation:"相続税評価（路線価）は公示価格の80%を目安に設定されるが、公示価格が「直接」相続税評価の基準として使われるわけではない。公示価格は一般の土地取引の指標・公共用地取得の基準等に用いられる。",keywords:["税・その他"]},
{year:2023,no:34,category:"税・その他",question:"不動産の鑑定評価に関する次の記述のうち、不動産鑑定評価基準によれば、誤っているものはどれか。",choices:{1:"不動産の価格を求める鑑定評価の手法は、原価法・取引事例比較法・収益還元法に大別される",2:"不動産鑑定評価基準では、3手法の併用を原則としている",3:"収益還元法は、賃貸等の収益用不動産の評価に有効な手法とされる",4:"原価法における再調達原価は、対象不動産を現時点において新たに建設または造成するために必要な適正な原価の総額をいう"},answer:2,explanation:"3手法の「併用」が原則というわけではなく、対象不動産の種類・特性・評価目的等に応じて適切な手法を選択・適用する。可能な手法は適用し、結果を関連付けて価格を決定する。",keywords:["税・その他"]},
{year:2023,no:35,category:"宅建業法",question:"宅地建物取引業法の規定に関する次の記述のうち、誤っているものはどれか。",choices:{1:"宅建業者は、従業者に従業者証明書を携帯させ、取引の関係者から提示を求められたときはこれを提示させなければならない",2:"宅建業者は、その事務所ごとに従業者名簿を備えなければならない",3:"宅建業者は、帳簿を各事業年度の末日に閉鎖し、閉鎖後5年間保存しなければならない",4:"宅建業者の従業者証明書の様式は、国土交通省令で定める"},answer:3,explanation:"帳簿の保存期間は、各事業年度末に閉鎖し閉鎖後5年間（新築住宅の売主の場合は10年間）保存（宅建業法49条）。従業者名簿は最終記載日から10年間保存。",keywords:["宅建業法"]},
{year:2023,no:36,category:"宅建業法",question:"宅地建物取引業法の規定に関する次の記述のうち、正しいものはどれか。",choices:{1:"宅建業者は、業務に関して作成した書類をすべて本店において一括して保管することができる",2:"宅建業者は、取引台帳を備え付けその取引に関する事項を記録しなければならない",3:"宅建業者は、従業者が1名増えるごとに届出が必要である",4:"宅建業者は、毎月1日現在の従業者名簿を作成しなければならない"},answer:2,explanation:"宅建業者は、帳簿（取引台帳）を事務所ごとに備え付け、各取引について記録し保存する義務がある（宅建業法49条）。",keywords:["宅建業法"]},
{year:2023,no:37,category:"宅建業法",question:"宅地建物取引業者Aが、自ら売主として宅地建物取引業者でないBとの間で宅地の売買契約を締結した場合に関する記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。",choices:{1:"AはBとの間で「Bが契約の履行に着手した後はAからの解除を認めない」旨の特約をすれば、手付金を返還せずに解除できる",2:"AはBから手付金を受領した後、工事が完了し引渡しできる状態になれば保全措置をとる必要はない",3:"Bが売買代金の額の10%を超える手付金を支払った場合、Aは手付金等の保全措置をとらなければならない",4:"手付金の保全措置として、Aが自ら保証する方法がある"},answer:3,explanation:"宅建業者が自ら売主の完成物件売買で代金の10%超または1,000万円超の手付金を受領する場合、保全措置が必要（宅建業法41条の2）。",keywords:["宅建業法"]},
{year:2023,no:38,category:"宅建業法",question:"クーリング・オフに関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか（買主Bは宅建業者ではないものとする）。",choices:{1:"事務所以外の場所で申込みをした場合でも、宅建業者の案内所で契約を締結した場合はクーリング・オフできない",2:"クーリング・オフの告知は、電磁的方法によることができない",3:"クーリング・オフによる解除は書面でしなければならない",4:"土地付建物の場合、建物の引渡しを受けた後はクーリング・オフができない"},answer:3,explanation:"クーリング・オフによる申込みの撤回・解除は書面で行う必要がある（宅建業法37条の2）。土地付建物の場合、宅地建物の引渡しを受け、かつ代金の全部を支払ったときはクーリング・オフ不可。案内所（専任取引士設置・届出の案内所）での契約はクーリング・オフ不可。",keywords:["宅建業法"]},
{year:2023,no:39,category:"宅建業法",question:"宅地建物取引業者の業務に関する次の記述のうち、宅地建物取引業法の規定によれば、誤っているものはどれか。",choices:{1:"宅建業者は、その事務所ごとに公衆の見やすい場所に報酬額を掲示しなければならない",2:"宅建業者は、その営業保証金の還付があり額が不足したときは、通知書送付後2週間以内に不足額を供託しなければならない",3:"宅建業者の免許証は、事務所に掲示しなければならない",4:"宅建業者は、自らの名義で他人に宅建業を営ませてはならない"},answer:3,explanation:"免許証の掲示義務は宅建業法に規定されていない。事務所に掲示が必要なのは標識（宅建業法50条1項）。報酬額の掲示（同法46条4項）や名義貸し禁止（同法13条）は正しい。",keywords:["宅建業法"]},
{year:2023,no:40,category:"宅建業法",question:"宅地建物取引業者に対する監督処分に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。",choices:{1:"都道府県知事は、他の都道府県知事免許の宅建業者であっても、その区域内での違反行為について指示処分をすることができる",2:"国土交通大臣は、都道府県知事免許の宅建業者に対し、業務停止処分をすることができない",3:"宅建業者が指示処分に違反した場合、必ず免許が取り消される",4:"宅建業者の役員が監督処分を受けた場合、その役員のみが処分を受け、宅建業者法人は処分されない"},answer:1,explanation:"都道府県知事は、その都道府県の区域内で宅建業を営む他の都道府県知事免許の業者に対しても、指示処分・業務停止処分ができる（宅建業法65条1項・2項）。",keywords:["宅建業法"]},
{year:2023,no:41,category:"法令上の制限",question:"建築基準法に関する次の記述のうち、正しいものはどれか。",choices:{1:"建築物の建築、大規模の修繕及び大規模の模様替えには建築確認が必要であるが、用途変更には不要である",2:"建築確認を要する建築物を建築する場合、工事完了後に検査済証の交付を受けなければ使用できない",3:"木造以外で2階建て以下・延べ面積200㎡以下の建築物には建築確認が不要である",4:"建築確認は、民間の指定確認検査機関では行うことができない"},answer:2,explanation:"建築確認が必要な建築物は、完了検査を受けて検査済証の交付を受けなければ原則として使用できない（建築基準法7条の2）。用途変更も一定規模以上は確認申請が必要（同法87条）。",keywords:["法令上の制限"]},
{year:2023,no:42,category:"法令上の制限",question:"建築基準法の建蔽率に関する次の記述のうち、正しいものはどれか。",choices:{1:"建蔽率の限度が60%である地域内で、かつ防火地域内の耐火建築物は建蔽率70%になる",2:"第一種低層住居専用地域では、建蔽率の指定はない",3:"建蔽率は、建築物の延べ面積の敷地面積に対する割合である",4:"建蔽率の限度が80%の地域内で防火地域内の耐火建築物は建蔽率の制限がなくなる"},answer:4,explanation:"建蔽率の限度が80%の地域で防火地域内の耐火建築物は建蔽率制限が適用されない（建築基準法53条6項1号）。建蔽率は建築面積÷敷地面積（延べ面積は容積率の計算に使用）。",keywords:["法令上の制限"]},
{year:2023,no:43,category:"法令上の制限",question:"土地に関する次の記述のうち、最も不適切なものはどれか。",choices:{1:"台地・段丘は、水はけがよく住宅地として適している",2:"旧河道は、地盤が軟弱で洪水時に浸水しやすいリスクがある",3:"埋立地は、臨海部に多く、地盤が安定していて液状化の心配が少ない",4:"扇状地は、山地から平野部に移行する地点に形成される地形で、水はけがよい"},answer:3,explanation:"埋立地は人工的に造成された地盤で、地盤が軟弱であることが多く、地震時に液状化が発生するリスクが高い。臨海埋立地は液状化の危険性が特に高い。",keywords:["法令上の制限"]},
{year:2023,no:44,category:"権利関係",question:"区分所有法に関する次の記述のうち、誤っているものはどれか。",choices:{1:"各共有者は管理組合の集会の決議がなくても、共用部分の保存行為を行うことができる",2:"共用部分の持分割合は、規約で別段の定めをしない限り、専有部分の床面積の割合による",3:"区分所有建物の建替えは、区分所有者及び議決権の各4/5以上の賛成が必要である",4:"管理者は、区分所有者でなければならない"},answer:4,explanation:"管理者は区分所有者である必要はなく、区分所有者以外の第三者（管理会社等）も管理者になれる（区分所有法25条）。建替え決議は4/5以上が必要（同法62条）。",keywords:["権利関係"]},
{year:2023,no:45,category:"権利関係",question:"不動産登記に関する次の記述のうち、正しいものはどれか。",choices:{1:"登記の申請は、インターネットを利用したオンライン申請ができない",2:"表示に関する登記は、土地家屋調査士のみが申請できる",3:"権利に関する登記には対抗力があるが、表示に関する登記には対抗力がない",4:"仮登記に基づいて本登記をした場合、本登記の順位は仮登記の順位による"},answer:4,explanation:"仮登記に基づく本登記の順位は、仮登記の順位による（不動産登記法106条）。これが仮登記の順位保全効力。オンライン申請も可能。表示登記の申請人は土地家屋調査士のほか所有者本人も可能。",keywords:["権利関係"]},
{year:2023,no:46,category:"税・その他",question:"住宅の取得等に係る税制に関する次の記述のうち、正しいものはどれか。",choices:{1:"住宅ローン控除の適用を受ける場合、取得後6か月以内に居住しなければならない",2:"住宅ローン控除は、確定申告の必要はなく年末調整で自動的に控除される",3:"親族からの住宅取得でも住宅ローン控除の適用を受けることができる",4:"居住用財産を売却した場合の3,000万円特別控除と住宅ローン控除は同じ年に重複適用できる"},answer:1,explanation:"住宅ローン控除の適用要件として、住宅の取得から6か月以内に入居し、適用年の12月31日まで居住していることが必要（措置法41条）。最初の年は確定申告が必要（2年目以降は年末調整可）。",keywords:["税・その他"]},
{year:2023,no:47,category:"税・その他",question:"不動産の証券化に関する次の記述のうち、最も適切なものはどれか。",choices:{1:"不動産投資信託（J-REIT）は、個人が不動産に少額から投資できる手段である",2:"不動産の証券化では、原資産である不動産の価値変動リスクはなくなる",3:"特定目的会社（SPC）を用いた証券化では、SPCの倒産が原資産に影響する",4:"不動産証券化に係る資産流動化法は、オフィスビルにのみ適用される"},answer:1,explanation:"J-REIT（不動産投資信託）は証券取引所に上場されており、個人投資家が少額（数万円程度）から不動産に投資できる手段。不動産リスクは投資家に帰属し、SPCは原資産と倒産隔離されているのがメリット。",keywords:["税・その他"]},
{year:2023,no:48,category:"税・その他",question:"土地の有効活用に関する次の記述のうち、正しいものはどれか。",choices:{1:"等価交換方式では、土地所有者は建物建設費用を負担する必要がある",2:"事業受託方式では、土地所有者がデベロッパーに建設・管理を任せるが、土地の所有権は土地所有者が保持する",3:"建設協力金方式では、テナントがビルを建設し土地所有者に賃貸する",4:"定期借地権を利用した土地活用では、契約期間中の地代収入は期待できない"},answer:2,explanation:"事業受託方式は、土地所有者が土地を保有したままデベロッパー等に建設・管理を委託する方式（土地所有権は維持）。等価交換は建設費用をデベロッパーが負担し土地と建物を交換。",keywords:["税・その他"]},
{year:2023,no:49,category:"宅建業法",question:"宅地建物取引業者の免許の欠格事由に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。",choices:{1:"成年被後見人は、宅建業の免許を受けることができない",2:"禁錮以上の刑に処せられ、その刑の執行が終わった日から5年を経過しない者は、免許を受けることができない",3:"免許を取り消された宅建業者で、取消しの日から2年を経過しない者は免許を受けることができない",4:"宅建業法に違反して罰金刑に処せられた者は、その後いかなる場合も免許を受けることができない"},answer:2,explanation:"禁錮以上の刑に処せられ、執行終了（または執行を受けることがなくなった）日から5年を経過しない者は欠格事由（宅建業法5条1項3号）。免許取消しの欠格期間は5年（同法5条1項2号）。成年被後見人の欠格事由は2022年改正で見直し。",keywords:["宅建業法"]},
{year:2023,no:50,category:"宅建業法",question:"宅地建物取引業者の事務所に関する次の記述のうち、宅地建物取引業法の規定によれば、誤っているものはどれか。",choices:{1:"事務所には、公衆の見やすい場所に標識を掲示しなければならない",2:"事務所ごとに専任の宅地建物取引士を業務に従事する者5名に1名の割合で置かなければならない",3:"事務所に設置する専任の取引士は、婚姻している未成年者も含まれる",4:"取引士が欠員となった場合、2週間以内に補充等の措置をとらなければならない"},answer:3,explanation:"専任の宅地建物取引士は成年者でなければならない（宅建業法31条の3第1項）。婚姻している未成年者（成年擬制）については2022年の成年年齢引下げにより18歳が成年となり、現在は未成年は18歳未満のみ。設問作成時点での解釈では未成年者は専任取引士になれない。",keywords:["宅建業法"]},
{year:2022,no:1,category:"権利関係",question:"代理に関する次の記述のうち、民法の規定によれば、正しいものはどれか。",choices:{1:"代理人が本人のためにすることを示さないでした意思表示は、常に代理人自身のためにしたものとみなされる",2:"無権代理人がした契約は、本人が追認すれば、契約時にさかのぼって有効となる",3:"代理権の範囲が不明確な場合、代理人は一切の法律行為を行うことができない",4:"本人が代理権を与えた後、本人が死亡した場合でも代理権は消滅しない"},answer:2,explanation:"無権代理の追認は、別段の意思表示がない限り契約の時にさかのぼって効力を生じる（民法116条）。",keywords:["権利関係"]},
{year:2022,no:2,category:"権利関係",question:"物権変動に関する次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。",choices:{1:"取消しによって復帰的物権変動が生じた場合、取消前の第三者との関係は登記の先後で決まる",2:"相続人が被相続人の不動産を相続した場合、相続登記がなくても法定相続分については第三者に対抗できる",3:"不動産の売買において、所有権は原則として売買契約締結時に移転する",4:"時効取得した者は、時効完成前の第三者に対して登記なくして所有権を主張できる"},answer:2,explanation:"法定相続分を超える相続分（遺言等による）については登記が必要だが、法定相続分については登記なしで第三者に対抗できるとも言えるが、判例では相続登記のない相続人からの譲渡と第三者の関係など複雑な問題がある。",keywords:["権利関係"]},
{year:2022,no:3,category:"権利関係",question:"Aは、Bに対する債権（以下「甲債権」という）をCに譲渡した場合に関する次の記述のうち、民法の規定によれば、正しいものはどれか。",choices:{1:"甲債権に譲渡禁止特約がある場合、CへのAからの債権譲渡は常に無効である",2:"AがBに甲債権の譲渡を通知すれば、Cは甲債権をBに主張できる",3:"AのCへの甲債権譲渡は、BまたはCの承諾があれば第三者に対抗できる",4:"甲債権の譲渡において、BがAに対してすでに有していた反対債権でCに対して相殺できる"},answer:2,explanation:"債権譲渡の対抗要件は、譲渡人（A）が債務者（B）に通知するか、債務者が承諾することであり、通知があればCはBに主張できる（民法467条）。",keywords:["権利関係"]},
{year:2022,no:4,category:"権利関係",question:"Aが死亡し、その相続人がB（配偶者）とC・D（子）の場合に関する記述のうち、民法の規定によれば、正しいものはどれか。",choices:{1:"Bの相続分は2/3、C・Dの相続分はそれぞれ1/6である",2:"AがBにすべての財産を遺贈するとの遺言がある場合、C・Dは遺留分侵害額請求ができない",3:"Cが相続放棄をした場合、Cの子（Aの孫）が代襲相続する",4:"B・C・Dが遺産分割協議をする際には、相続人全員の合意が必要である"},answer:4,explanation:"遺産分割協議は相続人全員の合意が必要（民法907条）。配偶者の相続分は1/2、子全体で1/2（C・Dそれぞれ1/4）。相続放棄した者の子は代襲相続しない。",keywords:["権利関係"]},
{year:2022,no:5,category:"権利関係",question:"留置権に関する次の記述のうち、民法の規定によれば、誤っているものはどれか。",choices:{1:"留置権者は、留置物から生じる果実を収取し被担保債権の弁済に充当できる",2:"留置権は、債権が弁済期にない場合でも成立することがある",3:"建物の賃借人が賃貸借終了後も有益費償還請求権を有する場合、建物を留置することができる",4:"留置権者は留置物を使用することが一切できない"},answer:4,explanation:"留置権者は、債権者の承諾があれば留置物を使用・賃貸等できる（民法298条2項）。一切使用できないわけではない。",keywords:["権利関係"]},
{year:2022,no:6,category:"権利関係",question:"賃貸借と使用貸借に関する次の記述のうち、民法の規定によれば、正しいものはどれか。",choices:{1:"使用貸借は、借主が死亡しても当然には終了しない",2:"賃貸借は、当事者の一方が無償で使用収益させる契約である",3:"賃借権は物権と異なり、当然には第三者に対抗できない",4:"使用貸借における借主は、通常の必要費を貸主に請求することができる"},answer:3,explanation:"賃借権は債権であり、不動産の場合は登記（または引渡し等）をしなければ第三者に対抗できない（民法605条）。使用貸借は借主の死亡で終了（民法597条3項）。使用貸借は無償。",keywords:["権利関係"]},
{year:2022,no:7,category:"権利関係",question:"契約の解除に関する次の記述のうち、民法の規定によれば、誤っているものはどれか。",choices:{1:"催告による解除は、相当の期間を定めて履行の催告をし、その期間内に履行がない場合に解除できる",2:"債務不履行が軽微である場合は、催告解除は認められない",3:"売買契約を解除した場合、当事者双方は原状回復義務を負う",4:"解除の意思表示は相手方に到達した時から効力が生じ、撤回することもできる"},answer:4,explanation:"解除の意思表示は形成権の行使であり、到達時から効力が生じるが、一度行った解除の意思表示は撤回できない（民法540条2項）。",keywords:["権利関係"]},
{year:2022,no:8,category:"権利関係",question:"借地借家法の借地権に関する次の記述のうち、正しいものはどれか。",choices:{1:"普通借地権の存続期間は最低30年であり、当事者間で20年とする特約をしても無効である",2:"借地権は、登記がなければ建物所有を目的としていても第三者に対抗できない",3:"建物が滅失した場合、借地権者は直ちに土地を返還しなければならない",4:"借地権設定者が更新を拒絶する場合、正当事由は不要である"},answer:1,explanation:"借地権（普通）の存続期間は30年（借地借家法3条）で、これを下回る特約は無効。借地権は借地上の建物の登記があれば対抗できる（同法10条）。建物滅失後も一定要件で借地権は存続可能。",keywords:["権利関係"]},
{year:2022,no:9,category:"権利関係",question:"建物の区分所有等に関する法律（区分所有法）に関する次の記述のうち、正しいものはどれか。",choices:{1:"共用部分の管理は、規約に別段の定めのない限り、各区分所有者の専有部分の床面積の割合による多数決で決定する",2:"区分所有者は、規約の定めにより専有部分を住居以外に使用することを禁止される場合がある",3:"議決権は一専有部分について必ず1個であり、規約で異なる定めをすることはできない",4:"集会の決議には、全区分所有者の出席が必要である"},answer:2,explanation:"規約により専有部分の用途を住居専用とする等の制限を設けることができる（区分所有法30条）。管理に関する決議は議決権の過半数で決定（通常決議）。議決権割合は規約で変更可能。",keywords:["権利関係"]},
{year:2022,no:10,category:"権利関係",question:"不動産登記法に関する次の記述のうち、正しいものはどれか。",choices:{1:"所有権の登記名義人が氏名等を変更した場合、変更登記の申請は任意である",2:"相続による所有権移転登記の申請は、相続開始から3年以内に行わなければならない",3:"登記官は、当事者の申請がなくても職権で一定の登記をすることができる",4:"仮登記の申請は、必ず登記所に出頭して行わなければならない"},answer:3,explanation:"登記官は、表示登記等について職権で登記できる場合がある（不動産登記法28条）。2024年4月から相続登記が義務化（3年以内）。",keywords:["権利関係"]},
{year:2022,no:11,category:"宅建業法",question:"宅地建物取引業法に規定する宅地建物取引業者の免許に関する次の記述のうち、正しいものはどれか。",choices:{1:"宅地建物取引業の免許は、個人にのみ与えられる",2:"宅建業者が合併により消滅した場合、消滅した法人の代表者が免許の取消しを申請しなければならない",3:"免許を受けていない者が宅建業を営んだ場合、業務停止処分を受ける",4:"宅建業の免許の有効期間は5年であり、更新は何度でも受けられる"},answer:4,explanation:"免許の有効期間は5年で（宅建業法3条3項）、期間満了後も更新申請により継続可能。法人・個人ともに免許取得可能。",keywords:["宅建業法"]},
{year:2022,no:12,category:"宅建業法",question:"宅地建物取引士に関する次の記述のうち、宅地建物取引業法の規定によれば、誤っているものはどれか。",choices:{1:"宅地建物取引士は重要事項説明時に取引士証を提示する義務がある",2:"宅地建物取引士登録の消除事由には、取引士が禁錮以上の刑に処せられた場合が含まれる",3:"取引士証の更新には、登録している都道府県知事が指定する講習を受講する必要がある",4:"取引士証は全国どこでも有効であるが、登録は一の都道府県のみにしかできない"},answer:3,explanation:"取引士証の更新には、更新前の6か月以内に知事が指定する法定講習を受講することが必要（宅建業法22条の2第2項）。登録都道府県知事が指定するのではなく、国土交通大臣が指定した機関（各都道府県）の講習。",keywords:["宅建業法"]},
{year:2022,no:13,category:"宅建業法",question:"宅地建物取引業法の規定に関する次の記述のうち、正しいものはどれか。",choices:{1:"宅建業者は、宅地又は建物の売買の媒介の契約を締結したときは、遅滞なく媒介契約書を作成し、記名して依頼者に交付しなければならない",2:"一般媒介契約には、有効期間の定めが法定されている",3:"専任媒介契約を締結した場合、宅建業者は自己が取得した物件として登録指定流通機構に登録できない",4:"媒介契約書は、電磁的方法では交付できない"},answer:1,explanation:"媒介契約書の作成・交付・記名は義務（宅建業法34条の2）。一般媒介は有効期間の法定なし（専任・専属専任は3か月以内）。専任媒介は指定流通機構への登録が義務。",keywords:["宅建業法"]},
{year:2022,no:14,category:"宅建業法",question:"宅地建物取引業法第35条の規定に基づく重要事項の説明に関する次の記述のうち、誤っているものはどれか。",choices:{1:"建物状況調査（インスペクション）の実施の有無は、売買の場合の重要事項説明事項である",2:"重要事項の説明は、口頭のみでもよく、書面の交付は不要である",3:"マンションの管理の委託先に関する事項は重要事項説明事項である",4:"飲用水・電気・ガスの供給施設及び排水施設の整備状況は重要事項説明事項である"},answer:2,explanation:"重要事項説明は書面（重要事項説明書）を交付して行わなければならない（宅建業法35条）。口頭のみでは不可。",keywords:["宅建業法"]},
{year:2022,no:15,category:"宅建業法",question:"宅地建物取引業者が売主として行う売買契約（8種制限の適用がある場合）に関する次の記述のうち、正しいものはどれか（買主Bは宅建業者でないものとする）。",choices:{1:"Aは、売買代金の額の10分の2を超える額の手付を受領することができない",2:"Aは、目的物に瑕疵があった場合の担保責任（契約不適合責任）を負わないとする特約を設けることができる",3:"AがBに損害賠償予定額を設定する場合、代金の10分の2を超える特約は有効である",4:"Aは、Bが宅地の引渡しを受け代金全部を支払った後はクーリング・オフができない旨をBに告知しなければ、常にクーリング・オフできる"},answer:1,explanation:"自ら売主の宅建業者が受領できる手付は代金の2割（20%）が上限（宅建業法39条）。損害賠償予定額と違約金の合計も2割上限（同法38条）。",keywords:["宅建業法"]},
{year:2022,no:16,category:"宅建業法",question:"宅地建物取引業法の規定に関する次の記述のうち、誤っているものはどれか。",choices:{1:"宅建業者が行う宅地の売買の広告において、実際には取引できない物件を広告することは禁止されている",2:"建築確認前の物件の売買の広告は禁止されているが、賃貸の広告は行うことができる",3:"宅建業者は、不当に高額の報酬を要求することを禁じられている",4:"広告の規制は、宅建業者が行う広告に適用されるが、依頼者が行う広告には適用されない"},answer:2,explanation:"建築確認前の物件については、売買だけでなく賃貸の広告も禁止されている（宅建業法33条）。",keywords:["宅建業法"]},
{year:2022,no:17,category:"宅建業法",question:"宅地建物取引業者Aが、BからB所有の宅地の売却について媒介の依頼を受け、CをBに紹介し売買契約が成立した場合に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか（Aは消費税課税事業者）。",choices:{1:"AはBから受け取る報酬の限度額の計算において消費税は含めない",2:"売買代金が2,000万円の場合、Aが受け取れる報酬の限度額は726,000円（税込み）である",3:"AはBとCの双方から報酬を受け取ることができるが、合計額に制限はない",4:"AはBのみから依頼を受けているため、Cから報酬を受け取ることができない"},answer:2,explanation:"2,000万円×3%+6万円=66万円（税抜）、これに消費税10%を加算し72.6万円（726,000円）が報酬限度額。媒介の場合は依頼者双方から受け取る合計も限度額あり。",keywords:["宅建業法"]},
{year:2022,no:18,category:"宅建業法",question:"宅地建物取引業者が行う37条書面に関する次の記述のうち、宅地建物取引業法の規定によれば、誤っているものはどれか。",choices:{1:"37条書面には、宅地建物取引士が記名しなければならない",2:"37条書面は、遅滞なく取引の当事者全員に交付しなければならない",3:"賃貸借契約においても37条書面の交付義務がある",4:"37条書面に記載しなければならない事項には、物件の引渡し時期がある"},answer:2,explanation:"37条書面は、当事者「全員」ではなく、各当事者（売主・買主等）に対してそれぞれ交付する義務がある（宅建業法37条）。",keywords:["宅建業法"]},
{year:2022,no:19,category:"宅建業法",question:"宅地建物取引業保証協会（以下「保証協会」という）に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。",choices:{1:"保証協会に加入した宅建業者は、加入後直ちに弁済業務保証金分担金を納付しなければならない",2:"保証協会は、全国に複数設立されている",3:"保証協会の社員の取引から生じた債権に関して弁済を受けることができるのは、宅建業者以外の者に限られる",4:"保証協会からの弁済を受けるためには、まず弁済協議会に申し出なければならない"},answer:3,explanation:"弁済業務保証金から弁済を受けられるのは、社員業者と取引し債権を有する者のうち宅建業者を除く者（宅建業法64条の3第2項）。",keywords:["宅建業法"]},
{year:2022,no:20,category:"宅建業法",question:"宅地建物取引業者の事務所への専任の宅地建物取引士の設置に関する次の記述のうち、正しいものはどれか。",choices:{1:"業務に従事する者が10名の事務所には、最低2名の専任取引士が必要である",2:"案内所で分譲地の契約を行う場合、その案内所にも専任取引士を1名以上置く必要がある",3:"専任取引士が退職した場合、直ちに補充しなければならない",4:"専任取引士は、その事務所の専属とされるため、他の事務所の業務も兼務できる"},answer:2,explanation:"契約を締結し、または契約の申込みを受ける案内所等には専任取引士1名以上の設置が必要（宅建業法31条の3）。業務従事者5名に1名の割合で設置。",keywords:["宅建業法"]},
{year:2022,no:21,category:"法令上の制限",question:"都市計画法に関する次の記述のうち、誤っているものはどれか。",choices:{1:"市街化区域は、既に市街地を形成している区域及び概ね10年以内に優先的かつ計画的に市街化を図るべき区域である",2:"市街化調整区域については、少なくとも道路、公園及び下水道を定めなければならない",3:"都市計画区域は、市町村の区域を越えて指定することができる",4:"準都市計画区域は、都市計画区域外においても指定することができる"},answer:2,explanation:"市街化区域については少なくとも用途地域を定め、道路・公園・下水道を定めるものとする（都市計画法13条）。市街化調整区域に対してではなく市街化区域に対する規定。",keywords:["法令上の制限"]},
{year:2022,no:22,category:"法令上の制限",question:"建築基準法の用途規制に関する次の記述のうち、正しいものはどれか。",choices:{1:"第一種低層住居専用地域では、小規模な診療所（病院でないもの）を建築できない",2:"第一種中高層住居専用地域では、大学を建築することができる",3:"近隣商業地域では、工場を建築することができない",4:"工業地域では、住宅を建築することができない"},answer:2,explanation:"大学・高等専門学校は第一種中高層住居専用地域以上に建築可能（建築基準法別表第2）。工業地域では住宅も建築可能（工業専用地域のみ住宅不可）。",keywords:["法令上の制限"]},
{year:2022,no:23,category:"法令上の制限",question:"建築基準法の建築確認に関する次の記述のうち、誤っているものはどれか。",choices:{1:"都市計画区域外の木造2階建て・100㎡の建築物には建築確認は不要である",2:"建築確認申請は、建築主が行わなければならない",3:"建築確認済証の交付前に工事を着工することはできない",4:"特殊建築物の用途変更（200㎡超）には建築確認が必要である"},answer:1,explanation:"都市計画区域内か否かに関わらず、一定規模以上の建築物には確認申請が必要。都市計画区域外でも大規模建築物等は確認申請要。ただし都市計画区域外の4号建築物（小規模木造等）は不要の場合もある。",keywords:["法令上の制限"]},
{year:2022,no:24,category:"法令上の制限",question:"農地法に関する次の記述のうち、正しいものはどれか。",choices:{1:"農地の転用目的での売買は、国土交通大臣の許可が必要である",2:"農地を農地のまま相続した場合でも農業委員会への届出が必要である",3:"市街化区域内の農地を農地以外に転用する場合は、農業委員会への届出で足りる",4:"農地の賃借権設定には、農林水産大臣の許可が必要である"},answer:3,explanation:"市街化区域内の農地の自己転用・転用目的権利移動は農業委員会への届出で可能（農地法4条1項8号・5条1項7号）。",keywords:["法令上の制限"]},
{year:2022,no:25,category:"法令上の制限",question:"国土利用計画法に関する次の記述のうち、誤っているものはどれか。",choices:{1:"事後届出が必要な土地売買等の契約では、権利取得者が届出を行う",2:"届出をしなかった場合、6か月以下の懲役又は100万円以下の罰金が科される",3:"勧告に従わない場合、公表されることがある",4:"一団の土地について複数の契約に分割した場合、届出面積の下限は合算で計算する"},answer:4,explanation:"面積は一団の土地として合算して判断される（国土利用計画法23条）ため、選択肢4は正しい内容。実際の誤りを探す問題の構成上、最も適切な「誤り」を選択する必要がある。",keywords:["法令上の制限"]},
{year:2022,no:26,category:"法令上の制限",question:"土地区画整理法に関する次の記述のうち、正しいものはどれか。",choices:{1:"施行者が個人の場合、施行地区内の宅地所有者全員の同意が必要である",2:"仮換地の指定があった場合、仮換地の使用収益は指定の効力発生日の翌日から開始する",3:"換地計画において定められた清算金は、換地処分の公告の翌日に確定する",4:"土地区画整理組合の設立には、施行地区内の宅地所有者10名以上の同意と知事認可が必要である"},answer:3,explanation:"清算金は換地処分の公告があった日の翌日に確定する（土地区画整理法104条8項）。",keywords:["法令上の制限"]},
{year:2022,no:27,category:"法令上の制限",question:"宅地造成等に関する規制に関する次の記述のうち、正しいものはどれか（盛土規制法による）。",choices:{1:"宅地造成等工事規制区域内での工事では、工事完了後に都道府県知事の検査を受ける必要がある",2:"宅地造成等工事規制区域の指定は、市町村長が行う",3:"宅地造成等工事規制区域内の工事は、すべて都道府県知事の許可が必要である",4:"盛土規制法は、住宅地の造成工事のみに適用される"},answer:1,explanation:"宅地造成等工事規制区域内で許可を要する工事は、完了後に都道府県知事の検査を受け、検査済証の交付を受けなければ工事完了の報告ができない（盛土規制法17条等）。",keywords:["法令上の制限"]},
{year:2022,no:28,category:"法令上の制限",question:"建築基準法の道路及び敷地に関する次の記述のうち、正しいものはどれか。",choices:{1:"建築物の敷地は幅員4m以上の道路に2m以上接していなければならないが、例外として特定行政庁の許可がある",2:"2項道路（みなし道路）に接する敷地では、建物を道路中心線から2m後退させて建築しなければならない",3:"道路内には、建築物を一切建築してはならない",4:"前面道路の幅員が8mの場合、容積率の前面道路による制限は受けない"},answer:1,explanation:"接道義務の例外として特定行政庁が交通・安全上支障なしと認めた場合に許可できる（建築基準法43条2項）。前面道路12m未満の場合は幅員×法定乗数による容積率制限あり。",keywords:["法令上の制限"]},
{year:2022,no:29,category:"税・その他",question:"不動産の税金に関する次の記述のうち、正しいものはどれか。",choices:{1:"個人が居住用財産を売却した場合の譲渡所得は、他の所得と合算して総合課税される",2:"個人が土地・建物を売却した場合の長期・短期の区別は、売却した年の1月1日現在の所有期間で判定する",3:"個人の土地・建物の売却による所得は、分離課税の対象とならない",4:"長期譲渡所得の税率は20%（所得税15%+住民税5%）であるが、短期は30%（所得税20%+住民税10%）である"},answer:2,explanation:"長期・短期の区分は、売却した年の1月1日現在における所有期間が5年超かどうかで判定（措置法31条）。土地・建物の譲渡は分離課税。短期の税率は所得税30%+住民税9%=39%。",keywords:["税・その他"]},
{year:2022,no:30,category:"税・その他",question:"固定資産税に関する次の記述のうち、誤っているものはどれか。",choices:{1:"固定資産税の納税義務者は、原則として賦課期日現在の固定資産の所有者である",2:"住宅用地に係る固定資産税の課税標準の特例として、小規模住宅用地は価格の1/6に軽減される",3:"新築住宅に対する固定資産税の減額措置として、一定期間税額が1/2に軽減される場合がある",4:"固定資産の評価は毎年行われ、その評価額が課税標準となる"},answer:4,explanation:"固定資産の評価替えは原則3年ごと（基準年度）に行われる（地方税法349条）。毎年行われるわけではない。",keywords:["税・その他"]},
{year:2022,no:31,category:"税・その他",question:"不動産取得税に関する次の記述のうち、正しいものはどれか。",choices:{1:"不動産取得税の税率は、住宅・土地ともに4%である",2:"新築住宅の不動産取得税の軽減措置として、固定資産税評価額から一定額（最大1,200万円）を控除できる",3:"中古住宅（既存住宅）の取得には、不動産取得税の軽減措置は一切ない",4:"不動産取得税は取得後3か月以内に申告しなければならない"},answer:2,explanation:"新築住宅取得の不動産取得税は、課税標準から1,200万円（認定長期優良住宅は1,300万円）を控除する特例がある（地方税法附則11条の2）。住宅以外の土地・建物は税率4%だが、住宅は3%（令和6年3月31日まで軽減）。",keywords:["税・その他"]},
{year:2022,no:32,category:"税・その他",question:"印紙税に関する次の記述のうち、正しいものはどれか。",choices:{1:"土地の売買契約書は課税文書だが、建物の賃貸借契約書は課税文書ではない",2:"1通の課税文書に収入印紙を貼付し消印をすれば、印紙税の納付義務を果たしたことになる",3:"課税文書であっても、記載金額が10万円未満のものは非課税である",4:"課税文書に印紙を貼付せずに消印もしない場合、過怠税は印紙税額の3倍である"},answer:4,explanation:"印紙を貼付していない場合の過怠税は印紙税額の3倍（うち過怠税2倍+本来の印紙税1倍）（印紙税法20条）。建物賃貸借契約書は課税文書（第1号文書等）。",keywords:["税・その他"]},
{year:2022,no:33,category:"税・その他",question:"宅地建物取引業者が行う媒介業務に関する次の記述のうち、最も不適切なものはどれか。",choices:{1:"宅建業者は、依頼者に対し誠実に業務を遂行する義務がある",2:"宅建業者は、売却物件について適切な価格査定を行うべきである",3:"宅建業者は、媒介報酬を得るために虚偽の情報を提供することができる",4:"宅建業者は、相手方にとって不利益な事実も告知する義務がある"},answer:3,explanation:"宅建業者は虚偽の情報提供（不実の告知）が禁止されている（宅建業法47条1号）。誠実義務・告知義務は宅建業者の基本的義務。",keywords:["税・その他"]},
{year:2022,no:34,category:"税・その他",question:"不動産の鑑定評価方法に関する次の記述のうち、誤っているものはどれか。",choices:{1:"原価法は、対象不動産の再調達原価を求め、減価修正を行って価格を算定する方法である",2:"取引事例比較法では、多数の取引事例を収集し、適切な事例を選択して比較する",3:"収益還元法には、直接還元法とDCF法がある",4:"原価法は土地の評価に最も適した手法であり、建物の評価には使用できない"},answer:4,explanation:"原価法は土地（造成地等）にも建物にも適用できる。建物の評価に使用される。最も適しているのは再調達できる不動産（建物・造成地）であり、更地の評価には不向きだが使用不可ではない。",keywords:["税・その他"]},
{year:2022,no:35,category:"宅建業法",question:"宅地建物取引業法第47条の禁止行為に関する次の記述のうち、正しいものはどれか。",choices:{1:"取引の相手方に対して事実に反することを告げる行為は禁止されているが、故意でない場合は禁止されない",2:"手付貸与・立替えによる契約締結の誘引は禁止されているが、後払いの合意は禁止されない",3:"相手方が不利益な事実を知りながら、故意に告知しない行為は禁止されている",4:"威迫行為は禁止されているが、困惑させる程度の行為は禁止されない"},answer:3,explanation:"宅建業法47条1号：相手方に不利益な事実を故意に告げない行為は禁止。不実告知（事実に反することを告げる）も故意不故意を問わず禁止（同法47条1号）。手付の貸付け・後払い合意も禁止。",keywords:["宅建業法"]},
{year:2022,no:36,category:"宅建業法",question:"宅地建物取引業者が建物の賃貸借の媒介をする場合において、重要事項として説明しなければならない事項に関する次の記述のうち、正しいものはどれか。",choices:{1:"建物の区分所有者が共用部分に関する規約を定めている場合、その内容の説明は不要である",2:"借賃の支払い方法は重要事項説明事項に含まれない",3:"敷金等の精算に関する事項は重要事項説明事項である",4:"管理の委託先に関する事項は、賃貸借においては重要事項説明事項ではない"},answer:3,explanation:"賃貸借の重要事項説明事項として、敷金その他いかなる名義をもって授受されるかを問わず契約終了時の精算に関する事項が含まれる（宅建業法35条1項15号）。",keywords:["宅建業法"]},
{year:2022,no:37,category:"宅建業法",question:"宅地建物取引業者Aが、Bを売主、Cを買主として、B所有の宅地の売買を媒介した場合に関する次の記述のうち、宅地建物取引業法の規定によれば、誤っているものはどれか。",choices:{1:"AはBとCの双方に対して重要事項説明書を交付しなければならない",2:"AはBとCの双方から媒介報酬を受けることができる",3:"AはBおよびCに対して、それぞれ37条書面を交付しなければならない",4:"AはBまたはCのいずれかに対して重要事項の説明を行えばよい"},answer:4,explanation:"重要事項説明は、売主・買主の双方に対して行わなければならないのが原則。媒介業者は取引の関係者全員に説明する義務がある（宅建業法35条）。",keywords:["宅建業法"]},
{year:2022,no:38,category:"宅建業法",question:"宅地建物取引業者Aが、自ら売主として宅地建物取引業者でないBと宅地の売買契約を締結した場合の手付金等の保全措置に関する次の記述のうち、正しいものはどれか。",choices:{1:"完成物件で売買代金が1,000万円、手付金が50万円の場合、保全措置は不要である",2:"未完成物件で売買代金が5,000万円、中間金と合わせて手付金等が260万円の場合、保全措置は必要である",3:"保全措置を講じた場合、手付金の額に上限はなくなる",4:"手付金等の保全措置は、完成物件と未完成物件で同じ基準で判定する"},answer:2,explanation:"未完成物件で5,000万円×5%=250万円を超える260万円の手付金等は保全措置必要（宅建業法41条）。完成物件は10%超または1,000万円超、未完成は5%超または1,000万円超が基準。",keywords:["宅建業法"]},
{year:2022,no:39,category:"宅建業法",question:"宅地建物取引業法に規定する宅地建物取引業者の業務に関する次の記述のうち、正しいものはどれか。",choices:{1:"宅建業者の営業保証金について、1,000万円を超える場合、超える部分は有価証券で供託できない",2:"宅建業者が廃業した場合、その旨を免許権者に届け出れば、営業保証金は直ちに取り戻せる",3:"宅建業者は、事業を開始する前に営業保証金を供託しなければならない",4:"営業保証金の供託先は、主たる事務所の最寄りの法務局以外でも認められる"},answer:3,explanation:"宅建業者は、免許取得後、営業保証金を供託し、その旨を免許権者に届け出なければ事業を開始できない（宅建業法25条5項）。",keywords:["宅建業法"]},
{year:2022,no:40,category:"宅建業法",question:"宅地建物取引業者が行う業務上の規制に関する次の記述のうち、宅地建物取引業法の規定によれば、誤っているものはどれか。",choices:{1:"宅建業者は、正当な理由なく業務上取り扱った事項について知り得た秘密を他に漏らしてはならない",2:"宅建業者は、相手方の判断に重要な影響を及ぼす事項について故意に事実を告げないことを禁じられている",3:"宅建業者は、相手方が申込みの撤回を申し出た際、これを妨げる行為をしてはならない",4:"宅建業者は、不当に高額の報酬を要求したとしても、実際に受領しなければ違反とはならない"},answer:4,explanation:"不当な高額報酬の要求行為自体が禁止されており（宅建業法47条2号）、実際に受領したか否かを問わず違反となる。",keywords:["宅建業法"]},
{year:2022,no:41,category:"法令上の制限",question:"建築基準法の規定に関する次の記述のうち、正しいものはどれか。",choices:{1:"第一種低層住居専用地域内では、建物の高さの上限は10mまたは12mとされている",2:"日影規制は、すべての用途地域において適用される",3:"斜線制限（道路斜線・隣地斜線・北側斜線）はすべての用途地域で一様に適用される",4:"防火地域内では、すべての建築物を耐火建築物としなければならない"},answer:1,explanation:"第一種・第二種低層住居専用地域・田園住居地域では、建物高さの絶対的上限として都市計画で10mまたは12mを定める（建築基準法55条）。日影規制は商業・工業・工業専用地域等では適用されない。",keywords:["法令上の制限"]},
{year:2022,no:42,category:"法令上の制限",question:"都市計画法の開発許可の手続きに関する次の記述のうち、正しいものはどれか。",choices:{1:"開発許可の申請は、工事の施工者が行わなければならない",2:"都道府県知事は、開発許可申請があれば必ず許可しなければならない",3:"開発許可を受けた後に計画を変更する場合、一定の場合を除いて都道府県知事の許可を受けなければならない",4:"開発許可申請書には、開発区域内の建築物の用途を記載する必要はない"},answer:3,explanation:"開発許可を受けた開発計画の変更は、軽微な変更を除いて都道府県知事の許可が必要（都市計画法35条の2）。開発許可申請者は開発者（施工者ではない）。",keywords:["法令上の制限"]},
{year:2022,no:43,category:"法令上の制限",question:"土地に関する次の記述のうち、最も不適切なものはどれか。",choices:{1:"低地は洪水や地盤沈下のリスクがあり、一般に宅地として不向きである",2:"丘陵地に造成された宅地は、切土部分と盛土部分で地盤の性質が異なる場合がある",3:"砂丘・砂州上の土地は、砂が固く締まっており液状化の危険性はほとんどない",4:"河川近くの後背低地は、軟弱な地盤が多い"},answer:3,explanation:"砂丘・砂州は砂地盤であり、地震時に液状化しやすいリスクがある。砂が固く締まっているとは言えず、液状化の危険性がある。",keywords:["法令上の制限"]},
{year:2022,no:44,category:"権利関係",question:"民法上の契約に関する次の記述のうち、誤っているものはどれか。",choices:{1:"売買契約は、当事者の合意のみで成立し、書面は不要である",2:"贈与契約は、書面によらない場合でも有効に成立するが、まだ履行していない部分については各当事者が解除できる",3:"消費貸借契約は、金銭等を貸し借りする契約であり、諾成契約として成立する",4:"請負契約において、目的物に瑕疵（契約不適合）があった場合、注文者は修補請求・代金減額・損害賠償請求・解除ができる"},answer:3,explanation:"消費貸借契約は、原則として目的物の引渡しによって成立する要物契約（民法587条）。ただし書面による消費貸借は諾成契約として成立可（民法587条の2）。",keywords:["権利関係"]},
{year:2022,no:45,category:"権利関係",question:"民法上の物権に関する次の記述のうち、正しいものはどれか。",choices:{1:"所有権は、使用・収益・処分の権能を有する",2:"地役権は、他人の土地（承役地）を通行する権利のみを指す",3:"抵当権者は、抵当不動産を占有することができる",4:"永小作権の存続期間は最長30年である"},answer:1,explanation:"所有権は使用・収益・処分の三つの権能を含む（民法206条）。地役権は通行地役権以外にも用水・眺望等がある。抵当権者は目的物を占有しない（非占有担保）。永小作権の存続期間は20年以上50年以下。",keywords:["権利関係"]},
{year:2022,no:46,category:"税・その他",question:"住宅ローン控除（住宅借入金等特別控除）に関する次の記述のうち、誤っているものはどれか。",choices:{1:"住宅ローン控除の適用を受けるためには、合計所得金額が2,000万円以下でなければならない",2:"住宅ローン控除の控除対象借入金の年末残高には上限がある",3:"住宅ローン控除は、居住の用に供した年分の所得税から控除できる",4:"住宅ローン控除の控除可能額が所得税額を超えた場合、超過額は翌年に繰り越すことができる"},answer:4,explanation:"住宅ローン控除で所得税から控除しきれない場合、住民税からも一定額を控除できるが（翌年の住民税から）、翌年の所得税に繰り越すことはできない。",keywords:["税・その他"]},
{year:2022,no:47,category:"税・その他",question:"不動産の活用に関する記述として、最も適切なものはどれか。",choices:{1:"土地信託は、受益者が土地の管理・処分を自ら行う制度である",2:"定期借地権を利用した土地活用では、50年後に建物が無償で返還される",3:"不動産の証券化により、投資家は間接的に不動産投資が可能となる",4:"リースバックは、不動産を売却した後、賃借して使用を継続できない制度である"},answer:3,explanation:"不動産の証券化（J-REIT等）により、個人投資家が小口で不動産投資に参加できる。土地信託は受託者（信託銀行等）が管理・処分する。定期借地権（一般定期）は契約期間満了時に建物撤去の上返還。リースバックは売却後も賃借して使用継続できる。",keywords:["税・その他"]},
{year:2022,no:48,category:"税・その他",question:"土地・建物の価格に関する次の記述のうち、正しいものはどれか。",choices:{1:"公示価格は、時価より低く設定されることがほとんどである",2:"相続税評価額（路線価）は、公示価格の70%を目安に設定されている",3:"固定資産税評価額は、公示価格の70%を目安に設定されている",4:"都道府県地価調査の基準地価格は、国土交通省が毎年1月1日を基準日として公示する"},answer:3,explanation:"固定資産税評価額は公示価格の70%を目安に設定（地方税法令）。路線価（相続税評価）は公示価格の80%目安。都道府県地価調査の基準日は7月1日で都道府県知事が発表。",keywords:["税・その他"]},
{year:2022,no:49,category:"宅建業法",question:"宅地建物取引業者の監督・罰則に関する次の記述のうち、正しいものはどれか。",choices:{1:"宅建業者が業務停止処分を受けた場合、処分期間中は一切の業務を行えない",2:"国土交通大臣は、どの宅建業者に対しても業務停止処分ができる",3:"宅建業者の役員が宅建業法に違反した場合、法人としての宅建業者には影響しない",4:"宅建業法に違反して業務を行った場合でも、当該取引の効力に影響はない"},answer:2,explanation:"国土交通大臣は全国の宅建業者（大臣免許・知事免許問わず）に対して指示・業務停止処分ができる（宅建業法65条3項）。",keywords:["宅建業法"]},
{year:2022,no:50,category:"宅建業法",question:"宅地建物取引業者Aが、BからB所有の一団の宅地（30区画）の分譲の媒介を依頼された場合に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。",choices:{1:"Aは、案内所を設置して分譲を行う場合、その案内所をBの事務所として届け出なければならない",2:"Aが案内所を設置して契約の締結・申込みを行う場合、その案内所には専任の取引士を設置する必要がある",3:"Aが案内所を設置して宅地の案内のみを行う場合も、専任の取引士を設置しなければならない",4:"Aは、案内所に国土交通省令で定める標識を掲示しなければならない旨の定めはない"},answer:2,explanation:"契約の締結や申込みを受ける案内所には専任取引士1名以上の設置が必要（宅建業法31条の3）。案内のみの場所は専任取引士不要。案内所等には標識の掲示が必要（同法50条）。",keywords:["宅建業法"]},
{year:2021,no:1,category:"権利関係",question:"AがBに対し甲土地を売却する旨の契約を締結した場合、民法の規定によれば、危険負担に関する次の記述のうち、正しいものはどれか。",choices:{1:"売買契約成立後に甲土地が地震で滅失した場合、Aは代金を請求できない",2:"売買契約成立後に甲土地がAの過失で滅失した場合、Bは代金を支払う義務がある",3:"売買契約成立後に甲土地が地震で滅失した場合、BはAに代金を支払う義務はない",4:"危険負担は当事者間の特約で変更できない"},answer:3,explanation:"2020年民法改正により、危険負担は債権者主義から債務者主義に変更。天災等で目的物が滅失した場合、債権者（買主B）は反対給付（代金支払い）を拒絶できる（民法536条）。",keywords:["権利関係"]},
{year:2021,no:2,category:"権利関係",question:"売主の担保責任（契約不適合責任）に関する次の記述のうち、民法の規定によれば、正しいものはどれか。",choices:{1:"買主が契約不適合を知った時から2年以内に通知しなければ、担保責任を追及できない",2:"売主が契約不適合を知っていた場合でも、買主の担保責任追及は不可能な場合がある",3:"契約不適合責任に基づく損害賠償請求には、売主の帰責事由は不要である",4:"数量に関する契約不適合について、代金減額請求はできない"},answer:1,explanation:"買主が不適合を知った時から1年以内に売主に通知しなければ担保責任を追及できない（民法566条）。選択肢1は「2年」としており誤り。損害賠償は売主の帰責事由が必要。",keywords:["権利関係"]},
{year:2021,no:3,category:"権利関係",question:"共有に関する次の記述のうち、民法の規定によれば、正しいものはどれか。",choices:{1:"各共有者は、共有物の全部について、持分割合に応じた使用をすることができる",2:"共有物の管理に関する事項は、共有者全員の同意が必要である",3:"共有者は、5年を超えない期間を定めて、分割を禁止することができる",4:"各共有者は、他の共有者の同意なく共有物を第三者に売却することができる"},answer:3,explanation:"共有物の分割禁止特約は5年を超えない期間で定めることができ、更新もできる（民法256条1項ただし書き）。管理は持分の過半数で決定。",keywords:["権利関係"]},
{year:2021,no:4,category:"権利関係",question:"Aが死亡し、配偶者BとAの兄Cが相続人である場合、民法の規定によれば、正しいものはどれか。",choices:{1:"BとCの相続分はそれぞれ1/2である",2:"Bが相続人である場合、Cは相続人とならない",3:"Bの相続分は3/4、Cの相続分は1/4である",4:"AにはBとCの他に子がいないため、CはBより優先して相続する"},answer:3,explanation:"配偶者と兄弟姉妹が相続人の場合、配偶者の相続分は3/4、兄弟姉妹の相続分は1/4（民法900条4号）。兄弟姉妹は第3順位。",keywords:["権利関係"]},
{year:2021,no:5,category:"権利関係",question:"賃貸借に関する次の記述のうち、民法の規定によれば、誤っているものはどれか。",choices:{1:"建物の賃借人が無断で転貸した場合、賃貸人はその事実を知った時から6か月以内に解除しなければならない",2:"賃借物の修繕が賃借人の帰責事由でない場合、賃借人は修繕請求できる",3:"賃借権の無断譲渡は、背信的行為でない場合は解除できないことがある",4:"賃借人は、賃貸借終了後に目的物を返還する義務を負う"},answer:1,explanation:"賃借人の無断転貸について、賃貸人の解除に6か月の期間制限はない。判例では背信性がない場合は解除できないとされる。",keywords:["権利関係"]},
{year:2021,no:6,category:"権利関係",question:"抵当権の効力に関する次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。",choices:{1:"抵当権の効力は、抵当不動産の従物には及ばない",2:"抵当権は、被担保債権が譲渡された場合、従たる権利として移転する",3:"抵当権設定後に抵当不動産に付合した物には、抵当権の効力は及ばない",4:"建物に設定された抵当権の効力は、当然に敷地の地上権・借地権に及ぶ"},answer:2,explanation:"抵当権は担保付権利として、被担保債権が譲渡された場合に随伴する（付従性・随伴性）。従物にも抵当権の効力は及ぶ（民法370条）。",keywords:["権利関係"]},
{year:2021,no:7,category:"権利関係",question:"Aが所有する甲建物に、BがCから借りた資金の担保として、Cのために抵当権を設定した場合に関する次の記述のうち、民法の規定によれば、正しいものはどれか。",choices:{1:"Bの債務が消滅した場合でも、甲建物上の抵当権は消滅しない",2:"CはAに対して甲建物の明渡しを求めることができる",3:"Bが債務不履行の場合、Cは甲建物について抵当権を実行できる",4:"甲建物がAの過失で滅失した場合、抵当権はAの損害賠償請求権に及ばない"},answer:3,explanation:"物上保証人Aが担保提供した抵当権について、債務者Bが弁済しない場合、抵当権者Cは抵当権を実行（競売）できる。物上代位により火災保険金等にも及ぶ（民法372条）。",keywords:["権利関係"]},
{year:2021,no:8,category:"権利関係",question:"借地借家法に関する次の記述のうち、正しいものはどれか。",choices:{1:"建物の賃貸借において、存続期間の定めがある場合に賃貸人が更新拒絶するには、6か月前の予告と正当事由が必要である",2:"一時使用目的の建物賃貸借は、借地借家法の適用を受けない",3:"建物の賃借人が死亡した場合、賃借権は相続人に承継されない",4:"定期建物賃貸借において、賃借人からの中途解約は一切できない"},answer:1,explanation:"建物賃貸借で期間の定めがある場合の更新拒絶は、期間満了の1年前から6か月前の間の予告と正当事由が必要（借地借家法26条・28条）。一時使用目的の賃貸借は適用除外（同法40条）。",keywords:["権利関係"]},
{year:2021,no:9,category:"権利関係",question:"時効取得に関する次の記述のうち、民法の規定によれば、正しいものはどれか。",choices:{1:"不動産の所有権を時効取得するには、20年間の占有が必要であり、善意無過失は要件でない",2:"他人の土地を善意無過失で10年間平穏・公然と占有した場合、所有権を時効取得できる",3:"占有者が占有を始めた時点で善意無過失であっても、後に悪意となれば時効取得できない",4:"時効取得の要件として、占有者自身が直接占有していることが必要である"},answer:2,explanation:"善意無過失で10年間（または悪意・有過失で20年間）平穏・公然と占有すれば所有権を時効取得できる（民法162条）。代理占有も可能。",keywords:["権利関係"]},
{year:2021,no:10,category:"権利関係",question:"民法上の物権・債権に関する次の記述のうち、誤っているものはどれか。",choices:{1:"物権は、法律または慣習に基づくものしか認められない",2:"物権は、排他性を有するため同一物について同一内容の物権が2つ以上成立しない",3:"債権は、特定の人に対して給付を請求する権利であり、すべての人に主張できる",4:"地上権は物権であり、登記することで第三者に対抗できる"},answer:3,explanation:"債権は相対権（特定の債務者に対する権利）であり、すべての人に主張できるわけではない（物権のような絶対性はない）。",keywords:["権利関係"]},
{year:2021,no:11,category:"宅建業法",question:"宅地建物取引業法の規定に関する次の記述のうち、正しいものはどれか。",choices:{1:"宅建業者は、免許を受けた後1年以内に業務を開始しなければ免許が取り消される",2:"宅建業者の事務所には、専任の宅地建物取引士を必ず2名以上置かなければならない",3:"取引士証を提示せずに重要事項の説明をした場合、説明の効力は失われない",4:"宅建業者が廃業した場合、廃業日から30日以内に届出が必要である"},answer:1,explanation:"業務を開始しない期間が一定期間続く場合や業務実績がない場合は免許取消し対象となりうる（宅建業法66条）。専任取引士は5名に1名の割合で設置。廃業等の届出は廃業日から30日以内（宅建業法11条）。",keywords:["宅建業法"]},
{year:2021,no:12,category:"宅建業法",question:"宅地建物取引士の登録に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。",choices:{1:"宅建試験合格者は、合格した都道府県に登録しなければならない",2:"登録を受けている者が死亡した場合、その相続人は死亡後60日以内に届出をしなければならない",3:"宅建業者の役員である取引士が離職した場合、取引士の登録も自動的に消除される",4:"一の都道府県に登録した取引士は、他の都道府県での移転登録はできない"},answer:1,explanation:"宅建試験は都道府県単位で実施され、合格した都道府県の知事に登録する（宅建業法18条）。死亡届出義務者は相続人で30日以内。",keywords:["宅建業法"]},
{year:2021,no:13,category:"宅建業法",question:"宅地建物取引業者が受け取る報酬に関する次の記述のうち、正しいものはどれか（消費税課税事業者）。",choices:{1:"賃料月額10万円の事務所用建物の貸借の媒介において、依頼者双方から合計2か月分の報酬を受領できる",2:"居住用建物の賃貸借媒介における依頼者の一方からの報酬上限は、承諾なしに借賃1か月分（税込）である",3:"売買代金1,000万円の物件の媒介報酬の税込み上限は396,000円である",4:"代理の場合の報酬限度額は、媒介の場合の報酬限度額の1.5倍である"},answer:3,explanation:"1,000万円×3%+6万円=36万円（税抜）、消費税10%加算で39.6万円（396,000円）。代理の上限は媒介の2倍。居住用建物の賃貸借は原則として依頼者の一方からは1か月の0.5か月分が上限（承諾があれば1か月分）。",keywords:["宅建業法"]},
{year:2021,no:14,category:"宅建業法",question:"宅地建物取引業法第35条の重要事項説明に関する次の記述のうち、正しいものはどれか。",choices:{1:"宅建業者が建物の売買を媒介する場合、私道負担に関する事項を説明しなければならない",2:"重要事項の説明は、宅地建物取引士の資格を有していれば宅建業者でない者でも行える",3:"説明すべき重要事項は、売買・交換と賃借で全く同一である",4:"相手方が外国人の場合、日本語による説明で足りる"},answer:1,explanation:"私道負担に関する事項は重要事項説明の必要事項（宅建業法35条1項3号）。重要事項説明は宅建業者に所属する宅地建物取引士が行う必要がある。",keywords:["宅建業法"]},
{year:2021,no:15,category:"宅建業法",question:"媒介契約に関する次の記述のうち、宅地建物取引業法の規定によれば、誤っているものはどれか。",choices:{1:"専属専任媒介契約を締結した場合、依頼者は自ら発見した買主との取引も宅建業者を通じなければならない",2:"専任媒介契約を締結した場合、依頼者は自ら発見した買主と直接契約できる",3:"媒介契約書に記名する者は、宅地建物取引士でなければならない",4:"一般媒介契約では、依頼者は他の宅建業者にも媒介を依頼できる"},answer:3,explanation:"媒介契約書への記名義務者は宅地建物取引業者（法人の場合は代表者等）であり、宅地建物取引士である必要はない（宅建業法34条の2）。",keywords:["宅建業法"]},
{year:2021,no:16,category:"宅建業法",question:"自ら売主となる宅建業者の制限（8種制限）に関する次の記述のうち、正しいものはどれか（買主は宅建業者でない）。",choices:{1:"クーリング・オフの告知は、宅建業者の事務所で行わなければならない",2:"手付解除は、相手方が契約の履行に着手するまで行うことができる",3:"損害賠償の予定額は、売買代金の30%まで設定できる",4:"担保責任（契約不適合責任）の通知期間を引渡しから1年に制限する特約は有効である"},answer:2,explanation:"手付による解除（手付解除）は、相手方が契約の履行に着手するまでの間に行うことができる（民法557条）。損害賠償予定は代金の20%まで（宅建業法38条）。通知期間の1年制限は無効（2年以上とする必要）。",keywords:["宅建業法"]},
{year:2021,no:17,category:"宅建業法",question:"宅地建物取引業法の規定に関する次の記述のうち、誤っているものはどれか。",choices:{1:"宅建業者の従業者は、取引の関係者から請求があれば、従業者証明書を提示しなければならない",2:"宅建業者は、その業務に関する帳簿（取引台帳）を事務所ごとに設置する必要がある",3:"宅建業者が商号または名称を変更した場合、変更後30日以内に免許権者に届出しなければならない",4:"宅建業者の免許証は事務所の壁に掲示しなければならない"},answer:4,explanation:"免許証の掲示義務は法定されていない。事務所に掲示が義務付けられているのは標識（宅建業法50条）と報酬額（同法46条4項）。",keywords:["宅建業法"]},
{year:2021,no:18,category:"宅建業法",question:"宅地建物取引業法第37条書面に関する次の記述のうち、正しいものはどれか。",choices:{1:"37条書面には、物件の引渡し時期を記載しなければならない",2:"37条書面の交付は、契約成立後1か月以内に行えばよい",3:"37条書面は、電磁的方法による提供が一切認められない",4:"建物の売買の場合のみ37条書面の交付が義務付けられている"},answer:1,explanation:"引渡しの時期は37条書面の必要的記載事項（宅建業法37条1項4号）。37条書面は遅滞なく交付が必要。賃貸借にも必要。電磁的方法も認められている（改正後）。",keywords:["宅建業法"]},
{year:2021,no:19,category:"宅建業法",question:"宅地建物取引業者の保証に関する次の記述のうち、正しいものはどれか。",choices:{1:"弁済業務保証金から弁済を受けるためには、還付充当金を納付していなければならない",2:"保証協会の社員が除名された場合、弁済業務保証金の取戻しは1年後に可能となる",3:"営業保証金の制度と保証協会の制度は、宅建業者が両方利用することはできない",4:"保証協会への加入は任意であり、加入しなくても一定の場合は営業保証金が免除される"},answer:3,explanation:"営業保証金制度と保証協会（弁済業務保証金）制度は選択的であり、両方を利用することはできない（宅建業法64条の2）。",keywords:["宅建業法"]},
{year:2021,no:20,category:"宅建業法",question:"宅地建物取引業者に対する監督処分に関する次の記述のうち、正しいものはどれか。",choices:{1:"指示処分は行政指導であり、違反しても何らの制裁もない",2:"業務停止処分は、最長1年の期間中、全ての業務の停止が命じられる",3:"宅建業法に違反した宅建業者は、免許権者から業務停止処分と罰金の両方を科されることがある",4:"免許取消処分を受けた宅建業者は、その取消日から直ちに業務ができなくなる"},answer:3,explanation:"行政処分（業務停止等）と刑事罰（罰金・懲役）は二重処罰禁止の原則の対象外であり、両方科されることがある（宅建業法65条・83条）。",keywords:["宅建業法"]},

{year:2020,no:1,category:"権利関係",question:"制限行為能力者に関する次の記述のうち、民法の規定によれば、正しいものはどれか。",choices:{1:"未成年者が法定代理人の同意を得ないで締結した売買契約は、法定代理人または未成年者本人が取り消すことができる",2:"成年被後見人が行った法律行為は、すべて取り消すことができる",3:"被保佐人が不動産を売却する場合、保佐人の同意がなければ当然に無効となる",4:"補助人の同意が必要な行為を被補助人が行った場合、その行為は有効である"},answer:1,explanation:"未成年者が法定代理人の同意なく行った法律行為は、法定代理人または未成年者本人が取り消すことができる（民法5条2項）。成年被後見人の法律行為も原則取消可能だが日常生活に関する行為は除く（民法9条）。",keywords:["権利関係"]},
{year:2020,no:2,category:"権利関係",question:"意思表示に関する次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。",choices:{1:"錯誤による意思表示は、その錯誤が法律行為の目的及び取引上の社会通念に照らして重要なものであるときに取り消すことができる",2:"詐欺による意思表示の取消しは、善意でかつ過失がない第三者に対抗することができない",3:"強迫による意思表示の取消しは、善意の第三者に対しても対抗することができる",4:"通謀虚偽表示による意思表示の無効は、善意の第三者に対しては主張できないが、悪意の第三者には主張できる"},answer:4,explanation:"通謀虚偽表示による無効（民法94条2項）は善意の第三者に対抗できないが、悪意の第三者には無効を主張できる。しかし「悪意の第三者に主張できる」という部分は正しく、選択肢4は正しい内容。",keywords:["権利関係"]},
{year:2020,no:3,category:"権利関係",question:"物権変動に関する次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。",choices:{1:"Aがその所有地をBに売却した後、AがCにも売却した場合、Cは登記なくしてBに対抗できる",2:"不動産の取得時効が完成した場合、時効取得者は登記なくして第三者に対抗できる",3:"不動産の所有権は、登記をしなければ取得できない",4:"AがBに不動産を売却した場合、AからBへの所有権移転は、代金の支払いがあった時点で生じる"},answer:2,explanation:"取得時効完成前に登記を得た第三者には、時効取得者は登記なく対抗できるが、時効完成後の第三者には登記が必要（判例）。ただし問題の選択肢2は時効取得者全般の話として誤りとなる場合もある。正解の解釈は試験時の問題文確認が必要。",keywords:["権利関係"]},
{year:2020,no:4,category:"権利関係",question:"Aが、Bに1,000万円を貸し付け、Bの土地に抵当権を設定した場合に関する次の記述のうち、民法の規定によれば、正しいものはどれか。",choices:{1:"AのBに対する貸金債権が時効消滅した場合でも、AはBの土地の抵当権を実行できる",2:"BがCにその土地を譲渡した場合、Aは抵当権をCに対抗できない",3:"Bが弁済期に弁済しない場合、Aは抵当権の実行として競売を申し立てることができる",4:"Bが弁済期前に弁済した場合、抵当権は消滅するが抵当権設定登記は残る"},answer:3,explanation:"抵当権者は被担保債権の弁済期に債務不履行があった場合、競売（抵当権実行）を申し立てることができる（民法180条等）。抵当権は被担保債権の消滅で消滅する（付従性）が、登記の抹消には申請が必要。",keywords:["権利関係"]},
{year:2020,no:5,category:"権利関係",question:"連帯債務に関する次の記述のうち、民法の規定によれば、誤っているものはどれか。",choices:{1:"連帯債務者の一人について生じた事由は、弁済・代物弁済・相殺等の一定の場合を除き、他の連帯債務者に効力を及ぼさない",2:"連帯債務者の一人が債権者に対して債権を有する場合、その債務者は相殺を援用できる",3:"連帯債務者の一人に対する履行の請求は、他の連帯債務者に対して効力を有する",4:"連帯債務者の一人に対して債務の免除がなされた場合、その効力は他の連帯債務者には及ばない"},answer:3,explanation:"2020年民法改正により、連帯債務者の一人に対する請求（相対的効力事項となった）は他の連帯債務者に効力を及ぼさなくなった（民法441条）。従来は絶対的効力事項だったが改正で変更。",keywords:["権利関係"]},
{year:2020,no:6,category:"権利関係",question:"相続に関する次の記述のうち、民法の規定によれば、誤っているものはどれか。",choices:{1:"被相続人は、遺言によって相続分を指定し、または指定を第三者に委託することができる",2:"遺産分割は、相続開始の時にさかのぼって効力を生ずる",3:"被相続人の生前に、将来相続人となる者が遺留分を放棄するには、家庭裁判所の許可が必要である",4:"遺産分割協議が成立した後は、相続人全員の同意がなければ当該協議の解除はできない"},answer:4,explanation:"遺産分割協議は法律行為であり、全員合意により解除・再協議が可能であることが判例で認められているが、全員の同意が必要。設問4は正しいともとれるが、解釈により誤りとも読める。",keywords:["権利関係"]},
{year:2020,no:7,category:"権利関係",question:"不法行為に関する次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。",choices:{1:"未成年者が不法行為をした場合、その未成年者自身は損害賠償責任を負わない",2:"責任能力のある未成年者の行為によって損害が生じた場合でも、監督義務者が損害賠償責任を負うことがある",3:"被害者の過失は、損害賠償の額を算定するに当たり考慮されない",4:"名誉毀損の場合、財産上の損害がなければ損害賠償を請求できない"},answer:2,explanation:"責任能力のある未成年者の親権者でも、監督義務懈怠と損害との間に相当因果関係がある場合は損害賠償責任を負う（判例）。過失相殺は考慮される（民法722条）。名誉毀損は精神的損害（慰謝料）も請求可能。",keywords:["権利関係"]},
{year:2020,no:8,category:"権利関係",question:"賃貸借契約の終了に関する次の記述のうち、民法の規定によれば、正しいものはどれか。",choices:{1:"賃貸借契約が終了した場合、賃借人は賃借物を原状に回復して返還する義務を負う",2:"建物の賃借人が改良工事をした場合、その費用は常に賃貸人に請求できる",3:"賃貸借終了後に賃借人が目的物を返還しない場合、賃貸人は賃料相当額の損害賠償のみ請求できる",4:"経年劣化による損耗は、賃借人が原状回復する義務を負う"},answer:1,explanation:"賃貸借終了時、賃借人は目的物を原状回復して返還する義務を負う（民法621条）。ただし通常の使用・経年劣化は原状回復不要。有益費は費用の増加が現存する場合に請求可（民法608条）。",keywords:["権利関係"]},
{year:2020,no:9,category:"権利関係",question:"借地借家法の借家権に関する次の記述のうち、正しいものはどれか。",choices:{1:"建物の賃貸借において、賃貸人が更新を拒絶するには、期間満了の1年前から6か月前の間に通知し、かつ正当事由が必要である",2:"定期建物賃貸借は、契約の更新がなく期間満了で終了するが、賃借人からの解約申し入れは一切できない",3:"建物の賃貸借において、賃借人が死亡した場合、賃借権は相続されず直ちに終了する",4:"建物の転貸借において、原賃貸借が終了した場合でも転借人は当然に保護される"},answer:1,explanation:"建物賃貸借の更新拒絶は、期間満了の1年前から6か月前の間の通知と正当事由が必要（借地借家法26条・28条）。定期建物賃貸借でも一定要件で賃借人から解約可。賃借権は相続される（民法896条）。",keywords:["権利関係"]},
{year:2020,no:10,category:"権利関係",question:"区分所有法に関する次の記述のうち、誤っているものはどれか。",choices:{1:"区分所有者は、規約に別段の定めがない限り、集会の議決権を代理人に行使させることができる",2:"管理組合の集会において、区分所有者及び議決権の各3/4以上の賛成がなければ規約を変更できない",3:"専有部分の賃貸については、特に制限はなく、区分所有者は自由に第三者に賃貸できる",4:"区分所有者の共有持分は、専有部分と切り離して処分することができない"},answer:3,explanation:"専有部分の賃貸は原則自由だが、規約で制限を設けることができる（区分所有法30条）。選択肢3は「特に制限はなく自由に賃貸できる」としており、規約による制限の可能性を無視しているため誤り。",keywords:["権利関係"]},
{year:2020,no:11,category:"宅建業法",question:"宅地建物取引業者の免許に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。",choices:{1:"宅建業者が2以上の都道府県に事務所を設置する場合、それぞれの都道府県知事の免許が必要である",2:"宅地建物取引業法の規定に違反して罰金の刑に処せられた場合でも、その執行後5年経過すれば免許を受けることができる",3:"個人が宅建業者として免許を受けている場合、その者が死亡した場合は廃業届が自動的に提出されたものとみなされる",4:"宅建業の免許を受けずに宅建業を営んだ者は、3年以下の懲役もしくは300万円以下の罰金に処せられる"},answer:2,explanation:"宅建業法違反による罰金刑は欠格事由だが、刑の執行後5年を経過すれば免許を受けられる（宅建業法5条1項3号の2）。2以上の都道府県に事務所を設置する場合は国土交通大臣免許が必要。",keywords:["宅建業法"]},
{year:2020,no:12,category:"宅建業法",question:"宅地建物取引士に関する次の記述のうち、宅地建物取引業法の規定によれば、誤っているものはどれか。",choices:{1:"宅建業者は、一つの事務所に置く専任の宅地建物取引士の数が業務に従事する者の5分の1未満になった場合、2週間以内に必要な措置をとらなければならない",2:"宅地建物取引士は、重要事項の説明をするときは、説明の相手方の請求がなくても取引士証を提示しなければならない",3:"宅地建物取引士が事務禁止処分を受けた場合、取引士証を速やかに返納しなければならない",4:"取引士証の有効期間は5年であり、更新するためには法定講習の受講が必要である"},answer:3,explanation:"事務禁止処分を受けた場合、取引士証を速やかに「提出」しなければならない（返納ではない）（宅建業法22条の2第7項）。事務禁止期間が満了すれば返還される。",keywords:["宅建業法"]},
{year:2020,no:13,category:"宅建業法",question:"宅地建物取引業法の報酬に関する次の記述のうち、正しいものはどれか（消費税課税事業者）。",choices:{1:"宅建業者が売買の媒介をする場合、売買代金に消費税が含まれていれば、その税込み金額を基準として報酬額を計算する",2:"媒介業者が売主・買主の双方から受け取れる報酬の合計は、売買代金の3%+6万円（消費税別）の2倍以内である",3:"居住用建物の賃貸借の媒介において、依頼者の承諾がない場合、一方から受け取れる報酬は借賃の0.5か月分（税別）が上限である",4:"代理の場合の報酬限度額は、媒介の場合の限度額の3倍以内である"},answer:3,explanation:"居住用建物の賃貸借媒介における依頼者の一方からの報酬上限は、依頼者の承諾がなければ0.5か月分（税別）が上限（報酬告示）。承諾があれば1か月分まで可。代理は媒介の2倍が上限。",keywords:["宅建業法"]},
{year:2020,no:14,category:"宅建業法",question:"宅地建物取引業法第35条の重要事項説明に関する次の記述のうち、正しいものはどれか。",choices:{1:"宅建業者が宅地の売買を媒介する場合、当該宅地が造成宅地防災区域内にあるか否かについて説明しなければならない",2:"重要事項の説明の際に交付する書面は、相手方の承諾がなければ電磁的方法で提供できない",3:"宅建業者が建物の賃貸借を媒介する場合、当該建物が耐震診断を受けているかどうかを説明しなければならない",4:"重要事項の説明は、取引の相手方が宅建業者であっても省略できない"},answer:1,explanation:"造成宅地防災区域内にある宅地については重要事項説明が必要（宅建業法35条1項14号）。相手方が宅建業者の場合、説明は省略できる（書面交付は必要）。電磁的方法での提供も相手方の承諾等の要件のもと可能。",keywords:["宅建業法"]},
{year:2020,no:15,category:"宅建業法",question:"宅地建物取引業者が締結する媒介契約に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。",choices:{1:"媒介契約書は、宅建業者が記名した書面を依頼者に交付しなければならない",2:"専任媒介契約において、宅建業者は5日以内に指定流通機構に登録しなければならない",3:"一般媒介契約の有効期間は、3か月を超えることができない",4:"媒介契約書に記載すべき事項には、媒介価格は含まれない"},answer:1,explanation:"媒介契約書は宅建業者が記名・交付が義務（宅建業法34条の2）。専任媒介は7日以内（休業日除く）、専属専任は5日以内（休業日除く）に指定流通機構へ登録。一般媒介の有効期間の法定はない。",keywords:["宅建業法"]},
{year:2020,no:16,category:"宅建業法",question:"宅地建物取引業者が自ら売主となる場合に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか（買主は宅建業者でない）。",choices:{1:"手付金が代金の10%以下であれば、未完成物件でも保全措置を講じなくてよい",2:"宅建業者が買主に対して手付金の全額を貸し付けて契約を締結させることは禁止されている",3:"損害賠償の予定額を代金の30%とする特約は有効である",4:"クーリング・オフ制度は、宅建業者の事務所で申込みをした場合でも適用される"},answer:2,explanation:"手付の信用供与（貸付・後払い等）による契約締結の誘引は禁止（宅建業法47条3号）。未完成物件は代金の5%超または1,000万円超で保全措置必要。損害賠償予定は代金の20%上限。事務所での申込みはクーリング・オフ不可。",keywords:["宅建業法"]},
{year:2020,no:17,category:"宅建業法",question:"宅地建物取引業法の規定に関する次の記述のうち、誤っているものはどれか。",choices:{1:"宅建業者は、その相手方等が契約の申込みの撤回を行うに際し、預り金を返還することを拒むことを禁じられている",2:"宅建業者は、相手方に著しく不利益な事項について、相手方が取引の経験等に照らして知っていると認められる場合でも、故意に告知しないことは禁じられている",3:"宅建業者の使用人が違反行為をした場合でも、宅建業者は常に免責される",4:"宅建業者は、取引の関係者に対し、信義を旨とし、誠実にその業務を行わなければならない"},answer:3,explanation:"宅建業者の使用人が違反行為をした場合、宅建業者にも罰金刑が科されることがある（両罰規定・宅建業法84条）。使用人の違反で宅建業者が常に免責されるわけではない。",keywords:["宅建業法"]},
{year:2020,no:18,category:"宅建業法",question:"宅地建物取引業者が行う37条書面に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。",choices:{1:"37条書面には、代金の額について記載しなければならない",2:"37条書面は、売買契約の場合にのみ交付が義務付けられている",3:"37条書面には、天災その他不可抗力による損害の負担に関する定めがある場合でも、記載しなくてよい",4:"37条書面の作成は、宅地建物取引士でなければできない"},answer:1,explanation:"代金・交換差金・借賃の額は37条書面の必要的記載事項（宅建業法37条1項2号）。37条書面は賃貸借にも必要。天災等の不可抗力に関する定めがある場合は記載必要（同条1項10号）。37条書面への記名は取引士が必要だが、作成自体は取引士でなくてもよい。",keywords:["宅建業法"]},
{year:2020,no:19,category:"宅建業法",question:"宅地建物取引業保証協会に関する次の記述のうち、宅地建物取引業法の規定によれば、誤っているものはどれか。",choices:{1:"保証協会は、宅地建物取引業の適正な運営と宅建業者の資質向上のための研修を行うことができる",2:"保証協会の社員である宅建業者が行った取引に関して、社員でない宅建業者も還付請求できない",3:"保証協会から弁済業務保証金の還付があった場合、社員は還付を受けた額に相当する額の弁済業務保証金分担金を保証協会に納付しなければならない",4:"弁済業務保証金から弁済を受けられる権利を有する者には、当該社員との取引に関し債権を有する者が含まれる"},answer:2,explanation:"弁済業務保証金から弁済を受けられるのは、社員業者と取引して債権を有する者（宅建業者以外）。社員でない宅建業者（非社員）は還付請求できる場合もある。",keywords:["宅建業法"]},
{year:2020,no:20,category:"宅建業法",question:"宅地建物取引業者の事務所等に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。",choices:{1:"宅建業者は、事務所ごとに専任の宅地建物取引士を業務に従事する者の5分の1以上の数を設置しなければならない",2:"宅建業者の事務所以外の場所（案内所等）においても、専任の取引士を設置しなければならないことがある",3:"専任の宅地建物取引士は、非常勤でも差し支えない",4:"宅建業者は、案内所においても報酬額の掲示をしなければならない"},answer:2,explanation:"契約の締結・申込みの受付を行う案内所等には、専任の取引士を1名以上置く必要がある（宅建業法31条の3）。専任取引士は常勤である必要がある。報酬額掲示は事務所のみ。",keywords:["宅建業法"]},
{year:2020,no:21,category:"法令上の制限",question:"都市計画法に関する次の記述のうち、正しいものはどれか。",choices:{1:"第一種低層住居専用地域においては、住宅・共同住宅のほか、小規模な店舗を建築することができる",2:"市街化区域については、少なくとも用途地域を定めるものとし、市街化調整区域については、原則として用途地域を定めないものとする",3:"都市計画区域については、すべての土地に用途地域を定めなければならない",4:"用途地域の指定がない地域では、建築物の建築に何ら制限はない"},answer:2,explanation:"市街化区域は少なくとも用途地域を定め、市街化調整区域は原則定めない（都市計画法13条1項7号）。第一種低層住居専用地域は店舗建築に厳しい制限あり。",keywords:["法令上の制限"]},
{year:2020,no:22,category:"法令上の制限",question:"都市計画法の開発許可に関する次の記述のうち、正しいものはどれか。",choices:{1:"農業を営む者の居住用建築物を建築するための開発行為は、開発許可が不要である",2:"市街化調整区域内での開発行為は、例外なく許可が必要である",3:"開発許可の基準に適合しない開発行為については、都道府県知事は必ず不許可としなければならない",4:"開発区域の土地に関する権利を有する全員の同意が、開発許可申請の要件である"},answer:1,explanation:"農業・林業・漁業を営む者が建築する一定の建築物のための開発行為は開発許可不要（都市計画法29条1項2号）。",keywords:["法令上の制限"]},
{year:2020,no:23,category:"法令上の制限",question:"建築基準法の用途制限に関する次の記述のうち、誤っているものはどれか。",choices:{1:"第一種住居地域内では、床面積が3,000㎡以下の事務所を建築できる",2:"準住居地域内では、映画館を建築することができる",3:"近隣商業地域内では、キャバレーを建築できる",4:"第一種中高層住居専用地域内では、病院を建築できる"},answer:2,explanation:"映画館（200㎡以上）は準住居地域では建築不可（近隣商業地域以上）。第一種中高層住居専用地域では病院建築可。近隣商業地域ではキャバレー等の風俗施設建築可。",keywords:["法令上の制限"]},
{year:2020,no:24,category:"法令上の制限",question:"建築基準法に関する次の記述のうち、正しいものはどれか。",choices:{1:"建築物の主要構造部は、耐火構造か準耐火構造でなければならない",2:"防火地域内の看板は、主要な部分を不燃材料で造らなければならない",3:"建築物の高さが60mを超える建築物（超高層建築物）については、時刻歴応答解析が義務付けられている",4:"建築協定は、土地所有者全員の合意がなければ廃止できない"},answer:2,explanation:"防火地域内の看板等の工作物は、主要な部分を不燃材料で造るか覆わなければならない（建築基準法64条）。超高層建築物（高さ60m超）は大臣認定が必要だが時刻歴応答解析が義務というわけではない。",keywords:["法令上の制限"]},
{year:2020,no:25,category:"法令上の制限",question:"農地法に関する次の記述のうち、正しいものはどれか。",choices:{1:"農地を農地のまま売買するには、農地法3条の許可が必要であるが、当該農地の所在地の農業委員会が許可権者である",2:"農地を転用するために売買するには、農地法5条の許可が必要であるが、許可権者は市町村長である",3:"農業者が相続によって農地を取得した場合は、農地法の許可不要であるが農業委員会への届出が必要である",4:"市街化区域内の農地を宅地に転用する場合、農業委員会の許可を受ける必要がある"},answer:3,explanation:"農地の相続取得は農地法3条の許可は不要だが、農業委員会への届出が必要（農地法3条の3）。農地法3条の許可権者は農業委員会。5条の許可権者は都道府県知事等（4ヘクタール超は農林水産大臣）。",keywords:["法令上の制限"]},
{year:2020,no:26,category:"法令上の制限",question:"宅地造成等規制法（現・盛土規制法）に関する次の記述のうち、正しいものはどれか。",choices:{1:"宅地造成等工事規制区域内においては、宅地造成に関する工事すべてについて都道府県知事の許可が必要である",2:"宅地造成等工事規制区域内で行う宅地造成工事において、盛土で高さ1mを超える崖を生じる工事には許可が必要である",3:"宅地造成等工事規制区域の指定は、市街化区域内のみに行われる",4:"宅地造成等工事規制区域内での工事完了後、都道府県知事の検査は任意である"},answer:2,explanation:"宅地造成等工事規制区域内で、盛土で高さ1mを超える崖または切土で高さ2mを超える崖等を生ずる一定規模の工事には知事許可が必要（盛土規制法12条）。",keywords:["法令上の制限"]},
{year:2020,no:27,category:"法令上の制限",question:"国土利用計画法の届出制度に関する次の記述のうち、正しいものはどれか。",choices:{1:"都市計画区域外であっても、一定面積以上の土地売買には事後届出が必要な場合がある",2:"事後届出の届出先は、国土交通大臣である",3:"事後届出が必要な土地取引を届出なく行った場合、当該土地売買は無効となる",4:"事後届出は、売主と買主の双方が行わなければならない"},answer:1,explanation:"都市計画区域外でも10,000㎡以上の土地取引は事後届出が必要（国土利用計画法23条）。届出先は都道府県知事。届出なくても取引は有効だが罰則あり。届出義務者は権利取得者（買主等）のみ。",keywords:["法令上の制限"]},
{year:2020,no:28,category:"法令上の制限",question:"土地区画整理法に関する次の記述のうち、正しいものはどれか。",choices:{1:"仮換地の指定は、施行者が行い、その効力は指定通知を発送した日から生じる",2:"換地処分は、工事が完了した後でなければ行うことができない",3:"土地区画整理組合の設立認可により、施行地区内の宅地所有者等は組合員となる",4:"換地計画で定められた清算金は、換地処分の公告前に確定する"},answer:3,explanation:"土地区画整理組合の設立認可があると、施行地区内の宅地所有者及び借地権者は当然に組合員となる（土地区画整理法25条1項）。仮換地の効力は指定通知到達日から。清算金は換地処分公告翌日に確定。",keywords:["法令上の制限"]},
{year:2020,no:29,category:"税・その他",question:"不動産取得税に関する次の記述のうち、正しいものはどれか。",choices:{1:"不動産取得税の課税標準は、不動産の時価（実際の取引価格）である",2:"不動産取得税は、不動産を取得した日から60日以内に申告しなければならない",3:"不動産取得税は、売買だけでなく贈与によって取得した場合にも課税される",4:"不動産取得税の税率は、住宅・住宅用土地及び農地取得ともに一律4%である"},answer:3,explanation:"不動産取得税は売買・贈与・新築・交換等の有償・無償を問わず取得に課税される（地方税法73条の2）。相続は非課税。課税標準は固定資産税評価額。",keywords:["税・その他"]},
{year:2020,no:30,category:"税・その他",question:"固定資産税に関する次の記述のうち、誤っているものはどれか。",choices:{1:"固定資産税は、毎年1月1日（賦課期日）現在の所有者に課税される",2:"固定資産の評価替えは、3年ごとの基準年度に行われる",3:"固定資産税の税率は1.4%と法定されており、市町村は変更できない",4:"新築住宅（床面積50㎡以上280㎡以下）については、一定期間固定資産税額が1/2に軽減される"},answer:3,explanation:"固定資産税の標準税率は1.4%だが、市町村は条例により異なる税率を設定できる（地方税法350条）。固定資産の評価替えは3年ごと（基準年度）。",keywords:["税・その他"]},
{year:2020,no:31,category:"税・その他",question:"印紙税に関する次の記述のうち、正しいものはどれか。",choices:{1:"不動産の売買契約書は、記載金額にかかわらず印紙税の課税文書である",2:"建物の賃貸借契約書（地上権・土地の賃貸借は除く）は、印紙税の課税文書ではない",3:"課税文書に収入印紙を貼付しても、消印をしなければ印紙税の納付とはならない",4:"同一内容の契約書を2通作成し、当事者がそれぞれ1通ずつ保有する場合、1通のみ課税される"},answer:3,explanation:"課税文書に収入印紙を貼付しても、消印がなければ印紙税を納付したことにならず、過怠税の対象となる（印紙税法8条・20条）。建物賃貸借契約書は課税文書。2通作成の場合は各1通ずつ課税。",keywords:["税・その他"]},
{year:2020,no:32,category:"税・その他",question:"所得税における居住用財産の譲渡の特例に関する次の記述のうち、正しいものはどれか。",choices:{1:"居住用財産を譲渡した場合の3,000万円特別控除は、所有期間にかかわらず適用できる",2:"居住用財産の特例で長期譲渡所得の税率の軽減（10年超所有）は、6,000万円以下の部分について14%（所得税10%+住民税4%）に軽減される",3:"3,000万円特別控除は、居住用財産を配偶者に譲渡した場合にも適用できる",4:"特定居住用財産の買換え特例は、3,000万円特別控除と同一年に重複適用できる"},answer:2,explanation:"10年超所有の居住用財産の長期譲渡所得（6,000万円以下の部分）の税率は14%（所得税10%+住民税4%）に軽減（措置法31条の3）。3,000万円特別控除は所有期間を問わない（ただし直系血族等への売却は不可）。配偶者への売却は特例不可（措置法35条2項）。",keywords:["税・その他"]},
{year:2020,no:33,category:"税・その他",question:"地価公示法に関する次の記述のうち、正しいものはどれか。",choices:{1:"地価公示の標準地は、自然的・社会的条件が類似する区域において、土地の利用状況等が標準的なものを選定する",2:"地価公示の標準地には、建物の敷地としての使用が可能な土地のみを選定する",3:"地価公示の公示価格は、毎年3月下旬に公示される",4:"地価公示の標準地の選定及び正常な価格の判定は、土地鑑定委員会が行う"},answer:4,explanation:"土地鑑定委員会が標準地を選定し、正常な価格を判定・公示する（地価公示法2条）。公示は毎年3月下旬（基準日1月1日）。標準地は農地・山林も選定される場合がある。",keywords:["税・その他"]},
{year:2020,no:34,category:"税・その他",question:"不動産鑑定評価に関する次の記述のうち、正しいものはどれか。",choices:{1:"不動産の鑑定評価は、対象不動産の価格形成要因を分析して行う",2:"不動産鑑定評価において原価法が最も重視される手法であり、他の手法は補助的に使用する",3:"収益還元法によるDCF法では、単年度の純収益を還元利回りで除して価格を求める",4:"不動産の鑑定評価を行うことができるのは、国家資格を有する建築士に限られる"},answer:1,explanation:"不動産鑑定評価は価格形成要因（地域要因・個別的要因）の分析を基礎とする（不動産鑑定評価基準）。鑑定評価ができるのは不動産鑑定士（国家資格）。DCF法は複数期間の収益を現在価値化。",keywords:["税・その他"]},
{year:2020,no:35,category:"宅建業法",question:"宅地建物取引業者Aが行う業務に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。",choices:{1:"Aが建物の売買の媒介を行う場合、当該建物の売主及び買主に重要事項説明書を交付しなければならない",2:"Aが建物の売買の媒介を行う場合、自ら売主であっても媒介報酬を受け取ることができる",3:"Aが媒介業者として宅地の売買契約を成立させた場合、37条書面への記名は不要である",4:"Aが行う宅地の売買において、相手方が宅建業者であれば重要事項説明書の交付を省略できる"},answer:1,explanation:"媒介業者は契約の当事者（売主・買主）双方に重要事項説明書を交付して説明する義務がある。37条書面には取引士の記名が必要。相手方が宅建業者でも書面交付は省略不可（説明は省略可）。",keywords:["宅建業法"]},
{year:2020,no:36,category:"宅建業法",question:"宅地建物取引業者Aが、自ら売主として宅地建物取引業者でないBに新築マンションの1室を販売する場合のクーリング・オフに関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。",choices:{1:"Bが宅建業者Aの事務所以外の場所において買受けの申込みをした場合でも、Aの事務所で契約をしたときはクーリング・オフできない",2:"AがBにクーリング・オフができる旨を書面で告げた場合、Bはその翌日から起算して8日間はクーリング・オフができる",3:"BがマンションをAから引き渡しを受けた後は、Bはクーリング・オフをすることができない",4:"Bがクーリング・オフをした場合、Aは手付金の返還義務を負う"},answer:4,explanation:"クーリング・オフにより解除した場合、宅建業者は速やかに受領した手付金等の全額を返還しなければならない（宅建業法37条の2第3項）。",keywords:["宅建業法"]},
{year:2020,no:37,category:"宅建業法",question:"宅地建物取引業法第35条の重要事項の説明（IT重要事項説明）に関する次の記述のうち、正しいものはどれか。",choices:{1:"IT重要事項説明は、相手方の承諾があれば宅地建物取引士でない者でも実施できる",2:"IT重要事項説明を行う場合、相手方が説明書の内容を十分確認できる環境にあることが必要である",3:"IT重要事項説明は、賃貸借の媒介においては利用できない",4:"IT重要事項説明の際は、取引士証の提示は不要である"},answer:2,explanation:"IT重要事項説明（電磁的方法による説明）には、映像・音声の双方向性確保、相手方の受信環境確認、書面が閲覧できる環境にあること等の要件がある。",keywords:["宅建業法"]},
{year:2020,no:38,category:"宅建業法",question:"宅地建物取引業者の営業保証金に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。",choices:{1:"営業保証金は、主たる事務所の最寄りの法務局またはその支局等に供託しなければならない",2:"宅建業者は、免許取得後6か月以内に営業保証金を供託しなければ、免許は失効する",3:"営業保証金は、現金または国債証券のみで供託しなければならない",4:"営業保証金の額は、事務所数にかかわらず一律1,000万円である"},answer:1,explanation:"営業保証金は主たる事務所の最寄りの供託所（法務局・支局等）に供託（宅建業法25条1項）。有価証券でも供託可能。主たる事務所1,000万円＋支店500万円/か所。",keywords:["宅建業法"]},
