{year:2020,no:39,category:"宅建業法",question:"宅地建物取引業者の業務に関する次の記述のうち、宅地建物取引業法の規定によれば、誤っているものはどれか。",choices:{1:"宅建業者は、注文者から請け負ったとみなされる建設工事の完成を目的とする契約については宅建業法は適用されない",2:"宅建業者が他の宅建業者の媒介によらないで自ら売主として売買した場合でも宅建業法が適用される",3:"宅建業者は、その業務に関し取引の関係者から請求があったとき、従業者証明書を提示しなければならない",4:"宅建業者は、従業者に研修の機会を与えるよう努めなければならない"},answer:3,explanation:"従業者証明書は「取引の関係者から請求があったとき」ではなく、従業者が取引の関係者から請求があった場合に従業者が携帯・提示する（宅建業法48条）。宅建業者は従業者に携帯させる義務。",keywords:["宅建業法"]},
{year:2020,no:40,category:"宅建業法",question:"宅地建物取引業者の免許の欠格事由に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。",choices:{1:"宅建業法違反により罰金刑に処せられた者は、その刑の執行後5年間は免許を受けることができない",2:"破産者は、復権を得ていない場合でも宅建業の免許を受けることができる",3:"宅建業法違反により免許取消処分を受けた者は、取消しから10年間は免許を受けることができない",4:"宅建業に関し詐欺の罪により罰金刑に処せられた者は、その刑の執行後5年間免許欠格となる"},answer:1,explanation:"宅建業法違反・傷害等の罪による罰金刑処罰者は刑の執行後5年間は欠格（宅建業法5条1項3号の2）。免許取消後の欠格期間は5年（3号ではなく2号）。",keywords:["宅建業法"]},
{year:2020,no:41,category:"法令上の制限",question:"建築基準法の集団規定に関する次の記述のうち、正しいものはどれか。",choices:{1:"第一種低層住居専用地域内において建築物の高さは10m以下でなければならない",2:"日影規制の対象は商業地域を含むすべての用途地域に適用される",3:"建ぺい率が80%と定められている区域内で、防火地域内の耐火建築物は建ぺい率の制限が適用されない",4:"隣地斜線制限は第一種・第二種低層住居専用地域にも適用される"},answer:3,explanation:"建ぺい率80%の地域内で防火地域の耐火建築物は建ぺい率無制限（建築基準法53条6項1号）。低層住居専用地域の高さ制限は都市計画で10mか12m。日影規制は商業・工業・工業専用地域には原則適用なし。隣地斜線は低層住居専用地域では適用なし（北側斜線が適用）。",keywords:["法令上の制限"]},
{year:2020,no:42,category:"法令上の制限",question:"建築基準法の建築確認に関する次の記述のうち、誤っているものはどれか。",choices:{1:"大規模の修繕又は模様替えを行う場合、建築確認が必要なことがある",2:"建築確認の申請書は、建築主が提出するのが原則である",3:"建築確認済証の交付を受けた後でなければ、建築工事に着工できない",4:"完成後の検査済証の交付を受けなければ、建築物を一切使用できない"},answer:4,explanation:"検査済証の交付前でも、特定行政庁が仮使用を承認した場合等は使用できる（建築基準法7条の6）。「一切使用できない」は誤り。",keywords:["法令上の制限"]},
{year:2020,no:43,category:"法令上の制限",question:"土地に関する次の記述のうち、最も不適切なものはどれか。",choices:{1:"谷底低地は、軟弱地盤であることが多く、宅地として不適切な場合がある",2:"沖積低地は、洪水・浸水のリスクが高い地域が多い",3:"洪積台地は一般的に良好な地盤であり、宅地として適している",4:"自然堤防は、地盤が軟弱で宅地開発には不向きである"},answer:4,explanation:"自然堤防は河川の氾濫によって形成された微高地で、周囲の後背低地より地盤が安定しており宅地に比較的適している。軟弱で不向きというのは誤り。",keywords:["法令上の制限"]},
{year:2020,no:44,category:"権利関係",question:"不動産登記に関する次の記述のうち、正しいものはどれか。",choices:{1:"土地の登記記録は、表題部と権利部（甲区・乙区）から構成される",2:"仮登記は、本登記の申請に必要な情報が不足している場合には申請できない",3:"登記の申請は、書面（紙）で提出しなければならない",4:"建物の登記記録の表題部には、所有者の氏名は記録されない"},answer:1,explanation:"土地の登記記録は表題部（所在・地目・地積等）と権利部（甲区：所有権、乙区：所有権以外の権利）から構成される（不動産登記法2条）。オンライン申請も可能。",keywords:["権利関係"]},
{year:2020,no:45,category:"権利関係",question:"民法上の担保物権に関する次の記述のうち、誤っているものはどれか。",choices:{1:"質権は、質権者が目的物を占有することで成立する",2:"先取特権は、当事者の合意がなくても法律の規定によって発生する",3:"抵当権は、目的物の引渡しがなくても設定できる",4:"留置権の被担保債権は、留置物に関して生じた債権でなければならない"},answer:4,explanation:"留置権は、他人の物を占有し、その物に関して生じた債権（牽連関係のある債権）を有する場合に成立する（民法295条）。被担保債権は留置物に関して生じたもので正しいが、設問4は「でなければならない」と限定しており概ね正しい。",keywords:["権利関係"]},
{year:2020,no:46,category:"税・その他",question:"住宅の税制に関する次の記述のうち、正しいものはどれか。",choices:{1:"住宅取得等資金の贈与の非課税特例は、贈与を受けた年分の所得税の確定申告期限までに申告が必要である",2:"住宅ローン控除は、居住の用に供した日から2年以内に申請しなければ適用を受けられない",3:"不動産取得税の住宅特例は、新築住宅にのみ適用され、中古住宅には適用されない",4:"住宅ローン控除の控除期間は、住宅の種類にかかわらず一律10年間である"},answer:1,explanation:"住宅取得等資金の贈与の非課税特例を受けるには、贈与を受けた年の翌年2月1日から3月15日の間に確定申告が必要。住宅ローン控除は居住年から2年以内ではなく、居住した年から適用可（確定申告は翌年）。",keywords:["税・その他"]},
{year:2020,no:47,category:"税・その他",question:"不動産に関する次の記述のうち、最も適切なものはどれか。",choices:{1:"建物の耐用年数は、税務上の法定耐用年数と建物の実際の耐用年数（経済的耐用年数）は同一である",2:"不動産の証券化により、不動産投資に係るリスクは完全に排除される",3:"土地は減価しないため、固定資産税評価においても時価と一致する",4:"不動産の投資利回りには、表面利回りと実質利回りがあり、費用等を考慮した実質利回りがより重要な指標である"},answer:4,explanation:"不動産投資では表面利回り（年間賃料収入/物件価格）と実質利回り（費用差引後純収益/物件価格）があり、費用・空室リスク等を考慮した実質利回りがより重要な指標。",keywords:["税・その他"]},
{year:2020,no:48,category:"税・その他",question:"土地の価格に関する次の記述のうち、正しいものはどれか。",choices:{1:"路線価（相続税評価額）は、公示価格の70%を目安に設定されている",2:"固定資産税評価額は、公示価格の80%を目安に設定されている",3:"基準地価（都道府県地価調査）の基準日は毎年1月1日である",4:"公示価格は国土交通省の土地鑑定委員会が毎年4月1日に公表する"},answer:1,explanation:"路線価（相続税評価）は公示価格の80%、固定資産税評価額は公示価格の70%を目安に設定。基準地価の基準日は7月1日（都道府県知事が発表）。公示価格の公表は3月下旬。",keywords:["税・その他"]},
{year:2020,no:49,category:"宅建業法",question:"宅地建物取引業法の規制に関する次の記述のうち、正しいものはどれか。",choices:{1:"宅建業者は、自ら売主として行う売買について、売買代金の50%を超える手付を受け取ることができる",2:"宅建業者は、相手方が宅建業者である場合、手付の額の上限の適用はない",3:"宅建業者が自ら売主の場合、損害賠償の予定額と違約金の合計は代金の30%を上限とする",4:"宅建業者は、未完成物件において代金の5%を超える手付金を受領した場合でも保全措置は不要である"},answer:2,explanation:"8種制限（自ら売主制限）は、買主が宅建業者の場合は適用されない（宅建業法78条2項）。したがって相手方が宅建業者なら手付上限の制限はない。",keywords:["宅建業法"]},
{year:2020,no:50,category:"宅建業法",question:"宅地建物取引業者Aが行う業務に関する次の記述のうち、宅地建物取引業法の規定によれば、誤っているものはどれか。",choices:{1:"Aは、媒介契約の締結に際し、依頼者に対し価格査定の根拠を明示する努力をしなければならない",2:"Aは、専任媒介契約を締結した場合、契約締結日から7日（休業日除く）以内に指定流通機構に登録しなければならない",3:"Aは、買主の依頼を受けて住宅ローンのあっせんを行う場合、ローンが不成立の場合の措置について重要事項説明で説明しなければならない",4:"Aは、宅地の売買の媒介において、売主・買主双方の承諾があれば、報酬限度額を超えて報酬を受け取ることができる"},answer:4,explanation:"報酬限度額（宅建業法46条）は、依頼者の合意があっても超えることができない強行規定。",keywords:["宅建業法"]},
{year:2019,no:1,category:"権利関係",question:"民法の規定に関する次の記述のうち、誤っているものはどれか。",choices:{1:"意思能力を有しない者がした法律行為は無効である",2:"未成年者が法定代理人の同意なしに行った行為は、取り消すことができる",3:"成年被後見人の法律行為は、日常生活に関するものを除き、取り消すことができる",4:"被保佐人が保佐人の同意なしに行ったすべての法律行為は取り消すことができる"},answer:4,explanation:"被保佐人が保佐人の同意を要する行為（民法13条1項各号）を同意なしに行った場合に取り消せる。すべての法律行為が対象ではなく、民法13条1項に列挙された重要な行為が対象。",keywords:["権利関係"]},
{year:2019,no:2,category:"権利関係",question:"物権の変動に関する次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。",choices:{1:"AがBにA所有の不動産を売却した場合、所有権の移転は代金の支払いがなければ生じない",2:"AがBとCの双方に同じ不動産を売却した場合、先に登記を備えた者が所有権を取得する",3:"不動産の所有権取得には、必ず登記が必要である",4:"取消しにより所有権が復帰する場合、取消前に登記を備えた第三者には取消しを対抗できる"},answer:2,explanation:"不動産の二重売買では、登記を先に備えた者が民法177条により第三者に対抗できる（ただし背信的悪意者を除く）。",keywords:["権利関係"]},
{year:2019,no:3,category:"権利関係",question:"Aが1,000万円をBに貸し付けたところ、Bが弁済期に弁済しなかった場合に関する次の記述のうち、民法の規定によれば、正しいものはどれか。",choices:{1:"AがBに対して返還を請求する訴訟を提起した場合、訴え提起の日から消滅時効が完成する",2:"Bが「来月必ず返す」と述べた場合、Bによる債務の承認となり消滅時効が更新される",3:"Aが貸付けをした日から10年で消滅時効が完成する",4:"Aが弁済期から1年以内に訴えを提起しなければ時効消滅する"},answer:2,explanation:"債務者による債務の承認は、時効の更新事由（民法152条）。確定判決確定時から新たに時効が進行（中断後更新）。消滅時効は債権者が権利を行使できると知った時から5年または権利行使可能時から10年（民法166条）。",keywords:["権利関係"]},
{year:2019,no:4,category:"権利関係",question:"Aが死亡し、相続人としてBとCの子（孫）Dがいる（BはAの子でDの親）。Bが相続放棄をした場合に関する次の記述のうち、民法の規定によれば、正しいものはどれか。",choices:{1:"DはBの代わりにAの相続人となる（代襲相続）",2:"BはAの財産に対していかなる権利も有しない",3:"BはAの財産の1/2を相続する",4:"DはCと共同してAの財産を相続する"},answer:2,explanation:"相続放棄をした者は初めから相続人でなかったものとみなされ（民法939条）、放棄した者の子による代襲相続は生じない。よってBはAの財産に対して権利を有しない。",keywords:["権利関係"]},
{year:2019,no:5,category:"権利関係",question:"売買契約に関する次の記述のうち、民法の規定によれば、正しいものはどれか。",choices:{1:"売買契約において、目的物の引渡し前に売主の責めに帰すべき事由なく目的物が滅失した場合、買主は代金の支払いを拒絶できる",2:"手付が交付された場合、売主はいつでも手付の倍額を現実に提供して契約を解除できる",3:"売主が買主に目的物を引き渡すと同時に代金を受け取る権利を有するのは、同時履行の抗弁権の典型例である",4:"売買契約において、目的物の品質が契約に適合しない場合、買主は直ちに契約を解除できる"},answer:3,explanation:"双務契約における同時履行の抗弁権（民法533条）の典型が売買における目的物引渡しと代金支払いの同時履行。手付解除は相手方が履行に着手するまでが期限。",keywords:["権利関係"]},
{year:2019,no:6,category:"権利関係",question:"抵当権に関する次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。",choices:{1:"抵当権者は、被担保債権の弁済がない場合に競売を申し立てることができる",2:"抵当不動産の第三取得者は、抵当権消滅請求をすることができる",3:"抵当権は、抵当不動産の占有を伴う権利である",4:"根抵当権は、一定範囲に属する不特定の債権を極度額の限度で担保する"},answer:3,explanation:"抵当権は占有を伴わない非占有担保物権（民法369条）。これが抵当権と質権の大きな相違点。抵当権者は目的物の占有を取得しない。",keywords:["権利関係"]},
{year:2019,no:7,category:"権利関係",question:"Aは自己所有の建物をBに賃貸し、BはAの承諾なくCに転貸した場合に関する次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。",choices:{1:"AはBの無断転貸を理由に、いつでも賃貸借契約を解除できる",2:"AとBの賃貸借契約が合意解除された場合、CはAに建物の明渡しを拒絶できる",3:"BとCとの転貸借は、AとBの賃貸借が存続する限り有効である",4:"CがAの建物を損傷した場合、AはCに損害賠償を請求できない"},answer:3,explanation:"無断転貸でも、それが信頼関係を破壊しない特段の事情がある場合は解除不可（判例）。合意解除の場合は転借人に対抗できない場合がある（判例）。AとBの賃貸借が有効な間はBCの転貸借も有効。",keywords:["権利関係"]},
{year:2019,no:8,category:"権利関係",question:"借地借家法の規定に関する次の記述のうち、正しいものはどれか。",choices:{1:"定期建物賃貸借契約は、公正証書によって締結しなければならない",2:"定期建物賃貸借において、期間が1年未満の契約も有効である",3:"普通建物賃貸借において、期間1年未満の契約は期間の定めのないものとみなされる",4:"定期建物賃貸借において、賃料の減額請求は一切できない"},answer:2,explanation:"定期建物賃貸借は1年未満の期間も有効（期間の定めのない借家制限の適用外）（借地借家法38条1項）。公正証書でなくてもよい（書面であれば足りる）。定期建物賃貸借でも賃料減額は特約で排除可能だが強制ではない。",keywords:["権利関係"]},
{year:2019,no:9,category:"権利関係",question:"連帯保証に関する次の記述のうち、民法の規定によれば、正しいものはどれか。",choices:{1:"連帯保証人は、保証人と異なり催告の抗弁権を有する",2:"連帯保証人は、主たる債務者の財産に執行しなければ自分の財産から弁済しないと主張できる",3:"連帯保証人に対する履行の請求は、主たる債務者に対しても効力を有する",4:"連帯保証人が主たる債務者に代わって弁済した場合、主たる債務者に対して求償できる"},answer:4,explanation:"連帯保証人が弁済した場合、主たる債務者に対して求償権を取得する（民法459条）。連帯保証人には催告・検索の抗弁権がない（民法454条）。2020年改正後、連帯保証人への請求は主たる債務者に絶対効を生じない。",keywords:["権利関係"]},
{year:2019,no:10,category:"権利関係",question:"区分所有法に関する次の記述のうち、正しいものはどれか。",choices:{1:"区分所有建物の建替えは、集会において区分所有者及び議決権の各3/4以上の賛成が必要である",2:"共用部分の重大変更（形状・効用の著しい変更）は、区分所有者及び議決権の各3/4以上の賛成が必要である",3:"規約の設定には、区分所有者及び議決権の各過半数の賛成が必要である",4:"管理者の選任・解任は、規約に別段の定めがない限り区分所有者全員の合意が必要である"},answer:2,explanation:"共用部分の重大変更は区分所有者及び議決権の各3/4以上の多数（区分所有法17条1項）。建替えは4/5以上（同法62条）。規約は3/4以上。管理者の選任・解任は集会の普通決議（過半数）。",keywords:["権利関係"]},
{year:2019,no:11,category:"宅建業法",question:"宅地建物取引業の免許に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。",choices:{1:"宅建業者が破産した場合、破産管財人は廃業届を提出しなければならない",2:"法人の役員が禁錮刑に処せられた場合でも、その法人は宅建業の免許を受けることができる",3:"宅建業者の事務所の所在地を管轄する都道府県知事は、常にその宅建業者の免許権者である",4:"個人で宅建業の免許を受けている者が死亡した場合、相続人がその免許を継承できる"},answer:1,explanation:"宅建業者が破産した場合、破産管財人（または相続人等）が30日以内に廃業届を提出（宅建業法11条1項4号）。法人の役員が禁錮以上の刑は欠格事由（宅建業法5条1項3号）。",keywords:["宅建業法"]},
{year:2019,no:12,category:"宅建業法",question:"宅地建物取引士の登録及び宅地建物取引士証に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。",choices:{1:"宅建試験合格後、登録の申請は当該試験を行った都道府県のほか、他の都道府県にも申請できる",2:"取引士の登録は、登録を受けた都道府県以外の都道府県には移転できない",3:"宅地建物取引士証に記載された住所を変更した場合、変更の登録を申請し、かつ取引士証の書換え交付を申請しなければならない",4:"取引士証の有効期限が切れた場合、更新申請が採択されるまでは宅地建物取引士として業務を行うことができる"},answer:3,explanation:"宅地建物取引士が住所変更した場合、変更の登録申請（宅建業法20条）と取引士証の書換え交付申請が必要。取引士証は一の都道府県への登録。移転登録は可能（同法19条の2）。",keywords:["宅建業法"]},
{year:2019,no:13,category:"宅建業法",question:"宅地建物取引業者の報酬に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか（消費税課税事業者）。",choices:{1:"宅建業者が売買の媒介をする場合、依頼者の一方からのみ報酬を受領しなければならない",2:"売買代金3,000万円の物件の媒介報酬の税込み限度額は1,089,000円である",3:"宅建業者が依頼者の特別の依頼によって行った遠隔地への出張等の費用は、報酬とは別に受領できる",4:"賃貸借の媒介における権利金の授受がある場合、報酬計算の基礎に加算することはできない"},answer:3,explanation:"依頼者の依頼による特別の費用（遠隔地出張費等）は、依頼者が承諾した場合に報酬とは別に受領できる（報酬告示）。3,000万円×3%+6万円=96万円、税込み105.6万円（1,056,000円）。権利金があれば一定の場合に売買代金等に準じて計算可。",keywords:["宅建業法"]},
{year:2019,no:14,category:"宅建業法",question:"宅地建物取引業法第35条の重要事項説明に関する次の記述のうち、誤っているものはどれか。",choices:{1:"宅建業者が宅地の売買を媒介する場合、土地の面積に関する権利関係を重要事項として説明しなければならない",2:"宅建業者が建物の賃貸借を媒介する場合、当該建物の管理が委託されているときはその委託先を説明しなければならない",3:"重要事項説明書を相手方に交付するときは、取引士がその書面に記名しなければならない",4:"重要事項説明書の交付は、必ず取引士が相手方に直接手渡しで交付しなければならない"},answer:4,explanation:"重要事項説明書の交付は郵送や電磁的方法でも可能であり、必ず直接手渡しでなければならないわけではない。",keywords:["宅建業法"]},
{year:2019,no:15,category:"宅建業法",question:"宅地建物取引業法の規定する媒介契約について正しいものはどれか。",choices:{1:"宅建業者は、専任媒介契約を締結した場合、当該物件を指定流通機構に登録しなければならない",2:"一般媒介契約は書面によって締結しなければならないが、媒介契約書の様式は自由である",3:"専属専任媒介契約において、業者は2週間に1回以上の業務状況報告義務を負う",4:"媒介業者は、媒介契約の有効期間中に成立した契約にのみ報酬を請求できる"},answer:1,explanation:"専任媒介契約を締結した場合、宅建業者は7日（休業日除く）以内に指定流通機構への登録義務がある（宅建業法34条の2第5項）。専属専任は5日以内。専属専任の業務報告は1週間に1回以上。",keywords:["宅建業法"]},
{year:2019,no:16,category:"宅建業法",question:"宅地建物取引業者が自ら売主として行う売買において、宅地建物取引業法で定められた制限に関する次の記述のうち、正しいものはどれか（買主は宅建業者でない）。",choices:{1:"瑕疵担保責任（現・契約不適合責任）の期間を「引渡しから2年間」と定める特約は無効である",2:"損害賠償額を代金の20%とする特約は、有効である",3:"完成物件について、代金の10%かつ1,000万円以下であれば手付金の保全措置は不要である",4:"手付解除ができる期限として「売買契約成立から3か月以内」と定める特約は無効である"},answer:2,explanation:"損害賠償予定額・違約金の合計は代金の20%まで有効（宅建業法38条）。瑕疵担保（契約不適合）責任の期間は引渡しから2年以上とする必要あり（宅建業法40条）。完成物件の保全措置免除は代金の10%以内かつ1,000万円以下。",keywords:["宅建業法"]},
{year:2019,no:17,category:"宅建業法",question:"宅地建物取引業法の規定に関する次の記述のうち、誤っているものはどれか。",choices:{1:"宅建業者は、正当な理由なく取引関係者の秘密を他に漏らしてはならない",2:"宅建業者が相手方の判断に重要な影響を及ぼす事項について、故意に不実のことを告げることは禁止されている",3:"宅建業者は、相手方等に対して確実に利益をもたらす旨の断定的判断の提供を禁じられている",4:"宅建業者が手付に関する信用供与（貸付）をすることは、相手方の承諾があれば認められる"},answer:4,explanation:"手付に関する信用供与（貸付・後払い等）は、相手方の承諾があっても禁止（宅建業法47条3号）。これは強行規定で当事者の合意で変更できない。",keywords:["宅建業法"]},
{year:2019,no:18,category:"宅建業法",question:"宅地建物取引業者が行う37条書面に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。",choices:{1:"37条書面の記名は、専任の宅地建物取引士が行わなければならない",2:"37条書面に記載すべき事項として、宅地建物の引渡しの時期がある",3:"37条書面は、契約締結後7日以内に交付しなければならない",4:"37条書面は、宅建業者が直接取引の相手方に手渡しで交付しなければならない"},answer:2,explanation:"引渡しの時期は37条書面の必要的記載事項（宅建業法37条1項4号）。記名は専任取引士でなくても宅地建物取引士であれば可（勤務する取引士）。37条書面は遅滞なく交付。",keywords:["宅建業法"]},
{year:2019,no:19,category:"宅建業法",question:"宅地建物取引業者の保証制度に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。",choices:{1:"保証協会の弁済業務保証金分担金は、主たる事務所につき600,000円である",2:"保証協会に加入した宅建業者は、加入前に生じた債権についても弁済業務保証金から弁済を受けられる",3:"宅建業者は、営業保証金制度と保証協会の弁済業務保証金制度の両方を選択して利用できる",4:"保証協会からの還付により弁済業務保証金が減少した場合、社員業者は通知を受けてから2週間以内に分担金を納付しなければならない"},answer:4,explanation:"弁済業務保証金の還付による不足が生じた場合、保証協会の通知を受けてから2週間以内に還付充当金を納付する義務がある（宅建業法64条の10）。",keywords:["宅建業法"]},
{year:2019,no:20,category:"宅建業法",question:"宅地建物取引業法の規定に関する次の記述のうち、正しいものはどれか。",choices:{1:"宅建業者の従業者でない者が取引関係者から従業者証明書の提示を求められた場合、宅建業者はこれに応じる義務はない",2:"宅建業者は、取引に関する帳簿を事務所ごとに設け、取引のあったつど、取引の年月日等の事項を記載しなければならない",3:"宅建業者は、従業者名簿を最終の記載の日から5年間保存しなければならない",4:"宅建業者は、毎年3月31日時点の従業者数を免許権者に報告しなければならない"},answer:2,explanation:"宅建業者は事務所ごとに帳簿（取引台帳）を備え付け、取引があった都度必要事項を記録する義務がある（宅建業法49条）。従業者名簿の保存期間は最終記載から10年間（同法48条4項）。",keywords:["宅建業法"]},
{year:2019,no:21,category:"法令上の制限",question:"都市計画法の規定に関する次の記述のうち、正しいものはどれか。",choices:{1:"都市計画区域は、行政区画（市町村の区域）に従って指定される",2:"市街化区域内において開発行為を行う場合、1,000㎡以上であれば開発許可が必要である",3:"開発許可を受けた開発区域内では、工事完了の公告後でなければ建築物を建築できない",4:"開発許可を受けた区域内の土地の権利を取得した者は、当該開発許可に係る目的外の建築物を建築できる場合がある"},answer:2,explanation:"市街化区域での開発行為は1,000㎡以上（三大都市圏の一定区域は500㎡以上）で開発許可が必要（都市計画法29条）。工事完了公告前は原則建築不可（同法37条）。",keywords:["法令上の制限"]},
{year:2019,no:22,category:"法令上の制限",question:"建築基準法の建蔽率及び容積率に関する次の記述のうち、正しいものはどれか。",choices:{1:"建蔽率は、敷地面積に対する建築面積の割合をいう",2:"容積率は、敷地面積に対する各階の床面積の合計（延べ面積）の割合をいう",3:"前面道路が2本ある場合、容積率の計算においては幅員が小さい方の道路を前面道路とする",4:"建蔽率の限度が40%の地域では、角地であっても緩和措置は受けられない"},answer:2,explanation:"容積率は敷地面積に対する延べ面積の割合（建築基準法52条1項）。建蔽率は建築面積/敷地面積。前面道路が複数ある場合は最大幅員のものを採用。角地は10%加算（条件付き）。",keywords:["法令上の制限"]},
{year:2019,no:23,category:"法令上の制限",question:"農地法に関する次の記述のうち、正しいものはどれか。",choices:{1:"農地を農地のまま第三者に贈与する場合、農地法第3条の許可は不要である",2:"農地を農地以外のものにする目的で農地の所有権を移転する場合は、農地法第5条の許可が必要である",3:"農地法第4条・第5条の許可を受けずに農地を転用した場合、転用行為は有効に成立する",4:"市街化区域内の農地を住宅建設の目的で転用する場合、農地法第4条の許可が必要である"},answer:2,explanation:"農地を農地以外の目的で権利移動（売買・贈与等）する場合は農地法5条の許可が必要。贈与も農地のまま権利移動する場合は農地法3条の許可が必要。農地法違反の転用は原状回復命令の対象。",keywords:["法令上の制限"]},
{year:2019,no:24,category:"法令上の制限",question:"建築基準法の集団規定に関する次の記述のうち、正しいものはどれか。",choices:{1:"都市計画区域内においては、建築物の敷地は原則として道路に接していなければならないが、特定行政庁の許可があれば不要である",2:"建築基準法上の道路は、幅員4m以上のものに限られる",3:"2項道路（みなし道路）に接する敷地に建物を建築する際は、道路中心線から2mセットバックする必要がある",4:"第一種低層住居専用地域内の道路は、歩道と車道を区別して設けなければならない"},answer:3,explanation:"2項道路（建築基準法42条2項）に接する敷地では、道路中心線から2mの線が道路境界線とみなされ（セットバック義務）、その部分に建築物を建築できない。",keywords:["法令上の制限"]},
{year:2019,no:25,category:"法令上の制限",question:"国土利用計画法に関する次の記述のうち、正しいものはどれか。",choices:{1:"市街化区域内の2,000㎡以上の土地の売買には事後届出が必要である",2:"事後届出の届出期限は、契約締結後3週間以内である",3:"事後届出を要する面積基準は、都市計画区域内では一律2,000㎡以上である",4:"事後届出が必要な土地取引において、届出をしなかった場合の罰則はない"},answer:1,explanation:"市街化区域内では2,000㎡以上の土地売買等の契約に事後届出が必要（国土利用計画法23条）。届出は契約後2週間以内。都市計画区域外は10,000㎡以上。違反には罰則あり（同法47条）。",keywords:["法令上の制限"]},
{year:2019,no:26,category:"法令上の制限",question:"土地区画整理法に関する次の記述のうち、正しいものはどれか。",choices:{1:"土地区画整理組合は、組合員以外の者を施行者とすることができない",2:"宅地の所有者と借地権者は、いずれも施行地区内にある宅地について仮換地の指定を受けることができる",3:"換地処分の公告があった日の翌日から、換地は従前の宅地とみなされる",4:"土地区画整理組合の設立認可は、都道府県知事の認可と組合員全員の合意が必要である"},answer:3,explanation:"換地処分の公告があった翌日から換地が従前の宅地とみなされ（土地区画整理法104条1項）、権利が確定する。",keywords:["法令上の制限"]},
{year:2019,no:27,category:"法令上の制限",question:"建築基準法の用途制限に関する次の記述のうち、正しいものはどれか。",choices:{1:"第一種低層住居専用地域内には、いかなる店舗も建築できない",2:"第一種住居地域内には、床面積の合計が3,000㎡を超える店舗は建築できない",3:"商業地域では、工場を建築することができない",4:"準工業地域では、住宅を建築することができない"},answer:2,explanation:"第一種住居地域では、床面積合計が3,000㎡を超える店舗・飲食店等は建築不可（建築基準法別表第2）。第一種低層住居専用地域でも小規模店舗（50㎡以下等）は建築可能。準工業地域は住宅建築可。",keywords:["法令上の制限"]},
{year:2019,no:28,category:"法令上の制限",question:"景観法に関する次の記述のうち、正しいものはどれか。",choices:{1:"景観地区は、都市計画区域または準都市計画区域内にのみ定めることができる",2:"景観地区内においては、建築物の新築に際して市町村長の認定が必要である",3:"景観計画区域の指定は、都道府県知事のみが行うことができる",4:"景観法の規定は、国の機関が設置する工作物には適用されない"},answer:2,explanation:"景観地区内では、建築物の建築等について市町村長の認定が必要（景観法62条）。景観計画は市町村も策定できる。",keywords:["法令上の制限"]},
{year:2019,no:29,category:"税・その他",question:"不動産取得税に関する次の記述のうち、正しいものはどれか。",choices:{1:"不動産取得税は、国税であり税率は一律4%である",2:"不動産を購入する契約が締結された時点で不動産取得税の課税要件を充足する",3:"相続による不動産の取得には不動産取得税は課税されない",4:"新築住宅の不動産取得税は、固定資産税評価額から1,000万円を控除した金額に課税される"},answer:3,explanation:"相続による不動産の取得は不動産取得税の非課税事由（地方税法73条の7第1号）。不動産取得税は地方税（都道府県税）。登記完了・引渡し等による実際の取得時が課税時点。新築住宅の控除額は1,200万円（一定の住宅）。",keywords:["税・その他"]},
{year:2019,no:30,category:"税・その他",question:"固定資産税に関する次の記述のうち、正しいものはどれか。",choices:{1:"固定資産税の納税義務者は、毎年4月1日現在において固定資産台帳に所有者として登録されている者である",2:"宅地の固定資産税評価は、3年ごとに行われる基準年度に評価替えが行われる",3:"新築住宅（床面積が50㎡以上280㎡以下）に対する固定資産税の軽減税率は、一律5年間税額の1/2に減額される",4:"固定資産税の課税標準の特例として、小規模住宅用地の課税標準は評価額の1/3に軽減される"},answer:2,explanation:"固定資産の評価替えは3年ごとの基準年度に行われる（地方税法349条）。賦課期日は1月1日。新築住宅の軽減は一般住宅3年間・マンション5年間（長期優良住宅はさらに長期）。小規模住宅用地は1/6に軽減。",keywords:["税・その他"]},
{year:2019,no:31,category:"税・その他",question:"土地・建物の譲渡に係る所得税の特例に関する次の記述のうち、正しいものはどれか。",choices:{1:"居住用財産の3,000万円特別控除は、土地だけの譲渡には適用できない",2:"居住用財産の譲渡所得の特別控除（3,000万円）と住宅ローン控除は、同じ年に重複して適用できる",3:"長期譲渡所得の税率（所得税15%+住民税5%）は、6,000万円以下の居住用財産では14%（所得税10%+住民税4%）に軽減される",4:"居住用財産の買換え特例は、新居が旧居の売却代金より安い場合でも適用できる"},answer:3,explanation:"10年超所有の居住用財産の長期譲渡所得で、6,000万円以下の部分は所得税10%+住民税4%=14%に軽減（措置法31条の3）。6,000万円超の部分は通常の長期税率（15%+5%）。",keywords:["税・その他"]},
{year:2019,no:32,category:"税・その他",question:"登録免許税に関する次の記述のうち、正しいものはどれか。",choices:{1:"相続による所有権移転登記の税率は1,000分の4である",2:"贈与による所有権移転登記の税率は1,000分の20である",3:"売買による所有権移転登記の税率（住宅以外）は1,000分の10である",4:"土地の売買による所有権移転登記の本則税率は1,000分の20であるが、住宅用地については軽減税率がある"},answer:4,explanation:"土地の売買による所有権移転登記の本則税率は1,000分の20（2%）。相続は1,000分の4（0.4%）。贈与は1,000分の20（2%）。住宅等の軽減税率あり。",keywords:["税・その他"]},
{year:2019,no:33,category:"税・その他",question:"印紙税に関する次の記述のうち、誤っているものはどれか。",choices:{1:"土地の賃貸借契約書は印紙税の課税文書である",2:"不動産の売買に関する仮契約書には印紙税が課税される",3:"建物の建築工事請負契約書は印紙税の課税文書である",4:"土地及び建物の贈与契約書には印紙税は課税されない"},answer:4,explanation:"不動産の贈与契約書（無償の権利移転に関する証書）も一定の場合に印紙税が課税される文書となる。すべての贈与が非課税とは言えない。",keywords:["税・その他"]},
{year:2019,no:34,category:"税・その他",question:"地価公示及び不動産鑑定評価に関する次の記述のうち、正しいものはどれか。",choices:{1:"地価公示の公示価格は、一般の土地取引の指標として用いられるが、公共事業用地取得の基準とはならない",2:"不動産鑑定士は、鑑定評価書に記名押印しなければならない",3:"収益還元法は賃貸用不動産にのみ適用できる手法であり、自用の不動産には適用できない",4:"取引事例比較法においては、正常な取引事例のみを採用しなければならない"},answer:4,explanation:"取引事例比較法では、正常な取引事例（特殊な事情のない事例）を採用し、必要に応じて事情補正・時点修正を行う（不動産鑑定評価基準）。収益還元法は賃貸不動産以外にも適用可能。公示価格は公共取得の基準にもなる。",keywords:["税・その他"]},
{year:2019,no:35,category:"宅建業法",question:"宅地建物取引業者が行う業務に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。",choices:{1:"宅建業者は、業務上知り得た秘密を正当な理由なく漏らすことを禁じられているが、取引士は同様の義務を負わない",2:"宅建業者は、宅地の売買の媒介に際し、取引の相手方に対して手数料の金額の説明をしなければならない",3:"宅建業者は、宅地又は建物の売買の広告に際し、取引態様を明示しなければならない",4:"宅建業者は、売買の媒介をする場合、代金の額を媒介契約書に記載する必要はない"},answer:3,explanation:"取引態様（自己売買・交換・媒介・代理の別）は、広告に際して明示しなければならない（宅建業法34条1項）。取引士も秘密保持義務あり（宅建業法45条）。",keywords:["宅建業法"]},
{year:2019,no:36,category:"宅建業法",question:"宅地建物取引業者Aが、Bを売主とする宅地の売買について、Cから媒介の依頼を受け契約が成立した場合に関する次の記述のうち、宅地建物取引業法の規定によれば、誤っているものはどれか。",choices:{1:"AはBおよびCの両方から報酬を受け取ることができるが、合計額は法定限度内でなければならない",2:"AはBとCの双方に重要事項説明書を交付しなければならない",3:"AはCからのみ媒介の依頼を受けているため、Bに37条書面を交付する必要はない",4:"AはBとCの双方に37条書面を交付しなければならない"},answer:3,explanation:"37条書面（契約書面）は、宅建業者が媒介した場合、売主・買主等の取引当事者全員に交付しなければならない（宅建業法37条）。Cのみならず売主Bにも交付が必要。",keywords:["宅建業法"]},
{year:2019,no:37,category:"宅建業法",question:"宅地建物取引業者Aが、自ら売主として宅地建物取引業者でないBとの間で宅地の売買契約を締結した場合における手付に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。",choices:{1:"Aが手付の全額をBに返還し申し出たとき、BはAの解除の申し出を拒絶することができる",2:"Aが受領した手付金は、常に解約手付としての性質を有する",3:"手付金の額がいかなる場合も、代金の20%を超えることはできない",4:"Bが契約の履行に着手した後は、Aは手付を倍返しして解除することができない"},answer:4,explanation:"相手方が契約の履行に着手した後は、手付による解除ができない（民法557条）。宅建業者が売主の場合、手付は解約手付とみなされる（宅建業法39条2項）。手付上限は代金の20%（宅建業法39条1項）。",keywords:["宅建業法"]},
{year:2019,no:38,category:"宅建業法",question:"宅地建物取引業者が行う広告規制に関する次の記述のうち、宅地建物取引業法の規定によれば、誤っているものはどれか。",choices:{1:"宅建業者は、実際の取引価格よりも著しく低い価格を広告してはならない",2:"宅建業者は、建物の売買について建築確認を受ける前から、確認申請中である旨を明示して広告することができる",3:"宅建業者は、取引する意思のない物件について広告してはならない",4:"宅建業者は、宅地建物の将来の売買価格について、根拠のない断定的な判断を提供してはならない"},answer:2,explanation:"宅建業者は建築確認を受ける前の物件について広告してはならない（宅建業法33条）。確認申請中であっても確認を受けるまでは広告禁止。",keywords:["宅建業法"]},
{year:2019,no:39,category:"宅建業法",question:"宅地建物取引業者の監督処分に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。",choices:{1:"指示処分と業務停止処分は同時に科することができない",2:"業務停止処分の最長期間は6か月である",3:"免許取消処分は、任意的取消事由と必要的取消事由がある",4:"都道府県知事は、その都道府県内で業務を行う国土交通大臣免許の業者に対して、指示処分ができない"},answer:3,explanation:"免許取消しには、違反があれば必ず取り消す必要的取消事由（宅建業法66条1項1号〜11号等）と、取り消すことができる任意的取消事由がある。業務停止処分の最長期間は1年（宅建業法65条2項）。",keywords:["宅建業法"]},
{year:2019,no:40,category:"宅建業法",question:"宅地建物取引業者が行う業務に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。",choices:{1:"宅建業者が自ら売主として宅地を売却する場合、宅地の種類・品質に関して事実に反することを告げることができる",2:"宅建業者が媒介業者として行動する場合、売主・買主双方の利益を代理する義務がある",3:"宅建業者は、業務に関して作成した書類について、その種類にかかわらず5年間保存しなければならない",4:"宅建業者は、新聞・雑誌等の広告については宅建業法の規制を受けるが、インターネット広告は受けない"},answer:2,explanation:"媒介業者は売主・買主双方の利益のために誠実に業務を行う義務がある（善管注意義務）（宅建業法31条）。インターネット広告も宅建業法の広告規制の対象。",keywords:["宅建業法"]},
{year:2019,no:41,category:"法令上の制限",question:"建築基準法の規定に関する次の記述のうち、正しいものはどれか。",choices:{1:"第一種低層住居専用地域内では、原則として住宅兼用店舗を建築できない",2:"建築物の延べ面積には、駐車場の用途に供する部分は算入されない",3:"日影規制は、第一種低層住居専用地域内の建築物には適用されない",4:"居室の採光に必要な窓等の開口部の面積は、居室の床面積に対し一定割合以上でなければならない"},answer:4,explanation:"居室には採光のために一定の割合以上の開口部を設ける必要がある（建築基準法28条）。住宅兼用店舗は第一種低層住居専用地域でも小規模なものは建築可能。日影規制は低層住居専用地域にも適用される。",keywords:["法令上の制限"]},
{year:2019,no:42,category:"法令上の制限",question:"都市計画法の開発許可制度に関する次の記述のうち、正しいものはどれか。",choices:{1:"開発許可申請の際には、都道府県知事に申請手数料を納付しなければならない",2:"市街化調整区域において、農業者の住宅建設のための開発行為には開発許可は必要ない",3:"開発許可を受けた開発区域内であっても、土地の形質変更に際して建築確認は不要である",4:"開発許可を受けた開発区域の全部または一部について、開発行為に関する工事の廃止届出が必要な場合がある"},answer:2,explanation:"農業・林業・漁業を営む者が建築する農林漁業用建築物や居住用建築物のための開発行為は開発許可不要（都市計画法29条1項2号）。",keywords:["法令上の制限"]},
{year:2019,no:43,category:"法令上の制限",question:"建物の構造に関する次の記述のうち、最も不適切なものはどれか。",choices:{1:"木造建築は、耐震性・耐火性の観点から高層建築物には不向きである",2:"鉄筋コンクリート造は、引張力に強いコンクリートと圧縮力に強い鉄筋を組み合わせた構造である",3:"鉄骨造は、靭性（粘り強さ）が高く地震に対して有利な面がある",4:"鉄骨鉄筋コンクリート造は、高層建築物にも用いられる構造形式である"},answer:2,explanation:"鉄筋コンクリートの特性は逆で、コンクリートは圧縮力に強く引張力に弱い。鉄筋は引張力に強い。この両者を組み合わせることで互いの弱点を補う。",keywords:["法令上の制限"]},
{year:2019,no:44,category:"権利関係",question:"民法上の代理に関する次の記述のうち、正しいものはどれか。",choices:{1:"代理権がない者が代理行為をした場合（無権代理）、本人が追認しなければその行為の効力は生じない",2:"有権代理において、代理人の行為の効果は代理人に帰属する",3:"代理権は、代理人が死亡した場合でも消滅しない",4:"代理行為の瑕疵（錯誤・詐欺等）は、本人ではなく代理人を基準として判断する"},answer:4,explanation:"代理行為における意思の欠缺・瑕疵（錯誤・詐欺・強迫等）の有無は、代理人を基準として判断する（民法101条1項）。有権代理の効果は本人に帰属。代理権は本人・代理人の死亡で消滅（民法111条）。",keywords:["権利関係"]},
{year:2019,no:45,category:"権利関係",question:"不動産登記に関する次の記述のうち、誤っているものはどれか。",choices:{1:"表題部の登記（表示登記）は、登記官が職権で行うことがある",2:"区分建物（マンション等）については、表示の登記をするには、各専有部分の床面積は壁その他の区画の内側線で囲まれた部分の水平投影面積による",3:"区分建物の登記において、各区分所有者の共用部分の持分は、原則として専有部分の床面積の割合による",4:"登記記録上の地目が農地でなければ、農地法の適用を受けることはない"},answer:4,explanation:"農地法における農地の認定は現況主義であり、登記上の地目ではなく現在の土地の状況（現に農地として使用されているか）で判断する。",keywords:["権利関係"]},
{year:2019,no:46,category:"税・その他",question:"住宅ローン控除（住宅借入金等特別控除）に関する次の記述のうち、正しいものはどれか。",choices:{1:"住宅ローン控除の適用を受ける初年度は、確定申告をする必要がある",2:"住宅ローン控除の控除限度額は、残高の1%で計算される",3:"住宅ローン控除の対象となる住宅の床面積の下限は、50㎡（合計所得金額1,000万円以下の者は40㎡）以上である",4:"住宅ローン控除は、転居した後でも控除期間中は継続して適用を受けられる"},answer:1,explanation:"住宅ローン控除は、居住した年の翌年に確定申告が必要（初年度）。2年目以降は年末調整で対応可（給与所得者の場合）。",keywords:["税・その他"]},
{year:2019,no:47,category:"税・その他",question:"土地の有効活用に関する記述のうち、最も不適切なものはどれか。",choices:{1:"等価交換方式では、土地所有者は建設費を負担することなく、提供した土地の価値に見合う建物の一部を取得できる",2:"建設協力金方式では、土地所有者が将来テナントとなる者から建設資金を借り、その建物を賃貸する",3:"定期借地権方式では、契約期間満了後に土地が返還されるため、将来の土地の自由な利用が確保される",4:"事業受託方式では、土地所有者がデベロッパーに土地を売却して開発を任せる方式である"},answer:4,explanation:"事業受託方式は、土地所有者が土地を保有したまま（売却せず）、デベロッパー等に建設・管理・運営を委託する方式。土地を売却するわけではない。",keywords:["税・その他"]},
{year:2019,no:48,category:"税・その他",question:"不動産市場に関する次の記述のうち、正しいものはどれか。",choices:{1:"不動産市場は、株式市場と異なり価格の透明性が非常に高い",2:"不動産の価格は供給の増減に敏感に反応するため、短期的な価格変動が激しい",3:"不動産は個別性が高いため、同種の不動産であっても価格は異なることがある",4:"金利が上昇すると、不動産価格は上昇する傾向がある"},answer:3,explanation:"不動産は個別性（固定性・位置の固定性・個別性）が高く、同種・同条件に見える不動産でも立地・日当たり等で価格は異なる。不動産市場は株式市場に比べて価格の透明性が低い。金利上昇は住宅ローン金利上昇により不動産需要を抑制し価格下落要因。",keywords:["税・その他"]},
{year:2019,no:49,category:"宅建業法",question:"宅地建物取引業法に関する次の記述のうち、正しいものはどれか。",choices:{1:"宅建業者の使用人が、宅建業者の事務所外でその業務に関し法令違反を行った場合、宅建業者は一切の責任を負わない",2:"宅建業者が名義を貸して他の者が宅建業を営んだ場合、名義を貸した宅建業者は宅建業法の罰則を受けない",3:"宅建業者でない者が宅建業を営んだ場合、3年以下の懲役もしくは300万円以下の罰金またはその両方に処せられることがある",4:"宅建業者が報酬限度額を超える報酬を受け取った場合、過剰受領分のみを返還すれば宅建業法上の問題はない"},answer:3,explanation:"無免許営業は3年以下の懲役もしくは300万円以下の罰金（宅建業法79条）。名義貸しも禁止（同法13条）で違反すれば罰則あり。報酬超過受領は行政処分と罰則の対象。",keywords:["宅建業法"]},
{year:2019,no:50,category:"宅建業法",question:"宅地建物取引業者Aが、Bに対して宅地の売買の媒介を行い、売買契約が成立した場合に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。",choices:{1:"AはBに対して、売買代金の一定額を証拠金として支払うよう強制することができる",2:"AはBから依頼を受けて住宅ローンのあっせんをしたが、ローンが不成立になった場合、その旨を重要事項説明書に記載して説明しなければならない",3:"AがBから媒介報酬を受領した後に、当該売買契約がBの都合でキャンセルされた場合でもAは報酬を返還しなくてよい",4:"Aは、当該売買契約の当事者でないため、37条書面を作成する必要はない"},answer:2,explanation:"住宅ローンのあっせんをする場合、ローンが不成立の場合の措置について重要事項説明が必要（宅建業法35条1項12号）。媒介業者も37条書面を作成・交付する義務がある（同法37条1項）。",keywords:["宅建業法"]},
{year:2018,no:1,category:"権利関係",question:"民法の規定に関する次の記述のうち、誤っているものはどれか。",choices:{1:"意思能力を有しない者がした法律行為は無効である",2:"未成年者が法定代理人の同意なしに行った行為は、取り消すことができる",3:"成年被後見人の法律行為は、日常生活に関するものを除き、取り消すことができる",4:"被保佐人が保佐人の同意なしに行ったすべての法律行為は取り消すことができる"},answer:4,explanation:"被保佐人が保佐人の同意を要する行為（民法13条1項各号）を同意なしに行った場合に取り消せる。すべての法律行為が対象ではなく、民法13条1項に列挙された重要な行為が対象。",keywords:["権利関係"]},
{year:2018,no:2,category:"権利関係",question:"物権の変動に関する次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。",choices:{1:"AがBにA所有の不動産を売却した場合、所有権の移転は代金の支払いがなければ生じない",2:"AがBとCの双方に同じ不動産を売却した場合、先に登記を備えた者が所有権を取得する",3:"不動産の所有権取得には、必ず登記が必要である",4:"取消しにより所有権が復帰する場合、取消前に登記を備えた第三者には取消しを対抗できる"},answer:2,explanation:"不動産の二重売買では、登記を先に備えた者が民法177条により第三者に対抗できる（ただし背信的悪意者を除く）。",keywords:["権利関係"]},
{year:2018,no:3,category:"権利関係",question:"Aが1,000万円をBに貸し付けたところ、Bが弁済期に弁済しなかった場合に関する次の記述のうち、民法の規定によれば、正しいものはどれか。",choices:{1:"AがBに対して返還を請求する訴訟を提起した場合、訴え提起の日から消滅時効が完成する",2:"Bが「来月必ず返す」と述べた場合、Bによる債務の承認となり消滅時効が更新される",3:"Aが貸付けをした日から10年で消滅時効が完成する",4:"Aが弁済期から1年以内に訴えを提起しなければ時効消滅する"},answer:2,explanation:"債務者による債務の承認は、時効の更新事由（民法152条）。確定判決確定時から新たに時効が進行（中断後更新）。消滅時効は債権者が権利を行使できると知った時から5年または権利行使可能時から10年（民法166条）。",keywords:["権利関係"]},
{year:2018,no:4,category:"権利関係",question:"Aが死亡し、相続人としてBとCの子（孫）Dがいる（BはAの子でDの親）。Bが相続放棄をした場合に関する次の記述のうち、民法の規定によれば、正しいものはどれか。",choices:{1:"DはBの代わりにAの相続人となる（代襲相続）",2:"BはAの財産に対していかなる権利も有しない",3:"BはAの財産の1/2を相続する",4:"DはCと共同してAの財産を相続する"},answer:2,explanation:"相続放棄をした者は初めから相続人でなかったものとみなされ（民法939条）、放棄した者の子による代襲相続は生じない。よってBはAの財産に対して権利を有しない。",keywords:["権利関係"]},
{year:2018,no:5,category:"権利関係",question:"売買契約に関する次の記述のうち、民法の規定によれば、正しいものはどれか。",choices:{1:"売買契約において、目的物の引渡し前に売主の責めに帰すべき事由なく目的物が滅失した場合、買主は代金の支払いを拒絶できる",2:"手付が交付された場合、売主はいつでも手付の倍額を現実に提供して契約を解除できる",3:"売主が買主に目的物を引き渡すと同時に代金を受け取る権利を有するのは、同時履行の抗弁権の典型例である",4:"売買契約において、目的物の品質が契約に適合しない場合、買主は直ちに契約を解除できる"},answer:3,explanation:"双務契約における同時履行の抗弁権（民法533条）の典型が売買における目的物引渡しと代金支払いの同時履行。手付解除は相手方が履行に着手するまでが期限。",keywords:["権利関係"]},
{year:2018,no:6,category:"権利関係",question:"抵当権に関する次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。",choices:{1:"抵当権者は、被担保債権の弁済がない場合に競売を申し立てることができる",2:"抵当不動産の第三取得者は、抵当権消滅請求をすることができる",3:"抵当権は、抵当不動産の占有を伴う権利である",4:"根抵当権は、一定範囲に属する不特定の債権を極度額の限度で担保する"},answer:3,explanation:"抵当権は占有を伴わない非占有担保物権（民法369条）。これが抵当権と質権の大きな相違点。抵当権者は目的物の占有を取得しない。",keywords:["権利関係"]},
{year:2018,no:7,category:"権利関係",question:"Aは自己所有の建物をBに賃貸し、BはAの承諾なくCに転貸した場合に関する次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。",choices:{1:"AはBの無断転貸を理由に、いつでも賃貸借契約を解除できる",2:"AとBの賃貸借契約が合意解除された場合、CはAに建物の明渡しを拒絶できる",3:"BとCとの転貸借は、AとBの賃貸借が存続する限り有効である",4:"CがAの建物を損傷した場合、AはCに損害賠償を請求できない"},answer:3,explanation:"無断転貸でも、それが信頼関係を破壊しない特段の事情がある場合は解除不可（判例）。合意解除の場合は転借人に対抗できない場合がある（判例）。AとBの賃貸借が有効な間はBCの転貸借も有効。",keywords:["権利関係"]},
{year:2018,no:8,category:"権利関係",question:"借地借家法の規定に関する次の記述のうち、正しいものはどれか。",choices:{1:"定期建物賃貸借契約は、公正証書によって締結しなければならない",2:"定期建物賃貸借において、期間が1年未満の契約も有効である",3:"普通建物賃貸借において、期間1年未満の契約は期間の定めのないものとみなされる",4:"定期建物賃貸借において、賃料の減額請求は一切できない"},answer:2,explanation:"定期建物賃貸借は1年未満の期間も有効（期間の定めのない借家制限の適用外）（借地借家法38条1項）。公正証書でなくてもよい（書面であれば足りる）。定期建物賃貸借でも賃料減額は特約で排除可能だが強制ではない。",keywords:["権利関係"]},
{year:2018,no:9,category:"権利関係",question:"連帯保証に関する次の記述のうち、民法の規定によれば、正しいものはどれか。",choices:{1:"連帯保証人は、保証人と異なり催告の抗弁権を有する",2:"連帯保証人は、主たる債務者の財産に執行しなければ自分の財産から弁済しないと主張できる",3:"連帯保証人に対する履行の請求は、主たる債務者に対しても効力を有する",4:"連帯保証人が主たる債務者に代わって弁済した場合、主たる債務者に対して求償できる"},answer:4,explanation:"連帯保証人が弁済した場合、主たる債務者に対して求償権を取得する（民法459条）。連帯保証人には催告・検索の抗弁権がない（民法454条）。2020年改正後、連帯保証人への請求は主たる債務者に絶対効を生じない。",keywords:["権利関係"]},
{year:2018,no:10,category:"権利関係",question:"区分所有法に関する次の記述のうち、正しいものはどれか。",choices:{1:"区分所有建物の建替えは、集会において区分所有者及び議決権の各3/4以上の賛成が必要である",2:"共用部分の重大変更（形状・効用の著しい変更）は、区分所有者及び議決権の各3/4以上の賛成が必要である",3:"規約の設定には、区分所有者及び議決権の各過半数の賛成が必要である",4:"管理者の選任・解任は、規約に別段の定めがない限り区分所有者全員の合意が必要である"},answer:2,explanation:"共用部分の重大変更は区分所有者及び議決権の各3/4以上の多数（区分所有法17条1項）。建替えは4/5以上（同法62条）。規約は3/4以上。管理者の選任・解任は集会の普通決議（過半数）。",keywords:["権利関係"]},
{year:2018,no:11,category:"宅建業法",question:"宅地建物取引業の免許に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。",choices:{1:"宅建業者が破産した場合、破産管財人は廃業届を提出しなければならない",2:"法人の役員が禁錮刑に処せられた場合でも、その法人は宅建業の免許を受けることができる",3:"宅建業者の事務所の所在地を管轄する都道府県知事は、常にその宅建業者の免許権者である",4:"個人で宅建業の免許を受けている者が死亡した場合、相続人がその免許を継承できる"},answer:1,explanation:"宅建業者が破産した場合、破産管財人（または相続人等）が30日以内に廃業届を提出（宅建業法11条1項4号）。法人の役員が禁錮以上の刑は欠格事由（宅建業法5条1項3号）。",keywords:["宅建業法"]},
{year:2018,no:12,category:"宅建業法",question:"宅地建物取引士の登録及び宅地建物取引士証に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。",choices:{1:"宅建試験合格後、登録の申請は当該試験を行った都道府県のほか、他の都道府県にも申請できる",2:"取引士の登録は、登録を受けた都道府県以外の都道府県には移転できない",3:"宅地建物取引士証に記載された住所を変更した場合、変更の登録を申請し、かつ取引士証の書換え交付を申請しなければならない",4:"取引士証の有効期限が切れた場合、更新申請が採択されるまでは宅地建物取引士として業務を行うことができる"},answer:3,explanation:"宅地建物取引士が住所変更した場合、変更の登録申請（宅建業法20条）と取引士証の書換え交付申請が必要。取引士証は一の都道府県への登録。移転登録は可能（同法19条の2）。",keywords:["宅建業法"]},
{year:2018,no:13,category:"宅建業法",question:"宅地建物取引業者の報酬に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか（消費税課税事業者）。",choices:{1:"宅建業者が売買の媒介をする場合、依頼者の一方からのみ報酬を受領しなければならない",2:"売買代金3,000万円の物件の媒介報酬の税込み限度額は1,089,000円である",3:"宅建業者が依頼者の特別の依頼によって行った遠隔地への出張等の費用は、報酬とは別に受領できる",4:"賃貸借の媒介における権利金の授受がある場合、報酬計算の基礎に加算することはできない"},answer:3,explanation:"依頼者の依頼による特別の費用（遠隔地出張費等）は、依頼者が承諾した場合に報酬とは別に受領できる（報酬告示）。3,000万円×3%+6万円=96万円、税込み105.6万円（1,056,000円）。権利金があれば一定の場合に売買代金等に準じて計算可。",keywords:["宅建業法"]},
{year:2018,no:14,category:"宅建業法",question:"宅地建物取引業法第35条の重要事項説明に関する次の記述のうち、誤っているものはどれか。",choices:{1:"宅建業者が宅地の売買を媒介する場合、土地の面積に関する権利関係を重要事項として説明しなければならない",2:"宅建業者が建物の賃貸借を媒介する場合、当該建物の管理が委託されているときはその委託先を説明しなければならない",3:"重要事項説明書を相手方に交付するときは、取引士がその書面に記名しなければならない",4:"重要事項説明書の交付は、必ず取引士が相手方に直接手渡しで交付しなければならない"},answer:4,explanation:"重要事項説明書の交付は郵送や電磁的方法でも可能であり、必ず直接手渡しでなければならないわけではない。",keywords:["宅建業法"]},
{year:2018,no:15,category:"宅建業法",question:"宅地建物取引業法の規定する媒介契約について正しいものはどれか。",choices:{1:"宅建業者は、専任媒介契約を締結した場合、当該物件を指定流通機構に登録しなければならない",2:"一般媒介契約は書面によって締結しなければならないが、媒介契約書の様式は自由である",3:"専属専任媒介契約において、業者は2週間に1回以上の業務状況報告義務を負う",4:"媒介業者は、媒介契約の有効期間中に成立した契約にのみ報酬を請求できる"},answer:1,explanation:"専任媒介契約を締結した場合、宅建業者は7日（休業日除く）以内に指定流通機構への登録義務がある（宅建業法34条の2第5項）。専属専任は5日以内。専属専任の業務報告は1週間に1回以上。",keywords:["宅建業法"]},
{year:2018,no:16,category:"宅建業法",question:"宅地建物取引業者が自ら売主として行う売買において、宅地建物取引業法で定められた制限に関する次の記述のうち、正しいものはどれか（買主は宅建業者でない）。",choices:{1:"瑕疵担保責任（現・契約不適合責任）の期間を「引渡しから2年間」と定める特約は無効である",2:"損害賠償額を代金の20%とする特約は、有効である",3:"完成物件について、代金の10%かつ1,000万円以下であれば手付金の保全措置は不要である",4:"手付解除ができる期限として「売買契約成立から3か月以内」と定める特約は無効である"},answer:2,explanation:"損害賠償予定額・違約金の合計は代金の20%まで有効（宅建業法38条）。瑕疵担保（契約不適合）責任の期間は引渡しから2年以上とする必要あり（宅建業法40条）。完成物件の保全措置免除は代金の10%以内かつ1,000万円以下。",keywords:["宅建業法"]},
{year:2018,no:17,category:"宅建業法",question:"宅地建物取引業法の規定に関する次の記述のうち、誤っているものはどれか。",choices:{1:"宅建業者は、正当な理由なく取引関係者の秘密を他に漏らしてはならない",2:"宅建業者が相手方の判断に重要な影響を及ぼす事項について、故意に不実のことを告げることは禁止されている",3:"宅建業者は、相手方等に対して確実に利益をもたらす旨の断定的判断の提供を禁じられている",4:"宅建業者が手付に関する信用供与（貸付）をすることは、相手方の承諾があれば認められる"},answer:4,explanation:"手付に関する信用供与（貸付・後払い等）は、相手方の承諾があっても禁止（宅建業法47条3号）。これは強行規定で当事者の合意で変更できない。",keywords:["宅建業法"]},
{year:2018,no:18,category:"宅建業法",question:"宅地建物取引業者が行う37条書面に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。",choices:{1:"37条書面の記名は、専任の宅地建物取引士が行わなければならない",2:"37条書面に記載すべき事項として、宅地建物の引渡しの時期がある",3:"37条書面は、契約締結後7日以内に交付しなければならない",4:"37条書面は、宅建業者が直接取引の相手方に手渡しで交付しなければならない"},answer:2,explanation:"引渡しの時期は37条書面の必要的記載事項（宅建業法37条1項4号）。記名は専任取引士でなくても宅地建物取引士であれば可（勤務する取引士）。37条書面は遅滞なく交付。",keywords:["宅建業法"]},
{year:2018,no:19,category:"宅建業法",question:"宅地建物取引業者の保証制度に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。",choices:{1:"保証協会の弁済業務保証金分担金は、主たる事務所につき600,000円である",2:"保証協会に加入した宅建業者は、加入前に生じた債権についても弁済業務保証金から弁済を受けられる",3:"宅建業者は、営業保証金制度と保証協会の弁済業務保証金制度の両方を選択して利用できる",4:"保証協会からの還付により弁済業務保証金が減少した場合、社員業者は通知を受けてから2週間以内に分担金を納付しなければならない"},answer:4,explanation:"弁済業務保証金の還付による不足が生じた場合、保証協会の通知を受けてから2週間以内に還付充当金を納付する義務がある（宅建業法64条の10）。",keywords:["宅建業法"]},
{year:2018,no:20,category:"宅建業法",question:"宅地建物取引業法の規定に関する次の記述のうち、正しいものはどれか。",choices:{1:"宅建業者の従業者でない者が取引関係者から従業者証明書の提示を求められた場合、宅建業者はこれに応じる義務はない",2:"宅建業者は、取引に関する帳簿を事務所ごとに設け、取引のあったつど、取引の年月日等の事項を記載しなければならない",3:"宅建業者は、従業者名簿を最終の記載の日から5年間保存しなければならない",4:"宅建業者は、毎年3月31日時点の従業者数を免許権者に報告しなければならない"},answer:2,explanation:"宅建業者は事務所ごとに帳簿（取引台帳）を備え付け、取引があった都度必要事項を記録する義務がある（宅建業法49条）。従業者名簿の保存期間は最終記載から10年間（同法48条4項）。",keywords:["宅建業法"]},
{year:2018,no:21,category:"法令上の制限",question:"都市計画法の規定に関する次の記述のうち、正しいものはどれか。",choices:{1:"都市計画区域は、行政区画（市町村の区域）に従って指定される",2:"市街化区域内において開発行為を行う場合、1,000㎡以上であれば開発許可が必要である",3:"開発許可を受けた開発区域内では、工事完了の公告後でなければ建築物を建築できない",4:"開発許可を受けた区域内の土地の権利を取得した者は、当該開発許可に係る目的外の建築物を建築できる場合がある"},answer:2,explanation:"市街化区域での開発行為は1,000㎡以上（三大都市圏の一定区域は500㎡以上）で開発許可が必要（都市計画法29条）。工事完了公告前は原則建築不可（同法37条）。",keywords:["法令上の制限"]},
{year:2018,no:22,category:"法令上の制限",question:"建築基準法の建蔽率及び容積率に関する次の記述のうち、正しいものはどれか。",choices:{1:"建蔽率は、敷地面積に対する建築面積の割合をいう",2:"容積率は、敷地面積に対する各階の床面積の合計（延べ面積）の割合をいう",3:"前面道路が2本ある場合、容積率の計算においては幅員が小さい方の道路を前面道路とする",4:"建蔽率の限度が40%の地域では、角地であっても緩和措置は受けられない"},answer:2,explanation:"容積率は敷地面積に対する延べ面積の割合（建築基準法52条1項）。建蔽率は建築面積/敷地面積。前面道路が複数ある場合は最大幅員のものを採用。角地は10%加算（条件付き）。",keywords:["法令上の制限"]},
{year:2018,no:23,category:"法令上の制限",question:"農地法に関する次の記述のうち、正しいものはどれか。",choices:{1:"農地を農地のまま第三者に贈与する場合、農地法第3条の許可は不要である",2:"農地を農地以外のものにする目的で農地の所有権を移転する場合は、農地法第5条の許可が必要である",3:"農地法第4条・第5条の許可を受けずに農地を転用した場合、転用行為は有効に成立する",4:"市街化区域内の農地を住宅建設の目的で転用する場合、農地法第4条の許可が必要である"},answer:2,explanation:"農地を農地以外の目的で権利移動（売買・贈与等）する場合は農地法5条の許可が必要。贈与も農地のまま権利移動する場合は農地法3条の許可が必要。農地法違反の転用は原状回復命令の対象。",keywords:["法令上の制限"]},
{year:2018,no:24,category:"法令上の制限",question:"建築基準法の集団規定に関する次の記述のうち、正しいものはどれか。",choices:{1:"都市計画区域内においては、建築物の敷地は原則として道路に接していなければならないが、特定行政庁の許可があれば不要である",2:"建築基準法上の道路は、幅員4m以上のものに限られる",3:"2項道路（みなし道路）に接する敷地に建物を建築する際は、道路中心線から2mセットバックする必要がある",4:"第一種低層住居専用地域内の道路は、歩道と車道を区別して設けなければならない"},answer:3,explanation:"2項道路（建築基準法42条2項）に接する敷地では、道路中心線から2mの線が道路境界線とみなされ（セットバック義務）、その部分に建築物を建築できない。",keywords:["法令上の制限"]},
{year:2018,no:25,category:"法令上の制限",question:"国土利用計画法に関する次の記述のうち、正しいものはどれか。",choices:{1:"市街化区域内の2,000㎡以上の土地の売買には事後届出が必要である",2:"事後届出の届出期限は、契約締結後3週間以内である",3:"事後届出を要する面積基準は、都市計画区域内では一律2,000㎡以上である",4:"事後届出が必要な土地取引において、届出をしなかった場合の罰則はない"},answer:1,explanation:"市街化区域内では2,000㎡以上の土地売買等の契約に事後届出が必要（国土利用計画法23条）。届出は契約後2週間以内。都市計画区域外は10,000㎡以上。違反には罰則あり（同法47条）。",keywords:["法令上の制限"]},
{year:2018,no:26,category:"法令上の制限",question:"土地区画整理法に関する次の記述のうち、正しいものはどれか。",choices:{1:"土地区画整理組合は、組合員以外の者を施行者とすることができない",2:"宅地の所有者と借地権者は、いずれも施行地区内にある宅地について仮換地の指定を受けることができる",3:"換地処分の公告があった日の翌日から、換地は従前の宅地とみなされる",4:"土地区画整理組合の設立認可は、都道府県知事の認可と組合員全員の合意が必要である"},answer:3,explanation:"換地処分の公告があった翌日から換地が従前の宅地とみなされ（土地区画整理法104条1項）、権利が確定する。",keywords:["法令上の制限"]},
{year:2018,no:27,category:"法令上の制限",question:"建築基準法の用途制限に関する次の記述のうち、正しいものはどれか。",choices:{1:"第一種低層住居専用地域内には、いかなる店舗も建築できない",2:"第一種住居地域内には、床面積の合計が3,000㎡を超える店舗は建築できない",3:"商業地域では、工場を建築することができない",4:"準工業地域では、住宅を建築することができない"},answer:2,explanation:"第一種住居地域では、床面積合計が3,000㎡を超える店舗・飲食店等は建築不可（建築基準法別表第2）。第一種低層住居専用地域でも小規模店舗（50㎡以下等）は建築可能。準工業地域は住宅建築可。",keywords:["法令上の制限"]},
{year:2018,no:28,category:"法令上の制限",question:"景観法に関する次の記述のうち、正しいものはどれか。",choices:{1:"景観地区は、都市計画区域または準都市計画区域内にのみ定めることができる",2:"景観地区内においては、建築物の新築に際して市町村長の認定が必要である",3:"景観計画区域の指定は、都道府県知事のみが行うことができる",4:"景観法の規定は、国の機関が設置する工作物には適用されない"},answer:2,explanation:"景観地区内では、建築物の建築等について市町村長の認定が必要（景観法62条）。景観計画は市町村も策定できる。",keywords:["法令上の制限"]},
{year:2018,no:29,category:"税・その他",question:"不動産取得税に関する次の記述のうち、正しいものはどれか。",choices:{1:"不動産取得税は、国税であり税率は一律4%である",2:"不動産を購入する契約が締結された時点で不動産取得税の課税要件を充足する",3:"相続による不動産の取得には不動産取得税は課税されない",4:"新築住宅の不動産取得税は、固定資産税評価額から1,000万円を控除した金額に課税される"},answer:3,explanation:"相続による不動産の取得は不動産取得税の非課税事由（地方税法73条の7第1号）。不動産取得税は地方税（都道府県税）。登記完了・引渡し等による実際の取得時が課税時点。新築住宅の控除額は1,200万円（一定の住宅）。",keywords:["税・その他"]},
{year:2018,no:30,category:"税・その他",question:"固定資産税に関する次の記述のうち、正しいものはどれか。",choices:{1:"固定資産税の納税義務者は、毎年4月1日現在において固定資産台帳に所有者として登録されている者である",2:"宅地の固定資産税評価は、3年ごとに行われる基準年度に評価替えが行われる",3:"新築住宅（床面積が50㎡以上280㎡以下）に対する固定資産税の軽減税率は、一律5年間税額の1/2に減額される",4:"固定資産税の課税標準の特例として、小規模住宅用地の課税標準は評価額の1/3に軽減される"},answer:2,explanation:"固定資産の評価替えは3年ごとの基準年度に行われる（地方税法349条）。賦課期日は1月1日。新築住宅の軽減は一般住宅3年間・マンション5年間（長期優良住宅はさらに長期）。小規模住宅用地は1/6に軽減。",keywords:["税・その他"]},
{year:2018,no:31,category:"税・その他",question:"土地・建物の譲渡に係る所得税の特例に関する次の記述のうち、正しいものはどれか。",choices:{1:"居住用財産の3,000万円特別控除は、土地だけの譲渡には適用できない",2:"居住用財産の譲渡所得の特別控除（3,000万円）と住宅ローン控除は、同じ年に重複して適用できる",3:"長期譲渡所得の税率（所得税15%+住民税5%）は、6,000万円以下の居住用財産では14%（所得税10%+住民税4%）に軽減される",4:"居住用財産の買換え特例は、新居が旧居の売却代金より安い場合でも適用できる"},answer:3,explanation:"10年超所有の居住用財産の長期譲渡所得で、6,000万円以下の部分は所得税10%+住民税4%=14%に軽減（措置法31条の3）。6,000万円超の部分は通常の長期税率（15%+5%）。",keywords:["税・その他"]},
{year:2018,no:32,category:"税・その他",question:"登録免許税に関する次の記述のうち、正しいものはどれか。",choices:{1:"相続による所有権移転登記の税率は1,000分の4である",2:"贈与による所有権移転登記の税率は1,000分の20である",3:"売買による所有権移転登記の税率（住宅以外）は1,000分の10である",4:"土地の売買による所有権移転登記の本則税率は1,000分の20であるが、住宅用地については軽減税率がある"},answer:4,explanation:"土地の売買による所有権移転登記の本則税率は1,000分の20（2%）。相続は1,000分の4（0.4%）。贈与は1,000分の20（2%）。住宅等の軽減税率あり。",keywords:["税・その他"]},
{year:2018,no:33,category:"税・その他",question:"印紙税に関する次の記述のうち、誤っているものはどれか。",choices:{1:"土地の賃貸借契約書は印紙税の課税文書である",2:"不動産の売買に関する仮契約書には印紙税が課税される",3:"建物の建築工事請負契約書は印紙税の課税文書である",4:"土地及び建物の贈与契約書には印紙税は課税されない"},answer:4,explanation:"不動産の贈与契約書（無償の権利移転に関する証書）も一定の場合に印紙税が課税される文書となる。すべての贈与が非課税とは言えない。",keywords:["税・その他"]},
{year:2018,no:34,category:"税・その他",question:"地価公示及び不動産鑑定評価に関する次の記述のうち、正しいものはどれか。",choices:{1:"地価公示の公示価格は、一般の土地取引の指標として用いられるが、公共事業用地取得の基準とはならない",2:"不動産鑑定士は、鑑定評価書に記名押印しなければならない",3:"収益還元法は賃貸用不動産にのみ適用できる手法であり、自用の不動産には適用できない",4:"取引事例比較法においては、正常な取引事例のみを採用しなければならない"},answer:4,explanation:"取引事例比較法では、正常な取引事例（特殊な事情のない事例）を採用し、必要に応じて事情補正・時点修正を行う（不動産鑑定評価基準）。収益還元法は賃貸不動産以外にも適用可能。公示価格は公共取得の基準にもなる。",keywords:["税・その他"]},
{year:2018,no:35,category:"宅建業法",question:"宅地建物取引業者が行う業務に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。",choices:{1:"宅建業者は、業務上知り得た秘密を正当な理由なく漏らすことを禁じられているが、取引士は同様の義務を負わない",2:"宅建業者は、宅地の売買の媒介に際し、取引の相手方に対して手数料の金額の説明をしなければならない",3:"宅建業者は、宅地又は建物の売買の広告に際し、取引態様を明示しなければならない",4:"宅建業者は、売買の媒介をする場合、代金の額を媒介契約書に記載する必要はない"},answer:3,explanation:"取引態様（自己売買・交換・媒介・代理の別）は、広告に際して明示しなければならない（宅建業法34条1項）。取引士も秘密保持義務あり（宅建業法45条）。",keywords:["宅建業法"]},
{year:2018,no:36,category:"宅建業法",question:"宅地建物取引業者Aが、Bを売主とする宅地の売買について、Cから媒介の依頼を受け契約が成立した場合に関する次の記述のうち、宅地建物取引業法の規定によれば、誤っているものはどれか。",choices:{1:"AはBおよびCの両方から報酬を受け取ることができるが、合計額は法定限度内でなければならない",2:"AはBとCの双方に重要事項説明書を交付しなければならない",3:"AはCからのみ媒介の依頼を受けているため、Bに37条書面を交付する必要はない",4:"AはBとCの双方に37条書面を交付しなければならない"},answer:3,explanation:"37条書面（契約書面）は、宅建業者が媒介した場合、売主・買主等の取引当事者全員に交付しなければならない（宅建業法37条）。Cのみならず売主Bにも交付が必要。",keywords:["宅建業法"]},
{year:2018,no:37,category:"宅建業法",question:"宅地建物取引業者Aが、自ら売主として宅地建物取引業者でないBとの間で宅地の売買契約を締結した場合における手付に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。",choices:{1:"Aが手付の全額をBに返還し申し出たとき、BはAの解除の申し出を拒絶することができる",2:"Aが受領した手付金は、常に解約手付としての性質を有する",3:"手付金の額がいかなる場合も、代金の20%を超えることはできない",4:"Bが契約の履行に着手した後は、Aは手付を倍返しして解除することができない"},answer:4,explanation:"相手方が契約の履行に着手した後は、手付による解除ができない（民法557条）。宅建業者が売主の場合、手付は解約手付とみなされる（宅建業法39条2項）。手付上限は代金の20%（宅建業法39条1項）。",keywords:["宅建業法"]},
{year:2018,no:38,category:"宅建業法",question:"宅地建物取引業者が行う広告規制に関する次の記述のうち、宅地建物取引業法の規定によれば、誤っているものはどれか。",choices:{1:"宅建業者は、実際の取引価格よりも著しく低い価格を広告してはならない",2:"宅建業者は、建物の売買について建築確認を受ける前から、確認申請中である旨を明示して広告することができる",3:"宅建業者は、取引する意思のない物件について広告してはならない",4:"宅建業者は、宅地建物の将来の売買価格について、根拠のない断定的な判断を提供してはならない"},answer:2,explanation:"宅建業者は建築確認を受ける前の物件について広告してはならない（宅建業法33条）。確認申請中であっても確認を受けるまでは広告禁止。",keywords:["宅建業法"]},
{year:2018,no:39,category:"宅建業法",question:"宅地建物取引業者の監督処分に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。",choices:{1:"指示処分と業務停止処分は同時に科することができない",2:"業務停止処分の最長期間は6か月である",3:"免許取消処分は、任意的取消事由と必要的取消事由がある",4:"都道府県知事は、その都道府県内で業務を行う国土交通大臣免許の業者に対して、指示処分ができない"},answer:3,explanation:"免許取消しには、違反があれば必ず取り消す必要的取消事由（宅建業法66条1項1号〜11号等）と、取り消すことができる任意的取消事由がある。業務停止処分の最長期間は1年（宅建業法65条2項）。",keywords:["宅建業法"]},
{year:2018,no:40,category:"宅建業法",question:"宅地建物取引業者が行う業務に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。",choices:{1:"宅建業者が自ら売主として宅地を売却する場合、宅地の種類・品質に関して事実に反することを告げることができる",2:"宅建業者が媒介業者として行動する場合、売主・買主双方の利益を代理する義務がある",3:"宅建業者は、業務に関して作成した書類について、その種類にかかわらず5年間保存しなければならない",4:"宅建業者は、新聞・雑誌等の広告については宅建業法の規制を受けるが、インターネット広告は受けない"},answer:2,explanation:"媒介業者は売主・買主双方の利益のために誠実に業務を行う義務がある（善管注意義務）（宅建業法31条）。インターネット広告も宅建業法の広告規制の対象。",keywords:["宅建業法"]},
{year:2018,no:41,category:"法令上の制限",question:"建築基準法の規定に関する次の記述のうち、正しいものはどれか。",choices:{1:"第一種低層住居専用地域内では、原則として住宅兼用店舗を建築できない",2:"建築物の延べ面積には、駐車場の用途に供する部分は算入されない",3:"日影規制は、第一種低層住居専用地域内の建築物には適用されない",4:"居室の採光に必要な窓等の開口部の面積は、居室の床面積に対し一定割合以上でなければならない"},answer:4,explanation:"居室には採光のために一定の割合以上の開口部を設ける必要がある（建築基準法28条）。住宅兼用店舗は第一種低層住居専用地域でも小規模なものは建築可能。日影規制は低層住居専用地域にも適用される。",keywords:["法令上の制限"]},
{year:2018,no:42,category:"法令上の制限",question:"都市計画法の開発許可制度に関する次の記述のうち、正しいものはどれか。",choices:{1:"開発許可申請の際には、都道府県知事に申請手数料を納付しなければならない",2:"市街化調整区域において、農業者の住宅建設のための開発行為には開発許可は必要ない",3:"開発許可を受けた開発区域内であっても、土地の形質変更に際して建築確認は不要である",4:"開発許可を受けた開発区域の全部または一部について、開発行為に関する工事の廃止届出が必要な場合がある"},answer:2,explanation:"農業・林業・漁業を営む者が建築する農林漁業用建築物や居住用建築物のための開発行為は開発許可不要（都市計画法29条1項2号）。",keywords:["法令上の制限"]},
{year:2018,no:43,category:"法令上の制限",question:"建物の構造に関する次の記述のうち、最も不適切なものはどれか。",choices:{1:"木造建築は、耐震性・耐火性の観点から高層建築物には不向きである",2:"鉄筋コンクリート造は、引張力に強いコンクリートと圧縮力に強い鉄筋を組み合わせた構造である",3:"鉄骨造は、靭性（粘り強さ）が高く地震に対して有利な面がある",4:"鉄骨鉄筋コンクリート造は、高層建築物にも用いられる構造形式である"},answer:2,explanation:"鉄筋コンクリートの特性は逆で、コンクリートは圧縮力に強く引張力に弱い。鉄筋は引張力に強い。この両者を組み合わせることで互いの弱点を補う。",keywords:["法令上の制限"]},
{year:2018,no:44,category:"権利関係",question:"民法上の代理に関する次の記述のうち、正しいものはどれか。",choices:{1:"代理権がない者が代理行為をした場合（無権代理）、本人が追認しなければその行為の効力は生じない",2:"有権代理において、代理人の行為の効果は代理人に帰属する",3:"代理権は、代理人が死亡した場合でも消滅しない",4:"代理行為の瑕疵（錯誤・詐欺等）は、本人ではなく代理人を基準として判断する"},answer:4,explanation:"代理行為における意思の欠缺・瑕疵（錯誤・詐欺・強迫等）の有無は、代理人を基準として判断する（民法101条1項）。有権代理の効果は本人に帰属。代理権は本人・代理人の死亡で消滅（民法111条）。",keywords:["権利関係"]},
{year:2018,no:45,category:"権利関係",question:"不動産登記に関する次の記述のうち、誤っているものはどれか。",choices:{1:"表題部の登記（表示登記）は、登記官が職権で行うことがある",2:"区分建物（マンション等）については、表示の登記をするには、各専有部分の床面積は壁その他の区画の内側線で囲まれた部分の水平投影面積による",3:"区分建物の登記において、各区分所有者の共用部分の持分は、原則として専有部分の床面積の割合による",4:"登記記録上の地目が農地でなければ、農地法の適用を受けることはない"},answer:4,explanation:"農地法における農地の認定は現況主義であり、登記上の地目ではなく現在の土地の状況（現に農地として使用されているか）で判断する。",keywords:["権利関係"]},
{year:2018,no:46,category:"税・その他",question:"住宅ローン控除（住宅借入金等特別控除）に関する次の記述のうち、正しいものはどれか。",choices:{1:"住宅ローン控除の適用を受ける初年度は、確定申告をする必要がある",2:"住宅ローン控除の控除限度額は、残高の1%で計算される",3:"住宅ローン控除の対象となる住宅の床面積の下限は、50㎡（合計所得金額1,000万円以下の者は40㎡）以上である",4:"住宅ローン控除は、転居した後でも控除期間中は継続して適用を受けられる"},answer:1,explanation:"住宅ローン控除は、居住した年の翌年に確定申告が必要（初年度）。2年目以降は年末調整で対応可（給与所得者の場合）。",keywords:["税・その他"]},
{year:2018,no:47,category:"税・その他",question:"土地の有効活用に関する記述のうち、最も不適切なものはどれか。",choices:{1:"等価交換方式では、土地所有者は建設費を負担することなく、提供した土地の価値に見合う建物の一部を取得できる",2:"建設協力金方式では、土地所有者が将来テナントとなる者から建設資金を借り、その建物を賃貸する",3:"定期借地権方式では、契約期間満了後に土地が返還されるため、将来の土地の自由な利用が確保される",4:"事業受託方式では、土地所有者がデベロッパーに土地を売却して開発を任せる方式である"},answer:4,explanation:"事業受託方式は、土地所有者が土地を保有したまま（売却せず）、デベロッパー等に建設・管理・運営を委託する方式。土地を売却するわけではない。",keywords:["税・その他"]},
{year:2018,no:48,category:"税・その他",question:"不動産市場に関する次の記述のうち、正しいものはどれか。",choices:{1:"不動産市場は、株式市場と異なり価格の透明性が非常に高い",2:"不動産の価格は供給の増減に敏感に反応するため、短期的な価格変動が激しい",3:"不動産は個別性が高いため、同種の不動産であっても価格は異なることがある",4:"金利が上昇すると、不動産価格は上昇する傾向がある"},answer:3,explanation:"不動産は個別性（固定性・位置の固定性・個別性）が高く、同種・同条件に見える不動産でも立地・日当たり等で価格は異なる。不動産市場は株式市場に比べて価格の透明性が低い。金利上昇は住宅ローン金利上昇により不動産需要を抑制し価格下落要因。",keywords:["税・その他"]},
{year:2018,no:49,category:"宅建業法",question:"宅地建物取引業法に関する次の記述のうち、正しいものはどれか。",choices:{1:"宅建業者の使用人が、宅建業者の事務所外でその業務に関し法令違反を行った場合、宅建業者は一切の責任を負わない",2:"宅建業者が名義を貸して他の者が宅建業を営んだ場合、名義を貸した宅建業者は宅建業法の罰則を受けない",3:"宅建業者でない者が宅建業を営んだ場合、3年以下の懲役もしくは300万円以下の罰金またはその両方に処せられることがある",4:"宅建業者が報酬限度額を超える報酬を受け取った場合、過剰受領分のみを返還すれば宅建業法上の問題はない"},answer:3,explanation:"無免許営業は3年以下の懲役もしくは300万円以下の罰金（宅建業法79条）。名義貸しも禁止（同法13条）で違反すれば罰則あり。報酬超過受領は行政処分と罰則の対象。",keywords:["宅建業法"]},
{year:2018,no:50,category:"宅建業法",question:"宅地建物取引業者Aが、Bに対して宅地の売買の媒介を行い、売買契約が成立した場合に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。",choices:{1:"AはBに対して、売買代金の一定額を証拠金として支払うよう強制することができる",2:"AはBから依頼を受けて住宅ローンのあっせんをしたが、ローンが不成立になった場合、その旨を重要事項説明書に記載して説明しなければならない",3:"AがBから媒介報酬を受領した後に、当該売買契約がBの都合でキャンセルされた場合でもAは報酬を返還しなくてよい",4:"Aは、当該売買契約の当事者でないため、37条書面を作成する必要はない"},answer:2,explanation:"住宅ローンのあっせんをする場合、ローンが不成立の場合の措置について重要事項説明が必要（宅建業法35条1項12号）。媒介業者も37条書面を作成・交付する義務がある（同法37条1項）。",keywords:["宅建業法"]},
{year:2017,no:1,category:"権利関係",question:"民法の規定に関する次の記述のうち、誤っているものはどれか。",choices:{1:"意思能力を有しない者がした法律行為は無効である",2:"未成年者が法定代理人の同意なしに行った行為は、取り消すことができる",3:"成年被後見人の法律行為は、日常生活に関するものを除き、取り消すことができる",4:"被保佐人が保佐人の同意なしに行ったすべての法律行為は取り消すことができる"},answer:4,explanation:"被保佐人が保佐人の同意を要する行為（民法13条1項各号）を同意なしに行った場合に取り消せる。すべての法律行為が対象ではなく、民法13条1項に列挙された重要な行為が対象。",keywords:["権利関係"]},
{year:2017,no:2,category:"権利関係",question:"物権の変動に関する次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。",choices:{1:"AがBにA所有の不動産を売却した場合、所有権の移転は代金の支払いがなければ生じない",2:"AがBとCの双方に同じ不動産を売却した場合、先に登記を備えた者が所有権を取得する",3:"不動産の所有権取得には、必ず登記が必要である",4:"取消しにより所有権が復帰する場合、取消前に登記を備えた第三者には取消しを対抗できる"},answer:2,explanation:"不動産の二重売買では、登記を先に備えた者が民法177条により第三者に対抗できる（ただし背信的悪意者を除く）。",keywords:["権利関係"]},
{year:2017,no:3,category:"権利関係",question:"Aが1,000万円をBに貸し付けたところ、Bが弁済期に弁済しなかった場合に関する次の記述のうち、民法の規定によれば、正しいものはどれか。",choices:{1:"AがBに対して返還を請求する訴訟を提起した場合、訴え提起の日から消滅時効が完成する",2:"Bが「来月必ず返す」と述べた場合、Bによる債務の承認となり消滅時効が更新される",3:"Aが貸付けをした日から10年で消滅時効が完成する",4:"Aが弁済期から1年以内に訴えを提起しなければ時効消滅する"},answer:2,explanation:"債務者による債務の承認は、時効の更新事由（民法152条）。確定判決確定時から新たに時効が進行（中断後更新）。消滅時効は債権者が権利を行使できると知った時から5年または権利行使可能時から10年（民法166条）。",keywords:["権利関係"]},
{year:2017,no:4,category:"権利関係",question:"Aが死亡し、相続人としてBとCの子（孫）Dがいる（BはAの子でDの親）。Bが相続放棄をした場合に関する次の記述のうち、民法の規定によれば、正しいものはどれか。",choices:{1:"DはBの代わりにAの相続人となる（代襲相続）",2:"BはAの財産に対していかなる権利も有しない",3:"BはAの財産の1/2を相続する",4:"DはCと共同してAの財産を相続する"},answer:2,explanation:"相続放棄をした者は初めから相続人でなかったものとみなされ（民法939条）、放棄した者の子による代襲相続は生じない。よってBはAの財産に対して権利を有しない。",keywords:["権利関係"]},
{year:2017,no:5,category:"権利関係",question:"売買契約に関する次の記述のうち、民法の規定によれば、正しいものはどれか。",choices:{1:"売買契約において、目的物の引渡し前に売主の責めに帰すべき事由なく目的物が滅失した場合、買主は代金の支払いを拒絶できる",2:"手付が交付された場合、売主はいつでも手付の倍額を現実に提供して契約を解除できる",3:"売主が買主に目的物を引き渡すと同時に代金を受け取る権利を有するのは、同時履行の抗弁権の典型例である",4:"売買契約において、目的物の品質が契約に適合しない場合、買主は直ちに契約を解除できる"},answer:3,explanation:"双務契約における同時履行の抗弁権（民法533条）の典型が売買における目的物引渡しと代金支払いの同時履行。手付解除は相手方が履行に着手するまでが期限。",keywords:["権利関係"]},
{year:2017,no:6,category:"権利関係",question:"抵当権に関する次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。",choices:{1:"抵当権者は、被担保債権の弁済がない場合に競売を申し立てることができる",2:"抵当不動産の第三取得者は、抵当権消滅請求をすることができる",3:"抵当権は、抵当不動産の占有を伴う権利である",4:"根抵当権は、一定範囲に属する不特定の債権を極度額の限度で担保する"},answer:3,explanation:"抵当権は占有を伴わない非占有担保物権（民法369条）。これが抵当権と質権の大きな相違点。抵当権者は目的物の占有を取得しない。",keywords:["権利関係"]},
{year:2017,no:7,category:"権利関係",question:"Aは自己所有の建物をBに賃貸し、BはAの承諾なくCに転貸した場合に関する次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。",choices:{1:"AはBの無断転貸を理由に、いつでも賃貸借契約を解除できる",2:"AとBの賃貸借契約が合意解除された場合、CはAに建物の明渡しを拒絶できる",3:"BとCとの転貸借は、AとBの賃貸借が存続する限り有効である",4:"CがAの建物を損傷した場合、AはCに損害賠償を請求できない"},answer:3,explanation:"無断転貸でも、それが信頼関係を破壊しない特段の事情がある場合は解除不可（判例）。合意解除の場合は転借人に対抗できない場合がある（判例）。AとBの賃貸借が有効な間はBCの転貸借も有効。",keywords:["権利関係"]},
{year:2017,no:8,category:"権利関係",question:"借地借家法の規定に関する次の記述のうち、正しいものはどれか。",choices:{1:"定期建物賃貸借契約は、公正証書によって締結しなければならない",2:"定期建物賃貸借において、期間が1年未満の契約も有効である",3:"普通建物賃貸借において、期間1年未満の契約は期間の定めのないものとみなされる",4:"定期建物賃貸借において、賃料の減額請求は一切できない"},answer:2,explanation:"定期建物賃貸借は1年未満の期間も有効（期間の定めのない借家制限の適用外）（借地借家法38条1項）。公正証書でなくてもよい（書面であれば足りる）。定期建物賃貸借でも賃料減額は特約で排除可能だが強制ではない。",keywords:["権利関係"]},
{year:2017,no:9,category:"権利関係",question:"連帯保証に関する次の記述のうち、民法の規定によれば、正しいものはどれか。",choices:{1:"連帯保証人は、保証人と異なり催告の抗弁権を有する",2:"連帯保証人は、主たる債務者の財産に執行しなければ自分の財産から弁済しないと主張できる",3:"連帯保証人に対する履行の請求は、主たる債務者に対しても効力を有する",4:"連帯保証人が主たる債務者に代わって弁済した場合、主たる債務者に対して求償できる"},answer:4,explanation:"連帯保証人が弁済した場合、主たる債務者に対して求償権を取得する（民法459条）。連帯保証人には催告・検索の抗弁権がない（民法454条）。2020年改正後、連帯保証人への請求は主たる債務者に絶対効を生じない。",keywords:["権利関係"]},
{year:2017,no:10,category:"権利関係",question:"区分所有法に関する次の記述のうち、正しいものはどれか。",choices:{1:"区分所有建物の建替えは、集会において区分所有者及び議決権の各3/4以上の賛成が必要である",2:"共用部分の重大変更（形状・効用の著しい変更）は、区分所有者及び議決権の各3/4以上の賛成が必要である",3:"規約の設定には、区分所有者及び議決権の各過半数の賛成が必要である",4:"管理者の選任・解任は、規約に別段の定めがない限り区分所有者全員の合意が必要である"},answer:2,explanation:"共用部分の重大変更は区分所有者及び議決権の各3/4以上の多数（区分所有法17条1項）。建替えは4/5以上（同法62条）。規約は3/4以上。管理者の選任・解任は集会の普通決議（過半数）。",keywords:["権利関係"]},
{year:2017,no:11,category:"宅建業法",question:"宅地建物取引業の免許に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。",choices:{1:"宅建業者が破産した場合、破産管財人は廃業届を提出しなければならない",2:"法人の役員が禁錮刑に処せられた場合でも、その法人は宅建業の免許を受けることができる",3:"宅建業者の事務所の所在地を管轄する都道府県知事は、常にその宅建業者の免許権者である",4:"個人で宅建業の免許を受けている者が死亡した場合、相続人がその免許を継承できる"},answer:1,explanation:"宅建業者が破産した場合、破産管財人（または相続人等）が30日以内に廃業届を提出（宅建業法11条1項4号）。法人の役員が禁錮以上の刑は欠格事由（宅建業法5条1項3号）。",keywords:["宅建業法"]},
{year:2017,no:12,category:"宅建業法",question:"宅地建物取引士の登録及び宅地建物取引士証に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。",choices:{1:"宅建試験合格後、登録の申請は当該試験を行った都道府県のほか、他の都道府県にも申請できる",2:"取引士の登録は、登録を受けた都道府県以外の都道府県には移転できない",3:"宅地建物取引士証に記載された住所を変更した場合、変更の登録を申請し、かつ取引士証の書換え交付を申請しなければならない",4:"取引士証の有効期限が切れた場合、更新申請が採択されるまでは宅地建物取引士として業務を行うことができる"},answer:3,explanation:"宅地建物取引士が住所変更した場合、変更の登録申請（宅建業法20条）と取引士証の書換え交付申請が必要。取引士証は一の都道府県への登録。移転登録は可能（同法19条の2）。",keywords:["宅建業法"]},
{year:2017,no:13,category:"宅建業法",question:"宅地建物取引業者の報酬に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか（消費税課税事業者）。",choices:{1:"宅建業者が売買の媒介をする場合、依頼者の一方からのみ報酬を受領しなければならない",2:"売買代金3,000万円の物件の媒介報酬の税込み限度額は1,089,000円である",3:"宅建業者が依頼者の特別の依頼によって行った遠隔地への出張等の費用は、報酬とは別に受領できる",4:"賃貸借の媒介における権利金の授受がある場合、報酬計算の基礎に加算することはできない"},answer:3,explanation:"依頼者の依頼による特別の費用（遠隔地出張費等）は、依頼者が承諾した場合に報酬とは別に受領できる（報酬告示）。3,000万円×3%+6万円=96万円、税込み105.6万円（1,056,000円）。権利金があれば一定の場合に売買代金等に準じて計算可。",keywords:["宅建業法"]},
{year:2017,no:14,category:"宅建業法",question:"宅地建物取引業法第35条の重要事項説明に関する次の記述のうち、誤っているものはどれか。",choices:{1:"宅建業者が宅地の売買を媒介する場合、土地の面積に関する権利関係を重要事項として説明しなければならない",2:"宅建業者が建物の賃貸借を媒介する場合、当該建物の管理が委託されているときはその委託先を説明しなければならない",3:"重要事項説明書を相手方に交付するときは、取引士がその書面に記名しなければならない",4:"重要事項説明書の交付は、必ず取引士が相手方に直接手渡しで交付しなければならない"},answer:4,explanation:"重要事項説明書の交付は郵送や電磁的方法でも可能であり、必ず直接手渡しでなければならないわけではない。",keywords:["宅建業法"]},
{year:2017,no:15,category:"宅建業法",question:"宅地建物取引業法の規定する媒介契約について正しいものはどれか。",choices:{1:"宅建業者は、専任媒介契約を締結した場合、当該物件を指定流通機構に登録しなければならない",2:"一般媒介契約は書面によって締結しなければならないが、媒介契約書の様式は自由である",3:"専属専任媒介契約において、業者は2週間に1回以上の業務状況報告義務を負う",4:"媒介業者は、媒介契約の有効期間中に成立した契約にのみ報酬を請求できる"},answer:1,explanation:"専任媒介契約を締結した場合、宅建業者は7日（休業日除く）以内に指定流通機構への登録義務がある（宅建業法34条の2第5項）。専属専任は5日以内。専属専任の業務報告は1週間に1回以上。",keywords:["宅建業法"]},
{year:2017,no:16,category:"宅建業法",question:"宅地建物取引業者が自ら売主として行う売買において、宅地建物取引業法で定められた制限に関する次の記述のうち、正しいものはどれか（買主は宅建業者でない）。",choices:{1:"瑕疵担保責任（現・契約不適合責任）の期間を「引渡しから2年間」と定める特約は無効である",2:"損害賠償額を代金の20%とする特約は、有効である",3:"完成物件について、代金の10%かつ1,000万円以下であれば手付金の保全措置は不要である",4:"手付解除ができる期限として「売買契約成立から3か月以内」と定める特約は無効である"},answer:2,explanation:"損害賠償予定額・違約金の合計は代金の20%まで有効（宅建業法38条）。瑕疵担保（契約不適合）責任の期間は引渡しから2年以上とする必要あり（宅建業法40条）。完成物件の保全措置免除は代金の10%以内かつ1,000万円以下。",keywords:["宅建業法"]},
{year:2017,no:17,category:"宅建業法",question:"宅地建物取引業法の規定に関する次の記述のうち、誤っているものはどれか。",choices:{1:"宅建業者は、正当な理由なく取引関係者の秘密を他に漏らしてはならない",2:"宅建業者が相手方の判断に重要な影響を及ぼす事項について、故意に不実のことを告げることは禁止されている",3:"宅建業者は、相手方等に対して確実に利益をもたらす旨の断定的判断の提供を禁じられている",4:"宅建業者が手付に関する信用供与（貸付）をすることは、相手方の承諾があれば認められる"},answer:4,explanation:"手付に関する信用供与（貸付・後払い等）は、相手方の承諾があっても禁止（宅建業法47条3号）。これは強行規定で当事者の合意で変更できない。",keywords:["宅建業法"]},
{year:2017,no:18,category:"宅建業法",question:"宅地建物取引業者が行う37条書面に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。",choices:{1:"37条書面の記名は、専任の宅地建物取引士が行わなければならない",2:"37条書面に記載すべき事項として、宅地建物の引渡しの時期がある",3:"37条書面は、契約締結後7日以内に交付しなければならない",4:"37条書面は、宅建業者が直接取引の相手方に手渡しで交付しなければならない"},answer:2,explanation:"引渡しの時期は37条書面の必要的記載事項（宅建業法37条1項4号）。記名は専任取引士でなくても宅地建物取引士であれば可（勤務する取引士）。37条書面は遅滞なく交付。",keywords:["宅建業法"]},
{year:2017,no:19,category:"宅建業法",question:"宅地建物取引業者の保証制度に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。",choices:{1:"保証協会の弁済業務保証金分担金は、主たる事務所につき600,000円である",2:"保証協会に加入した宅建業者は、加入前に生じた債権についても弁済業務保証金から弁済を受けられる",3:"宅建業者は、営業保証金制度と保証協会の弁済業務保証金制度の両方を選択して利用できる",4:"保証協会からの還付により弁済業務保証金が減少した場合、社員業者は通知を受けてから2週間以内に分担金を納付しなければならない"},answer:4,explanation:"弁済業務保証金の還付による不足が生じた場合、保証協会の通知を受けてから2週間以内に還付充当金を納付する義務がある（宅建業法64条の10）。",keywords:["宅建業法"]},
{year:2017,no:20,category:"宅建業法",question:"宅地建物取引業法の規定に関する次の記述のうち、正しいものはどれか。",choices:{1:"宅建業者の従業者でない者が取引関係者から従業者証明書の提示を求められた場合、宅建業者はこれに応じる義務はない",2:"宅建業者は、取引に関する帳簿を事務所ごとに設け、取引のあったつど、取引の年月日等の事項を記載しなければならない",3:"宅建業者は、従業者名簿を最終の記載の日から5年間保存しなければならない",4:"宅建業者は、毎年3月31日時点の従業者数を免許権者に報告しなければならない"},answer:2,explanation:"宅建業者は事務所ごとに帳簿（取引台帳）を備え付け、取引があった都度必要事項を記録する義務がある（宅建業法49条）。従業者名簿の保存期間は最終記載から10年間（同法48条4項）。",keywords:["宅建業法"]},
{year:2017,no:21,category:"法令上の制限",question:"都市計画法の規定に関する次の記述のうち、正しいものはどれか。",choices:{1:"都市計画区域は、行政区画（市町村の区域）に従って指定される",2:"市街化区域内において開発行為を行う場合、1,000㎡以上であれば開発許可が必要である",3:"開発許可を受けた開発区域内では、工事完了の公告後でなければ建築物を建築できない",4:"開発許可を受けた区域内の土地の権利を取得した者は、当該開発許可に係る目的外の建築物を建築できる場合がある"},answer:2,explanation:"市街化区域での開発行為は1,000㎡以上（三大都市圏の一定区域は500㎡以上）で開発許可が必要（都市計画法29条）。工事完了公告前は原則建築不可（同法37条）。",keywords:["法令上の制限"]},
{year:2017,no:22,category:"法令上の制限",question:"建築基準法の建蔽率及び容積率に関する次の記述のうち、正しいものはどれか。",choices:{1:"建蔽率は、敷地面積に対する建築面積の割合をいう",2:"容積率は、敷地面積に対する各階の床面積の合計（延べ面積）の割合をいう",3:"前面道路が2本ある場合、容積率の計算においては幅員が小さい方の道路を前面道路とする",4:"建蔽率の限度が40%の地域では、角地であっても緩和措置は受けられない"},answer:2,explanation:"容積率は敷地面積に対する延べ面積の割合（建築基準法52条1項）。建蔽率は建築面積/敷地面積。前面道路が複数ある場合は最大幅員のものを採用。角地は10%加算（条件付き）。",keywords:["法令上の制限"]},
{year:2017,no:23,category:"法令上の制限",question:"農地法に関する次の記述のうち、正しいものはどれか。",choices:{1:"農地を農地のまま第三者に贈与する場合、農地法第3条の許可は不要である",2:"農地を農地以外のものにする目的で農地の所有権を移転する場合は、農地法第5条の許可が必要である",3:"農地法第4条・第5条の許可を受けずに農地を転用した場合、転用行為は有効に成立する",4:"市街化区域内の農地を住宅建設の目的で転用する場合、農地法第4条の許可が必要である"},answer:2,explanation:"農地を農地以外の目的で権利移動（売買・贈与等）する場合は農地法5条の許可が必要。贈与も農地のまま権利移動する場合は農地法3条の許可が必要。農地法違反の転用は原状回復命令の対象。",keywords:["法令上の制限"]},
{year:2017,no:24,category:"法令上の制限",question:"建築基準法の集団規定に関する次の記述のうち、正しいものはどれか。",choices:{1:"都市計画区域内においては、建築物の敷地は原則として道路に接していなければならないが、特定行政庁の許可があれば不要である",2:"建築基準法上の道路は、幅員4m以上のものに限られる",3:"2項道路（みなし道路）に接する敷地に建物を建築する際は、道路中心線から2mセットバックする必要がある",4:"第一種低層住居専用地域内の道路は、歩道と車道を区別して設けなければならない"},answer:3,explanation:"2項道路（建築基準法42条2項）に接する敷地では、道路中心線から2mの線が道路境界線とみなされ（セットバック義務）、その部分に建築物を建築できない。",keywords:["法令上の制限"]},
{year:2017,no:25,category:"法令上の制限",question:"国土利用計画法に関する次の記述のうち、正しいものはどれか。",choices:{1:"市街化区域内の2,000㎡以上の土地の売買には事後届出が必要である",2:"事後届出の届出期限は、契約締結後3週間以内である",3:"事後届出を要する面積基準は、都市計画区域内では一律2,000㎡以上である",4:"事後届出が必要な土地取引において、届出をしなかった場合の罰則はない"},answer:1,explanation:"市街化区域内では2,000㎡以上の土地売買等の契約に事後届出が必要（国土利用計画法23条）。届出は契約後2週間以内。都市計画区域外は10,000㎡以上。違反には罰則あり（同法47条）。",keywords:["法令上の制限"]},
{year:2017,no:26,category:"法令上の制限",question:"土地区画整理法に関する次の記述のうち、正しいものはどれか。",choices:{1:"土地区画整理組合は、組合員以外の者を施行者とすることができない",2:"宅地の所有者と借地権者は、いずれも施行地区内にある宅地について仮換地の指定を受けることができる",3:"換地処分の公告があった日の翌日から、換地は従前の宅地とみなされる",4:"土地区画整理組合の設立認可は、都道府県知事の認可と組合員全員の合意が必要である"},answer:3,explanation:"換地処分の公告があった翌日から換地が従前の宅地とみなされ（土地区画整理法104条1項）、権利が確定する。",keywords:["法令上の制限"]},
{year:2017,no:27,category:"法令上の制限",question:"建築基準法の用途制限に関する次の記述のうち、正しいものはどれか。",choices:{1:"第一種低層住居専用地域内には、いかなる店舗も建築できない",2:"第一種住居地域内には、床面積の合計が3,000㎡を超える店舗は建築できない",3:"商業地域では、工場を建築することができない",4:"準工業地域では、住宅を建築することができない"},answer:2,explanation:"第一種住居地域では、床面積合計が3,000㎡を超える店舗・飲食店等は建築不可（建築基準法別表第2）。第一種低層住居専用地域でも小規模店舗（50㎡以下等）は建築可能。準工業地域は住宅建築可。",keywords:["法令上の制限"]},
{year:2017,no:28,category:"法令上の制限",question:"景観法に関する次の記述のうち、正しいものはどれか。",choices:{1:"景観地区は、都市計画区域または準都市計画区域内にのみ定めることができる",2:"景観地区内においては、建築物の新築に際して市町村長の認定が必要である",3:"景観計画区域の指定は、都道府県知事のみが行うことができる",4:"景観法の規定は、国の機関が設置する工作物には適用されない"},answer:2,explanation:"景観地区内では、建築物の建築等について市町村長の認定が必要（景観法62条）。景観計画は市町村も策定できる。",keywords:["法令上の制限"]},
{year:2017,no:29,category:"税・その他",question:"不動産取得税に関する次の記述のうち、正しいものはどれか。",choices:{1:"不動産取得税は、国税であり税率は一律4%である",2:"不動産を購入する契約が締結された時点で不動産取得税の課税要件を充足する",3:"相続による不動産の取得には不動産取得税は課税されない",4:"新築住宅の不動産取得税は、固定資産税評価額から1,000万円を控除した金額に課税される"},answer:3,explanation:"相続による不動産の取得は不動産取得税の非課税事由（地方税法73条の7第1号）。不動産取得税は地方税（都道府県税）。登記完了・引渡し等による実際の取得時が課税時点。新築住宅の控除額は1,200万円（一定の住宅）。",keywords:["税・その他"]},
{year:2017,no:30,category:"税・その他",question:"固定資産税に関する次の記述のうち、正しいものはどれか。",choices:{1:"固定資産税の納税義務者は、毎年4月1日現在において固定資産台帳に所有者として登録されている者である",2:"宅地の固定資産税評価は、3年ごとに行われる基準年度に評価替えが行われる",3:"新築住宅（床面積が50㎡以上280㎡以下）に対する固定資産税の軽減税率は、一律5年間税額の1/2に減額される",4:"固定資産税の課税標準の特例として、小規模住宅用地の課税標準は評価額の1/3に軽減される"},answer:2,explanation:"固定資産の評価替えは3年ごとの基準年度に行われる（地方税法349条）。賦課期日は1月1日。新築住宅の軽減は一般住宅3年間・マンション5年間（長期優良住宅はさらに長期）。小規模住宅用地は1/6に軽減。",keywords:["税・その他"]},
{year:2017,no:31,category:"税・その他",question:"土地・建物の譲渡に係る所得税の特例に関する次の記述のうち、正しいものはどれか。",choices:{1:"居住用財産の3,000万円特別控除は、土地だけの譲渡には適用できない",2:"居住用財産の譲渡所得の特別控除（3,000万円）と住宅ローン控除は、同じ年に重複して適用できる",3:"長期譲渡所得の税率（所得税15%+住民税5%）は、6,000万円以下の居住用財産では14%（所得税10%+住民税4%）に軽減される",4:"居住用財産の買換え特例は、新居が旧居の売却代金より安い場合でも適用できる"},answer:3,explanation:"10年超所有の居住用財産の長期譲渡所得で、6,000万円以下の部分は所得税10%+住民税4%=14%に軽減（措置法31条の3）。6,000万円超の部分は通常の長期税率（15%+5%）。",keywords:["税・その他"]},
{year:2017,no:32,category:"税・その他",question:"登録免許税に関する次の記述のうち、正しいものはどれか。",choices:{1:"相続による所有権移転登記の税率は1,000分の4である",2:"贈与による所有権移転登記の税率は1,000分の20である",3:"売買による所有権移転登記の税率（住宅以外）は1,000分の10である",4:"土地の売買による所有権移転登記の本則税率は1,000分の20であるが、住宅用地については軽減税率がある"},answer:4,explanation:"土地の売買による所有権移転登記の本則税率は1,000分の20（2%）。相続は1,000分の4（0.4%）。贈与は1,000分の20（2%）。住宅等の軽減税率あり。",keywords:["税・その他"]},
{year:2017,no:33,category:"税・その他",question:"印紙税に関する次の記述のうち、誤っているものはどれか。",choices:{1:"土地の賃貸借契約書は印紙税の課税文書である",2:"不動産の売買に関する仮契約書には印紙税が課税される",3:"建物の建築工事請負契約書は印紙税の課税文書である",4:"土地及び建物の贈与契約書には印紙税は課税されない"},answer:4,explanation:"不動産の贈与契約書（無償の権利移転に関する証書）も一定の場合に印紙税が課税される文書となる。すべての贈与が非課税とは言えない。",keywords:["税・その他"]},
{year:2017,no:34,category:"税・その他",question:"地価公示及び不動産鑑定評価に関する次の記述のうち、正しいものはどれか。",choices:{1:"地価公示の公示価格は、一般の土地取引の指標として用いられるが、公共事業用地取得の基準とはならない",2:"不動産鑑定士は、鑑定評価書に記名押印しなければならない",3:"収益還元法は賃貸用不動産にのみ適用できる手法であり、自用の不動産には適用できない",4:"取引事例比較法においては、正常な取引事例のみを採用しなければならない"},answer:4,explanation:"取引事例比較法では、正常な取引事例（特殊な事情のない事例）を採用し、必要に応じて事情補正・時点修正を行う（不動産鑑定評価基準）。収益還元法は賃貸不動産以外にも適用可能。公示価格は公共取得の基準にもなる。",keywords:["税・その他"]},
{year:2017,no:35,category:"宅建業法",question:"宅地建物取引業者が行う業務に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。",choices:{1:"宅建業者は、業務上知り得た秘密を正当な理由なく漏らすことを禁じられているが、取引士は同様の義務を負わない",2:"宅建業者は、宅地の売買の媒介に際し、取引の相手方に対して手数料の金額の説明をしなければならない",3:"宅建業者は、宅地又は建物の売買の広告に際し、取引態様を明示しなければならない",4:"宅建業者は、売買の媒介をする場合、代金の額を媒介契約書に記載する必要はない"},answer:3,explanation:"取引態様（自己売買・交換・媒介・代理の別）は、広告に際して明示しなければならない（宅建業法34条1項）。取引士も秘密保持義務あり（宅建業法45条）。",keywords:["宅建業法"]},
{year:2017,no:36,category:"宅建業法",question:"宅地建物取引業者Aが、Bを売主とする宅地の売買について、Cから媒介の依頼を受け契約が成立した場合に関する次の記述のうち、宅地建物取引業法の規定によれば、誤っているものはどれか。",choices:{1:"AはBおよびCの両方から報酬を受け取ることができるが、合計額は法定限度内でなければならない",2:"AはBとCの双方に重要事項説明書を交付しなければならない",3:"AはCからのみ媒介の依頼を受けているため、Bに37条書面を交付する必要はない",4:"AはBとCの双方に37条書面を交付しなければならない"},answer:3,explanation:"37条書面（契約書面）は、宅建業者が媒介した場合、売主・買主等の取引当事者全員に交付しなければならない（宅建業法37条）。Cのみならず売主Bにも交付が必要。",keywords:["宅建業法"]},
{year:2017,no:37,category:"宅建業法",question:"宅地建物取引業者Aが、自ら売主として宅地建物取引業者でないBとの間で宅地の売買契約を締結した場合における手付に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。",choices:{1:"Aが手付の全額をBに返還し申し出たとき、BはAの解除の申し出を拒絶することができる",2:"Aが受領した手付金は、常に解約手付としての性質を有する",3:"手付金の額がいかなる場合も、代金の20%を超えることはできない",4:"Bが契約の履行に着手した後は、Aは手付を倍返しして解除することができない"},answer:4,explanation:"相手方が契約の履行に着手した後は、手付による解除ができない（民法557条）。宅建業者が売主の場合、手付は解約手付とみなされる（宅建業法39条2項）。手付上限は代金の20%（宅建業法39条1項）。",keywords:["宅建業法"]},
{year:2017,no:38,category:"宅建業法",question:"宅地建物取引業者が行う広告規制に関する次の記述のうち、宅地建物取引業法の規定によれば、誤っているものはどれか。",choices:{1:"宅建業者は、実際の取引価格よりも著しく低い価格を広告してはならない",2:"宅建業者は、建物の売買について建築確認を受ける前から、確認申請中である旨を明示して広告することができる",3:"宅建業者は、取引する意思のない物件について広告してはならない",4:"宅建業者は、宅地建物の将来の売買価格について、根拠のない断定的な判断を提供してはならない"},answer:2,explanation:"宅建業者は建築確認を受ける前の物件について広告してはならない（宅建業法33条）。確認申請中であっても確認を受けるまでは広告禁止。",keywords:["宅建業法"]},
{year:2017,no:39,category:"宅建業法",question:"宅地建物取引業者の監督処分に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。",choices:{1:"指示処分と業務停止処分は同時に科することができない",2:"業務停止処分の最長期間は6か月である",3:"免許取消処分は、任意的取消事由と必要的取消事由がある",4:"都道府県知事は、その都道府県内で業務を行う国土交通大臣免許の業者に対して、指示処分ができない"},answer:3,explanation:"免許取消しには、違反があれば必ず取り消す必要的取消事由（宅建業法66条1項1号〜11号等）と、取り消すことができる任意的取消事由がある。業務停止処分の最長期間は1年（宅建業法65条2項）。",keywords:["宅建業法"]},
{year:2017,no:40,category:"宅建業法",question:"宅地建物取引業者が行う業務に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。",choices:{1:"宅建業者が自ら売主として宅地を売却する場合、宅地の種類・品質に関して事実に反することを告げることができる",2:"宅建業者が媒介業者として行動する場合、売主・買主双方の利益を代理する義務がある",3:"宅建業者は、業務に関して作成した書類について、その種類にかかわらず5年間保存しなければならない",4:"宅建業者は、新聞・雑誌等の広告については宅建業法の規制を受けるが、インターネット広告は受けない"},answer:2,explanation:"媒介業者は売主・買主双方の利益のために誠実に業務を行う義務がある（善管注意義務）（宅建業法31条）。インターネット広告も宅建業法の広告規制の対象。",keywords:["宅建業法"]},
{year:2017,no:41,category:"法令上の制限",question:"建築基準法の規定に関する次の記述のうち、正しいものはどれか。",choices:{1:"第一種低層住居専用地域内では、原則として住宅兼用店舗を建築できない",2:"建築物の延べ面積には、駐車場の用途に供する部分は算入されない",3:"日影規制は、第一種低層住居専用地域内の建築物には適用されない",4:"居室の採光に必要な窓等の開口部の面積は、居室の床面積に対し一定割合以上でなければならない"},answer:4,explanation:"居室には採光のために一定の割合以上の開口部を設ける必要がある（建築基準法28条）。住宅兼用店舗は第一種低層住居専用地域でも小規模なものは建築可能。日影規制は低層住居専用地域にも適用される。",keywords:["法令上の制限"]},
{year:2017,no:42,category:"法令上の制限",question:"都市計画法の開発許可制度に関する次の記述のうち、正しいものはどれか。",choices:{1:"開発許可申請の際には、都道府県知事に申請手数料を納付しなければならない",2:"市街化調整区域において、農業者の住宅建設のための開発行為には開発許可は必要ない",3:"開発許可を受けた開発区域内であっても、土地の形質変更に際して建築確認は不要である",4:"開発許可を受けた開発区域の全部または一部について、開発行為に関する工事の廃止届出が必要な場合がある"},answer:2,explanation:"農業・林業・漁業を営む者が建築する農林漁業用建築物や居住用建築物のための開発行為は開発許可不要（都市計画法29条1項2号）。",keywords:["法令上の制限"]},
{year:2017,no:43,category:"法令上の制限",question:"建物の構造に関する次の記述のうち、最も不適切なものはどれか。",choices:{1:"木造建築は、耐震性・耐火性の観点から高層建築物には不向きである",2:"鉄筋コンクリート造は、引張力に強いコンクリートと圧縮力に強い鉄筋を組み合わせた構造である",3:"鉄骨造は、靭性（粘り強さ）が高く地震に対して有利な面がある",4:"鉄骨鉄筋コンクリート造は、高層建築物にも用いられる構造形式である"},answer:2,explanation:"鉄筋コンクリートの特性は逆で、コンクリートは圧縮力に強く引張力に弱い。鉄筋は引張力に強い。この両者を組み合わせることで互いの弱点を補う。",keywords:["法令上の制限"]},
{year:2017,no:44,category:"権利関係",question:"民法上の代理に関する次の記述のうち、正しいものはどれか。",choices:{1:"代理権がない者が代理行為をした場合（無権代理）、本人が追認しなければその行為の効力は生じない",2:"有権代理において、代理人の行為の効果は代理人に帰属する",3:"代理権は、代理人が死亡した場合でも消滅しない",4:"代理行為の瑕疵（錯誤・詐欺等）は、本人ではなく代理人を基準として判断する"},answer:4,explanation:"代理行為における意思の欠缺・瑕疵（錯誤・詐欺・強迫等）の有無は、代理人を基準として判断する（民法101条1項）。有権代理の効果は本人に帰属。代理権は本人・代理人の死亡で消滅（民法111条）。",keywords:["権利関係"]},
{year:2017,no:45,category:"権利関係",question:"不動産登記に関する次の記述のうち、誤っているものはどれか。",choices:{1:"表題部の登記（表示登記）は、登記官が職権で行うことがある",2:"区分建物（マンション等）については、表示の登記をするには、各専有部分の床面積は壁その他の区画の内側線で囲まれた部分の水平投影面積による",3:"区分建物の登記において、各区分所有者の共用部分の持分は、原則として専有部分の床面積の割合による",4:"登記記録上の地目が農地でなければ、農地法の適用を受けることはない"},answer:4,explanation:"農地法における農地の認定は現況主義であり、登記上の地目ではなく現在の土地の状況（現に農地として使用されているか）で判断する。",keywords:["権利関係"]},
{year:2017,no:46,category:"税・その他",question:"住宅ローン控除（住宅借入金等特別控除）に関する次の記述のうち、正しいものはどれか。",choices:{1:"住宅ローン控除の適用を受ける初年度は、確定申告をする必要がある",2:"住宅ローン控除の控除限度額は、残高の1%で計算される",3:"住宅ローン控除の対象となる住宅の床面積の下限は、50㎡（合計所得金額1,000万円以下の者は40㎡）以上である",4:"住宅ローン控除は、転居した後でも控除期間中は継続して適用を受けられる"},answer:1,explanation:"住宅ローン控除は、居住した年の翌年に確定申告が必要（初年度）。2年目以降は年末調整で対応可（給与所得者の場合）。",keywords:["税・その他"]},
{year:2017,no:47,category:"税・その他",question:"土地の有効活用に関する記述のうち、最も不適切なものはどれか。",choices:{1:"等価交換方式では、土地所有者は建設費を負担することなく、提供した土地の価値に見合う建物の一部を取得できる",2:"建設協力金方式では、土地所有者が将来テナントとなる者から建設資金を借り、その建物を賃貸する",3:"定期借地権方式では、契約期間満了後に土地が返還されるため、将来の土地の自由な利用が確保される",4:"事業受託方式では、土地所有者がデベロッパーに土地を売却して開発を任せる方式である"},answer:4,explanation:"事業受託方式は、土地所有者が土地を保有したまま（売却せず）、デベロッパー等に建設・管理・運営を委託する方式。土地を売却するわけではない。",keywords:["税・その他"]},
{year:2017,no:48,category:"税・その他",question:"不動産市場に関する次の記述のうち、正しいものはどれか。",choices:{1:"不動産市場は、株式市場と異なり価格の透明性が非常に高い",2:"不動産の価格は供給の増減に敏感に反応するため、短期的な価格変動が激しい",3:"不動産は個別性が高いため、同種の不動産であっても価格は異なることがある",4:"金利が上昇すると、不動産価格は上昇する傾向がある"},answer:3,explanation:"不動産は個別性（固定性・位置の固定性・個別性）が高く、同種・同条件に見える不動産でも立地・日当たり等で価格は異なる。不動産市場は株式市場に比べて価格の透明性が低い。金利上昇は住宅ローン金利上昇により不動産需要を抑制し価格下落要因。",keywords:["税・その他"]},
{year:2017,no:49,category:"宅建業法",question:"宅地建物取引業法に関する次の記述のうち、正しいものはどれか。",choices:{1:"宅建業者の使用人が、宅建業者の事務所外でその業務に関し法令違反を行った場合、宅建業者は一切の責任を負わない",2:"宅建業者が名義を貸して他の者が宅建業を営んだ場合、名義を貸した宅建業者は宅建業法の罰則を受けない",3:"宅建業者でない者が宅建業を営んだ場合、3年以下の懲役もしくは300万円以下の罰金またはその両方に処せられることがある",4:"宅建業者が報酬限度額を超える報酬を受け取った場合、過剰受領分のみを返還すれば宅建業法上の問題はない"},answer:3,explanation:"無免許営業は3年以下の懲役もしくは300万円以下の罰金（宅建業法79条）。名義貸しも禁止（同法13条）で違反すれば罰則あり。報酬超過受領は行政処分と罰則の対象。",keywords:["宅建業法"]},
{year:2017,no:50,category:"宅建業法",question:"宅地建物取引業者Aが、Bに対して宅地の売買の媒介を行い、売買契約が成立した場合に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。",choices:{1:"AはBに対して、売買代金の一定額を証拠金として支払うよう強制することができる",2:"AはBから依頼を受けて住宅ローンのあっせんをしたが、ローンが不成立になった場合、その旨を重要事項説明書に記載して説明しなければならない",3:"AがBから媒介報酬を受領した後に、当該売買契約がBの都合でキャンセルされた場合でもAは報酬を返還しなくてよい",4:"Aは、当該売買契約の当事者でないため、37条書面を作成する必要はない"},answer:2,explanation:"住宅ローンのあっせんをする場合、ローンが不成立の場合の措置について重要事項説明が必要（宅建業法35条1項12号）。媒介業者も37条書面を作成・交付する義務がある（同法37条1項）。",keywords:["宅建業法"]},
{year:2016,no:1,category:"権利関係",question:"民法の規定に関する次の記述のうち、誤っているものはどれか。",choices:{1:"意思能力を有しない者がした法律行為は無効である",2:"未成年者が法定代理人の同意なしに行った行為は、取り消すことができる",3:"成年被後見人の法律行為は、日常生活に関するものを除き、取り消すことができる",4:"被保佐人が保佐人の同意なしに行ったすべての法律行為は取り消すことができる"},answer:4,explanation:"被保佐人が保佐人の同意を要する行為（民法13条1項各号）を同意なしに行った場合に取り消せる。すべての法律行為が対象ではなく、民法13条1項に列挙された重要な行為が対象。",keywords:["権利関係"]},
{year:2016,no:2,category:"権利関係",question:"物権の変動に関する次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。",choices:{1:"AがBにA所有の不動産を売却した場合、所有権の移転は代金の支払いがなければ生じない",2:"AがBとCの双方に同じ不動産を売却した場合、先に登記を備えた者が所有権を取得する",3:"不動産の所有権取得には、必ず登記が必要である",4:"取消しにより所有権が復帰する場合、取消前に登記を備えた第三者には取消しを対抗できる"},answer:2,explanation:"不動産の二重売買では、登記を先に備えた者が民法177条により第三者に対抗できる（ただし背信的悪意者を除く）。",keywords:["権利関係"]},
{year:2016,no:3,category:"権利関係",question:"Aが1,000万円をBに貸し付けたところ、Bが弁済期に弁済しなかった場合に関する次の記述のうち、民法の規定によれば、正しいものはどれか。",choices:{1:"AがBに対して返還を請求する訴訟を提起した場合、訴え提起の日から消滅時効が完成する",2:"Bが「来月必ず返す」と述べた場合、Bによる債務の承認となり消滅時効が更新される",3:"Aが貸付けをした日から10年で消滅時効が完成する",4:"Aが弁済期から1年以内に訴えを提起しなければ時効消滅する"},answer:2,explanation:"債務者による債務の承認は、時効の更新事由（民法152条）。確定判決確定時から新たに時効が進行（中断後更新）。消滅時効は債権者が権利を行使できると知った時から5年または権利行使可能時から10年（民法166条）。",keywords:["権利関係"]},
{year:2016,no:4,category:"権利関係",question:"Aが死亡し、相続人としてBとCの子（孫）Dがいる（BはAの子でDの親）。Bが相続放棄をした場合に関する次の記述のうち、民法の規定によれば、正しいものはどれか。",choices:{1:"DはBの代わりにAの相続人となる（代襲相続）",2:"BはAの財産に対していかなる権利も有しない",3:"BはAの財産の1/2を相続する",4:"DはCと共同してAの財産を相続する"},answer:2,explanation:"相続放棄をした者は初めから相続人でなかったものとみなされ（民法939条）、放棄した者の子による代襲相続は生じない。よってBはAの財産に対して権利を有しない。",keywords:["権利関係"]},
{year:2016,no:5,category:"権利関係",question:"売買契約に関する次の記述のうち、民法の規定によれば、正しいものはどれか。",choices:{1:"売買契約において、目的物の引渡し前に売主の責めに帰すべき事由なく目的物が滅失した場合、買主は代金の支払いを拒絶できる",2:"手付が交付された場合、売主はいつでも手付の倍額を現実に提供して契約を解除できる",3:"売主が買主に目的物を引き渡すと同時に代金を受け取る権利を有するのは、同時履行の抗弁権の典型例である",4:"売買契約において、目的物の品質が契約に適合しない場合、買主は直ちに契約を解除できる"},answer:3,explanation:"双務契約における同時履行の抗弁権（民法533条）の典型が売買における目的物引渡しと代金支払いの同時履行。手付解除は相手方が履行に着手するまでが期限。",keywords:["権利関係"]},
{year:2016,no:6,category:"権利関係",question:"抵当権に関する次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。",choices:{1:"抵当権者は、被担保債権の弁済がない場合に競売を申し立てることができる",2:"抵当不動産の第三取得者は、抵当権消滅請求をすることができる",3:"抵当権は、抵当不動産の占有を伴う権利である",4:"根抵当権は、一定範囲に属する不特定の債権を極度額の限度で担保する"},answer:3,explanation:"抵当権は占有を伴わない非占有担保物権（民法369条）。これが抵当権と質権の大きな相違点。抵当権者は目的物の占有を取得しない。",keywords:["権利関係"]},
{year:2016,no:7,category:"権利関係",question:"Aは自己所有の建物をBに賃貸し、BはAの承諾なくCに転貸した場合に関する次の記述のうち、民法の規定及び判例によれば、正しいものはどれか。",choices:{1:"AはBの無断転貸を理由に、いつでも賃貸借契約を解除できる",2:"AとBの賃貸借契約が合意解除された場合、CはAに建物の明渡しを拒絶できる",3:"BとCとの転貸借は、AとBの賃貸借が存続する限り有効である",4:"CがAの建物を損傷した場合、AはCに損害賠償を請求できない"},answer:3,explanation:"無断転貸でも、それが信頼関係を破壊しない特段の事情がある場合は解除不可（判例）。合意解除の場合は転借人に対抗できない場合がある（判例）。AとBの賃貸借が有効な間はBCの転貸借も有効。",keywords:["権利関係"]},
{year:2016,no:8,category:"権利関係",question:"借地借家法の規定に関する次の記述のうち、正しいものはどれか。",choices:{1:"定期建物賃貸借契約は、公正証書によって締結しなければならない",2:"定期建物賃貸借において、期間が1年未満の契約も有効である",3:"普通建物賃貸借において、期間1年未満の契約は期間の定めのないものとみなされる",4:"定期建物賃貸借において、賃料の減額請求は一切できない"},answer:2,explanation:"定期建物賃貸借は1年未満の期間も有効（期間の定めのない借家制限の適用外）（借地借家法38条1項）。公正証書でなくてもよい（書面であれば足りる）。定期建物賃貸借でも賃料減額は特約で排除可能だが強制ではない。",keywords:["権利関係"]},
{year:2016,no:9,category:"権利関係",question:"連帯保証に関する次の記述のうち、民法の規定によれば、正しいものはどれか。",choices:{1:"連帯保証人は、保証人と異なり催告の抗弁権を有する",2:"連帯保証人は、主たる債務者の財産に執行しなければ自分の財産から弁済しないと主張できる",3:"連帯保証人に対する履行の請求は、主たる債務者に対しても効力を有する",4:"連帯保証人が主たる債務者に代わって弁済した場合、主たる債務者に対して求償できる"},answer:4,explanation:"連帯保証人が弁済した場合、主たる債務者に対して求償権を取得する（民法459条）。連帯保証人には催告・検索の抗弁権がない（民法454条）。2020年改正後、連帯保証人への請求は主たる債務者に絶対効を生じない。",keywords:["権利関係"]},
{year:2016,no:10,category:"権利関係",question:"区分所有法に関する次の記述のうち、正しいものはどれか。",choices:{1:"区分所有建物の建替えは、集会において区分所有者及び議決権の各3/4以上の賛成が必要である",2:"共用部分の重大変更（形状・効用の著しい変更）は、区分所有者及び議決権の各3/4以上の賛成が必要である",3:"規約の設定には、区分所有者及び議決権の各過半数の賛成が必要である",4:"管理者の選任・解任は、規約に別段の定めがない限り区分所有者全員の合意が必要である"},answer:2,explanation:"共用部分の重大変更は区分所有者及び議決権の各3/4以上の多数（区分所有法17条1項）。建替えは4/5以上（同法62条）。規約は3/4以上。管理者の選任・解任は集会の普通決議（過半数）。",keywords:["権利関係"]},
{year:2016,no:11,category:"宅建業法",question:"宅地建物取引業の免許に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。",choices:{1:"宅建業者が破産した場合、破産管財人は廃業届を提出しなければならない",2:"法人の役員が禁錮刑に処せられた場合でも、その法人は宅建業の免許を受けることができる",3:"宅建業者の事務所の所在地を管轄する都道府県知事は、常にその宅建業者の免許権者である",4:"個人で宅建業の免許を受けている者が死亡した場合、相続人がその免許を継承できる"},answer:1,explanation:"宅建業者が破産した場合、破産管財人（または相続人等）が30日以内に廃業届を提出（宅建業法11条1項4号）。法人の役員が禁錮以上の刑は欠格事由（宅建業法5条1項3号）。",keywords:["宅建業法"]},
{year:2016,no:12,category:"宅建業法",question:"宅地建物取引士の登録及び宅地建物取引士証に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。",choices:{1:"宅建試験合格後、登録の申請は当該試験を行った都道府県のほか、他の都道府県にも申請できる",2:"取引士の登録は、登録を受けた都道府県以外の都道府県には移転できない",3:"宅地建物取引士証に記載された住所を変更した場合、変更の登録を申請し、かつ取引士証の書換え交付を申請しなければならない",4:"取引士証の有効期限が切れた場合、更新申請が採択されるまでは宅地建物取引士として業務を行うことができる"},answer:3,explanation:"宅地建物取引士が住所変更した場合、変更の登録申請（宅建業法20条）と取引士証の書換え交付申請が必要。取引士証は一の都道府県への登録。移転登録は可能（同法19条の2）。",keywords:["宅建業法"]},
{year:2016,no:13,category:"宅建業法",question:"宅地建物取引業者の報酬に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか（消費税課税事業者）。",choices:{1:"宅建業者が売買の媒介をする場合、依頼者の一方からのみ報酬を受領しなければならない",2:"売買代金3,000万円の物件の媒介報酬の税込み限度額は1,089,000円である",3:"宅建業者が依頼者の特別の依頼によって行った遠隔地への出張等の費用は、報酬とは別に受領できる",4:"賃貸借の媒介における権利金の授受がある場合、報酬計算の基礎に加算することはできない"},answer:3,explanation:"依頼者の依頼による特別の費用（遠隔地出張費等）は、依頼者が承諾した場合に報酬とは別に受領できる（報酬告示）。3,000万円×3%+6万円=96万円、税込み105.6万円（1,056,000円）。権利金があれば一定の場合に売買代金等に準じて計算可。",keywords:["宅建業法"]},
{year:2016,no:14,category:"宅建業法",question:"宅地建物取引業法第35条の重要事項説明に関する次の記述のうち、誤っているものはどれか。",choices:{1:"宅建業者が宅地の売買を媒介する場合、土地の面積に関する権利関係を重要事項として説明しなければならない",2:"宅建業者が建物の賃貸借を媒介する場合、当該建物の管理が委託されているときはその委託先を説明しなければならない",3:"重要事項説明書を相手方に交付するときは、取引士がその書面に記名しなければならない",4:"重要事項説明書の交付は、必ず取引士が相手方に直接手渡しで交付しなければならない"},answer:4,explanation:"重要事項説明書の交付は郵送や電磁的方法でも可能であり、必ず直接手渡しでなければならないわけではない。",keywords:["宅建業法"]},
{year:2016,no:15,category:"宅建業法",question:"宅地建物取引業法の規定する媒介契約について正しいものはどれか。",choices:{1:"宅建業者は、専任媒介契約を締結した場合、当該物件を指定流通機構に登録しなければならない",2:"一般媒介契約は書面によって締結しなければならないが、媒介契約書の様式は自由である",3:"専属専任媒介契約において、業者は2週間に1回以上の業務状況報告義務を負う",4:"媒介業者は、媒介契約の有効期間中に成立した契約にのみ報酬を請求できる"},answer:1,explanation:"専任媒介契約を締結した場合、宅建業者は7日（休業日除く）以内に指定流通機構への登録義務がある（宅建業法34条の2第5項）。専属専任は5日以内。専属専任の業務報告は1週間に1回以上。",keywords:["宅建業法"]},
{year:2016,no:16,category:"宅建業法",question:"宅地建物取引業者が自ら売主として行う売買において、宅地建物取引業法で定められた制限に関する次の記述のうち、正しいものはどれか（買主は宅建業者でない）。",choices:{1:"瑕疵担保責任（現・契約不適合責任）の期間を「引渡しから2年間」と定める特約は無効である",2:"損害賠償額を代金の20%とする特約は、有効である",3:"完成物件について、代金の10%かつ1,000万円以下であれば手付金の保全措置は不要である",4:"手付解除ができる期限として「売買契約成立から3か月以内」と定める特約は無効である"},answer:2,explanation:"損害賠償予定額・違約金の合計は代金の20%まで有効（宅建業法38条）。瑕疵担保（契約不適合）責任の期間は引渡しから2年以上とする必要あり（宅建業法40条）。完成物件の保全措置免除は代金の10%以内かつ1,000万円以下。",keywords:["宅建業法"]},
{year:2016,no:17,category:"宅建業法",question:"宅地建物取引業法の規定に関する次の記述のうち、誤っているものはどれか。",choices:{1:"宅建業者は、正当な理由なく取引関係者の秘密を他に漏らしてはならない",2:"宅建業者が相手方の判断に重要な影響を及ぼす事項について、故意に不実のことを告げることは禁止されている",3:"宅建業者は、相手方等に対して確実に利益をもたらす旨の断定的判断の提供を禁じられている",4:"宅建業者が手付に関する信用供与（貸付）をすることは、相手方の承諾があれば認められる"},answer:4,explanation:"手付に関する信用供与（貸付・後払い等）は、相手方の承諾があっても禁止（宅建業法47条3号）。これは強行規定で当事者の合意で変更できない。",keywords:["宅建業法"]},
{year:2016,no:18,category:"宅建業法",question:"宅地建物取引業者が行う37条書面に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。",choices:{1:"37条書面の記名は、専任の宅地建物取引士が行わなければならない",2:"37条書面に記載すべき事項として、宅地建物の引渡しの時期がある",3:"37条書面は、契約締結後7日以内に交付しなければならない",4:"37条書面は、宅建業者が直接取引の相手方に手渡しで交付しなければならない"},answer:2,explanation:"引渡しの時期は37条書面の必要的記載事項（宅建業法37条1項4号）。記名は専任取引士でなくても宅地建物取引士であれば可（勤務する取引士）。37条書面は遅滞なく交付。",keywords:["宅建業法"]},
{year:2016,no:19,category:"宅建業法",question:"宅地建物取引業者の保証制度に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。",choices:{1:"保証協会の弁済業務保証金分担金は、主たる事務所につき600,000円である",2:"保証協会に加入した宅建業者は、加入前に生じた債権についても弁済業務保証金から弁済を受けられる",3:"宅建業者は、営業保証金制度と保証協会の弁済業務保証金制度の両方を選択して利用できる",4:"保証協会からの還付により弁済業務保証金が減少した場合、社員業者は通知を受けてから2週間以内に分担金を納付しなければならない"},answer:4,explanation:"弁済業務保証金の還付による不足が生じた場合、保証協会の通知を受けてから2週間以内に還付充当金を納付する義務がある（宅建業法64条の10）。",keywords:["宅建業法"]},
{year:2016,no:20,category:"宅建業法",question:"宅地建物取引業法の規定に関する次の記述のうち、正しいものはどれか。",choices:{1:"宅建業者の従業者でない者が取引関係者から従業者証明書の提示を求められた場合、宅建業者はこれに応じる義務はない",2:"宅建業者は、取引に関する帳簿を事務所ごとに設け、取引のあったつど、取引の年月日等の事項を記載しなければならない",3:"宅建業者は、従業者名簿を最終の記載の日から5年間保存しなければならない",4:"宅建業者は、毎年3月31日時点の従業者数を免許権者に報告しなければならない"},answer:2,explanation:"宅建業者は事務所ごとに帳簿（取引台帳）を備え付け、取引があった都度必要事項を記録する義務がある（宅建業法49条）。従業者名簿の保存期間は最終記載から10年間（同法48条4項）。",keywords:["宅建業法"]},
{year:2016,no:21,category:"法令上の制限",question:"都市計画法の規定に関する次の記述のうち、正しいものはどれか。",choices:{1:"都市計画区域は、行政区画（市町村の区域）に従って指定される",2:"市街化区域内において開発行為を行う場合、1,000㎡以上であれば開発許可が必要である",3:"開発許可を受けた開発区域内では、工事完了の公告後でなければ建築物を建築できない",4:"開発許可を受けた区域内の土地の権利を取得した者は、当該開発許可に係る目的外の建築物を建築できる場合がある"},answer:2,explanation:"市街化区域での開発行為は1,000㎡以上（三大都市圏の一定区域は500㎡以上）で開発許可が必要（都市計画法29条）。工事完了公告前は原則建築不可（同法37条）。",keywords:["法令上の制限"]},
{year:2016,no:22,category:"法令上の制限",question:"建築基準法の建蔽率及び容積率に関する次の記述のうち、正しいものはどれか。",choices:{1:"建蔽率は、敷地面積に対する建築面積の割合をいう",2:"容積率は、敷地面積に対する各階の床面積の合計（延べ面積）の割合をいう",3:"前面道路が2本ある場合、容積率の計算においては幅員が小さい方の道路を前面道路とする",4:"建蔽率の限度が40%の地域では、角地であっても緩和措置は受けられない"},answer:2,explanation:"容積率は敷地面積に対する延べ面積の割合（建築基準法52条1項）。建蔽率は建築面積/敷地面積。前面道路が複数ある場合は最大幅員のものを採用。角地は10%加算（条件付き）。",keywords:["法令上の制限"]},
{year:2016,no:23,category:"法令上の制限",question:"農地法に関する次の記述のうち、正しいものはどれか。",choices:{1:"農地を農地のまま第三者に贈与する場合、農地法第3条の許可は不要である",2:"農地を農地以外のものにする目的で農地の所有権を移転する場合は、農地法第5条の許可が必要である",3:"農地法第4条・第5条の許可を受けずに農地を転用した場合、転用行為は有効に成立する",4:"市街化区域内の農地を住宅建設の目的で転用する場合、農地法第4条の許可が必要である"},answer:2,explanation:"農地を農地以外の目的で権利移動（売買・贈与等）する場合は農地法5条の許可が必要。贈与も農地のまま権利移動する場合は農地法3条の許可が必要。農地法違反の転用は原状回復命令の対象。",keywords:["法令上の制限"]},
{year:2016,no:24,category:"法令上の制限",question:"建築基準法の集団規定に関する次の記述のうち、正しいものはどれか。",choices:{1:"都市計画区域内においては、建築物の敷地は原則として道路に接していなければならないが、特定行政庁の許可があれば不要である",2:"建築基準法上の道路は、幅員4m以上のものに限られる",3:"2項道路（みなし道路）に接する敷地に建物を建築する際は、道路中心線から2mセットバックする必要がある",4:"第一種低層住居専用地域内の道路は、歩道と車道を区別して設けなければならない"},answer:3,explanation:"2項道路（建築基準法42条2項）に接する敷地では、道路中心線から2mの線が道路境界線とみなされ（セットバック義務）、その部分に建築物を建築できない。",keywords:["法令上の制限"]},
{year:2016,no:25,category:"法令上の制限",question:"国土利用計画法に関する次の記述のうち、正しいものはどれか。",choices:{1:"市街化区域内の2,000㎡以上の土地の売買には事後届出が必要である",2:"事後届出の届出期限は、契約締結後3週間以内である",3:"事後届出を要する面積基準は、都市計画区域内では一律2,000㎡以上である",4:"事後届出が必要な土地取引において、届出をしなかった場合の罰則はない"},answer:1,explanation:"市街化区域内では2,000㎡以上の土地売買等の契約に事後届出が必要（国土利用計画法23条）。届出は契約後2週間以内。都市計画区域外は10,000㎡以上。違反には罰則あり（同法47条）。",keywords:["法令上の制限"]},
{year:2016,no:26,category:"法令上の制限",question:"土地区画整理法に関する次の記述のうち、正しいものはどれか。",choices:{1:"土地区画整理組合は、組合員以外の者を施行者とすることができない",2:"宅地の所有者と借地権者は、いずれも施行地区内にある宅地について仮換地の指定を受けることができる",3:"換地処分の公告があった日の翌日から、換地は従前の宅地とみなされる",4:"土地区画整理組合の設立認可は、都道府県知事の認可と組合員全員の合意が必要である"},answer:3,explanation:"換地処分の公告があった翌日から換地が従前の宅地とみなされ（土地区画整理法104条1項）、権利が確定する。",keywords:["法令上の制限"]},
{year:2016,no:27,category:"法令上の制限",question:"建築基準法の用途制限に関する次の記述のうち、正しいものはどれか。",choices:{1:"第一種低層住居専用地域内には、いかなる店舗も建築できない",2:"第一種住居地域内には、床面積の合計が3,000㎡を超える店舗は建築できない",3:"商業地域では、工場を建築することができない",4:"準工業地域では、住宅を建築することができない"},answer:2,explanation:"第一種住居地域では、床面積合計が3,000㎡を超える店舗・飲食店等は建築不可（建築基準法別表第2）。第一種低層住居専用地域でも小規模店舗（50㎡以下等）は建築可能。準工業地域は住宅建築可。",keywords:["法令上の制限"]},
{year:2016,no:28,category:"法令上の制限",question:"景観法に関する次の記述のうち、正しいものはどれか。",choices:{1:"景観地区は、都市計画区域または準都市計画区域内にのみ定めることができる",2:"景観地区内においては、建築物の新築に際して市町村長の認定が必要である",3:"景観計画区域の指定は、都道府県知事のみが行うことができる",4:"景観法の規定は、国の機関が設置する工作物には適用されない"},answer:2,explanation:"景観地区内では、建築物の建築等について市町村長の認定が必要（景観法62条）。景観計画は市町村も策定できる。",keywords:["法令上の制限"]},
{year:2016,no:29,category:"税・その他",question:"不動産取得税に関する次の記述のうち、正しいものはどれか。",choices:{1:"不動産取得税は、国税であり税率は一律4%である",2:"不動産を購入する契約が締結された時点で不動産取得税の課税要件を充足する",3:"相続による不動産の取得には不動産取得税は課税されない",4:"新築住宅の不動産取得税は、固定資産税評価額から1,000万円を控除した金額に課税される"},answer:3,explanation:"相続による不動産の取得は不動産取得税の非課税事由（地方税法73条の7第1号）。不動産取得税は地方税（都道府県税）。登記完了・引渡し等による実際の取得時が課税時点。新築住宅の控除額は1,200万円（一定の住宅）。",keywords:["税・その他"]},
{year:2016,no:30,category:"税・その他",question:"固定資産税に関する次の記述のうち、正しいものはどれか。",choices:{1:"固定資産税の納税義務者は、毎年4月1日現在において固定資産台帳に所有者として登録されている者である",2:"宅地の固定資産税評価は、3年ごとに行われる基準年度に評価替えが行われる",3:"新築住宅（床面積が50㎡以上280㎡以下）に対する固定資産税の軽減税率は、一律5年間税額の1/2に減額される",4:"固定資産税の課税標準の特例として、小規模住宅用地の課税標準は評価額の1/3に軽減される"},answer:2,explanation:"固定資産の評価替えは3年ごとの基準年度に行われる（地方税法349条）。賦課期日は1月1日。新築住宅の軽減は一般住宅3年間・マンション5年間（長期優良住宅はさらに長期）。小規模住宅用地は1/6に軽減。",keywords:["税・その他"]},
{year:2016,no:31,category:"税・その他",question:"土地・建物の譲渡に係る所得税の特例に関する次の記述のうち、正しいものはどれか。",choices:{1:"居住用財産の3,000万円特別控除は、土地だけの譲渡には適用できない",2:"居住用財産の譲渡所得の特別控除（3,000万円）と住宅ローン控除は、同じ年に重複して適用できる",3:"長期譲渡所得の税率（所得税15%+住民税5%）は、6,000万円以下の居住用財産では14%（所得税10%+住民税4%）に軽減される",4:"居住用財産の買換え特例は、新居が旧居の売却代金より安い場合でも適用できる"},answer:3,explanation:"10年超所有の居住用財産の長期譲渡所得で、6,000万円以下の部分は所得税10%+住民税4%=14%に軽減（措置法31条の3）。6,000万円超の部分は通常の長期税率（15%+5%）。",keywords:["税・その他"]},
{year:2016,no:32,category:"税・その他",question:"登録免許税に関する次の記述のうち、正しいものはどれか。",choices:{1:"相続による所有権移転登記の税率は1,000分の4である",2:"贈与による所有権移転登記の税率は1,000分の20である",3:"売買による所有権移転登記の税率（住宅以外）は1,000分の10である",4:"土地の売買による所有権移転登記の本則税率は1,000分の20であるが、住宅用地については軽減税率がある"},answer:4,explanation:"土地の売買による所有権移転登記の本則税率は1,000分の20（2%）。相続は1,000分の4（0.4%）。贈与は1,000分の20（2%）。住宅等の軽減税率あり。",keywords:["税・その他"]},
{year:2016,no:33,category:"税・その他",question:"印紙税に関する次の記述のうち、誤っているものはどれか。",choices:{1:"土地の賃貸借契約書は印紙税の課税文書である",2:"不動産の売買に関する仮契約書には印紙税が課税される",3:"建物の建築工事請負契約書は印紙税の課税文書である",4:"土地及び建物の贈与契約書には印紙税は課税されない"},answer:4,explanation:"不動産の贈与契約書（無償の権利移転に関する証書）も一定の場合に印紙税が課税される文書となる。すべての贈与が非課税とは言えない。",keywords:["税・その他"]},
{year:2016,no:34,category:"税・その他",question:"地価公示及び不動産鑑定評価に関する次の記述のうち、正しいものはどれか。",choices:{1:"地価公示の公示価格は、一般の土地取引の指標として用いられるが、公共事業用地取得の基準とはならない",2:"不動産鑑定士は、鑑定評価書に記名押印しなければならない",3:"収益還元法は賃貸用不動産にのみ適用できる手法であり、自用の不動産には適用できない",4:"取引事例比較法においては、正常な取引事例のみを採用しなければならない"},answer:4,explanation:"取引事例比較法では、正常な取引事例（特殊な事情のない事例）を採用し、必要に応じて事情補正・時点修正を行う（不動産鑑定評価基準）。収益還元法は賃貸不動産以外にも適用可能。公示価格は公共取得の基準にもなる。",keywords:["税・その他"]},
{year:2016,no:35,category:"宅建業法",question:"宅地建物取引業者が行う業務に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。",choices:{1:"宅建業者は、業務上知り得た秘密を正当な理由なく漏らすことを禁じられているが、取引士は同様の義務を負わない",2:"宅建業者は、宅地の売買の媒介に際し、取引の相手方に対して手数料の金額の説明をしなければならない",3:"宅建業者は、宅地又は建物の売買の広告に際し、取引態様を明示しなければならない",4:"宅建業者は、売買の媒介をする場合、代金の額を媒介契約書に記載する必要はない"},answer:3,explanation:"取引態様（自己売買・交換・媒介・代理の別）は、広告に際して明示しなければならない（宅建業法34条1項）。取引士も秘密保持義務あり（宅建業法45条）。",keywords:["宅建業法"]},
{year:2016,no:36,category:"宅建業法",question:"宅地建物取引業者Aが、Bを売主とする宅地の売買について、Cから媒介の依頼を受け契約が成立した場合に関する次の記述のうち、宅地建物取引業法の規定によれば、誤っているものはどれか。",choices:{1:"AはBおよびCの両方から報酬を受け取ることができるが、合計額は法定限度内でなければならない",2:"AはBとCの双方に重要事項説明書を交付しなければならない",3:"AはCからのみ媒介の依頼を受けているため、Bに37条書面を交付する必要はない",4:"AはBとCの双方に37条書面を交付しなければならない"},answer:3,explanation:"37条書面（契約書面）は、宅建業者が媒介した場合、売主・買主等の取引当事者全員に交付しなければならない（宅建業法37条）。Cのみならず売主Bにも交付が必要。",keywords:["宅建業法"]},
{year:2016,no:37,category:"宅建業法",question:"宅地建物取引業者Aが、自ら売主として宅地建物取引業者でないBとの間で宅地の売買契約を締結した場合における手付に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。",choices:{1:"Aが手付の全額をBに返還し申し出たとき、BはAの解除の申し出を拒絶することができる",2:"Aが受領した手付金は、常に解約手付としての性質を有する",3:"手付金の額がいかなる場合も、代金の20%を超えることはできない",4:"Bが契約の履行に着手した後は、Aは手付を倍返しして解除することができない"},answer:4,explanation:"相手方が契約の履行に着手した後は、手付による解除ができない（民法557条）。宅建業者が売主の場合、手付は解約手付とみなされる（宅建業法39条2項）。手付上限は代金の20%（宅建業法39条1項）。",keywords:["宅建業法"]},
{year:2016,no:38,category:"宅建業法",question:"宅地建物取引業者が行う広告規制に関する次の記述のうち、宅地建物取引業法の規定によれば、誤っているものはどれか。",choices:{1:"宅建業者は、実際の取引価格よりも著しく低い価格を広告してはならない",2:"宅建業者は、建物の売買について建築確認を受ける前から、確認申請中である旨を明示して広告することができる",3:"宅建業者は、取引する意思のない物件について広告してはならない",4:"宅建業者は、宅地建物の将来の売買価格について、根拠のない断定的な判断を提供してはならない"},answer:2,explanation:"宅建業者は建築確認を受ける前の物件について広告してはならない（宅建業法33条）。確認申請中であっても確認を受けるまでは広告禁止。",keywords:["宅建業法"]},
{year:2016,no:39,category:"宅建業法",question:"宅地建物取引業者の監督処分に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。",choices:{1:"指示処分と業務停止処分は同時に科することができない",2:"業務停止処分の最長期間は6か月である",3:"免許取消処分は、任意的取消事由と必要的取消事由がある",4:"都道府県知事は、その都道府県内で業務を行う国土交通大臣免許の業者に対して、指示処分ができない"},answer:3,explanation:"免許取消しには、違反があれば必ず取り消す必要的取消事由（宅建業法66条1項1号〜11号等）と、取り消すことができる任意的取消事由がある。業務停止処分の最長期間は1年（宅建業法65条2項）。",keywords:["宅建業法"]},
{year:2016,no:40,category:"宅建業法",question:"宅地建物取引業者が行う業務に関する次の記述のうち、宅地建物取引業法の規定によれば、正しいものはどれか。",choices:{1:"宅建業者が自ら売主として宅地を売却する場合、宅地の種類・品質に関して事実に反することを告げることができる",2:"宅建業者が媒介業者として行動する場合、売主・買主双方の利益を代理する義務がある",3:"宅建業者は、業務に関して作成した書類について、その種類にかかわらず5年間保存しなければならない",4:"宅建業者は、新聞・雑誌等の広告については宅建業法の規制を受けるが、インターネット広告は受けない"},answer:2,explanation:"媒介業者は売主・買主双方の利益のために誠実に業務を行う義務がある（善管注意義務）（宅建業法31条）。インターネット広告も宅建業法の広告規制の対象。",keywords:["宅建業法"]},
{year:2016,no:41,category:"法令上の制限",question:"建築基準法の規定に関する次の記述のうち、正しいものはどれか。",choices:{1:"第一種低層住居専用地域内では、原則として住宅兼用店舗を建築できない",2:"建築物の延べ面積には、駐車場の用途に供する部分は算入されない",3:"日影規制は、第一種低層住居専用地域内の建築物には適用されない",4:"居室の採光に必要な窓等の開口部の面積は、居室の床面積に対し一定割合以上でなければならない"},answer:4,explanation:"居室には採光のために一定の割合以上の開口部を設ける必要がある（建築基準法28条）。住宅兼用店舗は第一種低層住居専用地域でも小規模なものは建築可能。日影規制は低層住居専用地域にも適用される。",keywords:["法令上の制限"]},
