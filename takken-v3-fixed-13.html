<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>宅建達人 AI Pro</title>
<style>
:root{
  --bg:#F7F9FC;--surface:#fff;--border:#E4E9F0;
  --primary:#2563EB;--green:#16A34A;--red:#DC2626;
  --amber:#D97706;--purple:#7C3AED;--teal:#0D9488;
  --text:#111827;--sub:#6B7280;--light:#9CA3AF;
  --font:'Hiragino Sans','Noto Sans JP','Yu Gothic',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;height:100dvh;display:flex;flex-direction:column;overflow:hidden;}

/* ログイン */
#loginWrap{position:fixed;inset:0;background:linear-gradient(160deg,#dbeafe,#eff6ff,#f0fdf4);display:flex;align-items:center;justify-content:center;padding:24px;z-index:9999;}
.login-box{width:100%;max-width:360px;background:rgba(255,255,255,.95);border-radius:28px;padding:32px 24px;box-shadow:0 12px 48px rgba(37,99,235,.15);text-align:center;}
.lfield{margin-bottom:12px;text-align:left;}
.lfield label{font-size:11px;font-weight:700;color:var(--sub);display:block;margin-bottom:5px;}
.lfield input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:12px;font-family:var(--font);font-size:15px;color:var(--text);outline:none;background:var(--bg);}
.lfield input:focus{border-color:var(--primary);}
.lerr{color:var(--red);font-size:12px;min-height:16px;margin-bottom:8px;text-align:center;}
.login-btn{width:100%;padding:14px;background:var(--primary);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:800;cursor:pointer;font-family:var(--font);}

/* 仮PW変更 */
#cpWrap{position:fixed;inset:0;background:var(--bg);display:none;align-items:center;justify-content:center;padding:24px;z-index:9998;}
.cp-box{width:100%;max-width:360px;background:#fff;border-radius:20px;padding:28px 24px;box-shadow:0 4px 24px rgba(0,0,0,.08);}

/* アプリ */
#appWrap{display:none;flex:1;flex-direction:column;overflow:hidden;}

/* ヘッダー */
.app-bar{background:var(--primary);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.app-bar-title{font-size:16px;font-weight:800;color:#fff;}
.app-bar-btn{background:rgba(255,255,255,.18);border:none;color:#fff;font-size:13px;font-weight:700;padding:6px 14px;border-radius:20px;cursor:pointer;}

/* タブ */
.tabbar{background:#fff;border-bottom:1px solid var(--border);display:flex;overflow-x:auto;flex-shrink:0;}
.tabbar::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;padding:11px 14px;font-size:12px;font-weight:700;color:var(--sub);border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;font-family:var(--font);white-space:nowrap;}
.tab.active{color:var(--primary);border-bottom-color:var(--primary);}

/* ペイン */
.main{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.pane{display:none;flex:1;overflow:hidden;flex-direction:column;}
.pane.active{display:flex;}

/* AI選択バー */
.ai-bar{padding:8px 12px;background:#fff;border-bottom:1px solid var(--border);display:flex;gap:6px;overflow-x:auto;flex-shrink:0;}
.ai-bar::-webkit-scrollbar{display:none;}
.ai-btn{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:#fff;color:var(--sub);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:var(--font);}
.ai-btn.active{color:#fff;border-color:transparent;}

/* チャット */
.msgs{flex:1;overflow-y:auto;padding:14px 14px;display:flex;flex-direction:column;gap:10px;}
.msg{display:flex;gap:8px;animation:mIn .2s ease;}
@keyframes mIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse;}
.avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;background:var(--border);}
.msg.user .avatar{background:var(--primary);color:#fff;font-size:13px;}
.bubble{max-width:86%;padding:11px 14px;border-radius:16px;font-size:14px;line-height:1.75;white-space:pre-wrap;word-break:break-word;}
.msg.bot .bubble{background:#fff;border:1px solid var(--border);}
.msg.user .bubble{background:var(--primary);color:#fff;border-radius:16px 4px 16px 16px;}
.typing span{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--sub);animation:td .9s infinite;margin:0 2px;}
.typing span:nth-child(2){animation-delay:.2s;}
.typing span:nth-child(3){animation-delay:.4s;}
@keyframes td{0%,80%,100%{transform:scale(.5);opacity:.3}40%{transform:scale(1);opacity:1}}

/* ステップバー */
.step-bar{padding:12px 14px;background:#fff;border:1px solid var(--border);border-radius:12px;font-size:13px;}
.step-row{display:flex;align-items:center;gap:8px;padding:3px 0;}
.sdot{width:22px;height:22px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;color:var(--sub);}
.sdot.done{background:var(--green);color:#fff;}
.sdot.spin{background:var(--primary);color:#fff;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}

/* 結果カード */
.res-card{background:#fff;border:1px solid var(--border);border-radius:14px;overflow:hidden;}
.res-step{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:center;cursor:pointer;}
.res-step-num{width:22px;height:22px;border-radius:50%;background:var(--primary);color:#fff;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.res-body{padding:12px 14px;border-bottom:1px solid var(--border);display:none;font-size:13px;line-height:1.8;color:var(--text);}
.res-body.open{display:block;}
.res-final{padding:14px;font-size:14px;line-height:1.85;color:var(--text);}
.res-final h2,.res-final h3{color:var(--primary);font-size:15px;margin:12px 0 5px;}
.rchips{display:flex;flex-wrap:wrap;gap:6px;padding:10px 14px;border-top:1px solid var(--border);}
.rchip{padding:5px 11px;border-radius:14px;background:#EFF6FF;border:1px solid #BFDBFE;color:var(--primary);font-size:12px;font-weight:600;cursor:pointer;}

/* クイックボタン */
.quick-wrap{padding:7px 12px;background:#fff;border-top:1px solid var(--border);display:flex;gap:6px;overflow-x:auto;flex-shrink:0;}
.quick-wrap::-webkit-scrollbar{display:none;}
.qbtn{padding:5px 12px;border-radius:14px;border:1.5px solid var(--border);background:#fff;color:var(--sub);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:var(--font);}

/* 入力バー */
.inp-bar{padding:9px 12px;background:#fff;border-top:1px solid var(--border);display:flex;gap:8px;align-items:flex-end;flex-shrink:0;}
.inp-ta{flex:1;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;padding:10px 13px;font-size:15px;resize:none;outline:none;max-height:100px;min-height:44px;font-family:var(--font);line-height:1.5;color:var(--text);}
.inp-ta:focus{border-color:var(--primary);}
.send-btn{width:44px;height:44px;border-radius:12px;border:none;background:var(--primary);color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.send-btn:disabled{background:var(--border);}

/* 収集ペイン */
.scroll-pane{flex:1;overflow-y:auto;padding:14px;}
.card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:12px;}
.card-title{font-size:13px;font-weight:700;color:var(--sub);margin-bottom:10px;}
.method-card{border:2px solid var(--border);border-radius:12px;padding:12px 14px;cursor:pointer;transition:all .15s;margin-bottom:8px;}
.method-card.sel{border-color:var(--primary);background:#EFF6FF;}
.year-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.ybtn{padding:8px 4px;border-radius:10px;border:1.5px solid var(--border);background:#fff;color:var(--sub);font-size:13px;font-weight:700;cursor:pointer;text-align:center;font-family:var(--font);}
.ybtn.sel{background:var(--primary);color:#fff;border-color:var(--primary);}
.big-btn{width:100%;padding:15px;border-radius:12px;border:none;font-size:16px;font-weight:800;cursor:pointer;font-family:var(--font);color:#fff;background:var(--primary);}
.big-btn:disabled{background:var(--border);color:var(--light);cursor:not-allowed;}
.log-area{background:var(--bg);border-radius:10px;padding:10px 12px;font-size:12px;line-height:1.9;max-height:200px;overflow-y:auto;}
.log-ok{color:var(--green);}
.log-err{color:var(--red);}
progress{width:100%;height:7px;border-radius:4px;border:none;accent-color:var(--primary);}

/* 問題カード */
.q-card{background:#fff;border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:10px;}
.q-head{padding:13px 15px;cursor:pointer;display:flex;gap:10px;align-items:flex-start;}
.chip{display:inline-block;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:700;margin-right:4px;}
.q-body{display:none;padding:0 15px 14px;border-top:1px solid var(--border);}
.q-body.open{display:block;}
.choice{padding:11px 12px;border-radius:10px;border:2px solid var(--border);font-size:13px;line-height:1.7;margin-bottom:7px;display:flex;gap:8px;cursor:pointer;}
.choice.correct{border-color:var(--green);background:#F0FDF4;color:var(--green);}
.choice.wrong{border-color:var(--red);background:#FEF2F2;color:var(--red);opacity:.45;}
.choice.dimmed{opacity:.35;}
.choice-num{width:22px;height:22px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;color:var(--sub);}
.choice.correct .choice-num{background:var(--green);color:#fff;}
.choice.wrong .choice-num{background:var(--red);color:#fff;}
.expl{background:#EFF6FF;border-left:4px solid var(--primary);border-radius:10px;padding:12px;margin-top:8px;font-size:13px;line-height:1.8;color:var(--text);}
.expl-title{font-size:12px;font-weight:700;color:var(--primary);margin-bottom:5px;}

/* 正文ペイン */
.seibun-main{flex:1;overflow-y:auto;padding:16px 14px;}
.seibun-text{background:#fff;border:2px solid #86EFAC;border-radius:18px;padding:24px 18px;font-size:18px;font-weight:500;line-height:2.0;color:var(--text);letter-spacing:.02em;}
.seibun-nav{padding:12px 14px;background:#fff;border-top:1px solid var(--border);display:flex;gap:10px;flex-shrink:0;}

/* 管理モーダル */
#adminModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9990;align-items:center;justify-content:center;padding:16px;}
.admin-inner{background:#fff;border-radius:20px;padding:22px;width:min(440px,100%);max-height:90dvh;overflow-y:auto;}
.afield{margin-bottom:10px;}
.afield label{display:block;font-size:11px;font-weight:700;color:var(--sub);margin-bottom:4px;}
.ainp{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:9px;font-size:15px;background:#fff;font-family:var(--font);outline:none;color:var(--text);}
.ainp:focus{border-color:var(--primary);}
.user-item{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:var(--bg);border-radius:9px;margin-bottom:6px;}
</style>
</head>
<body>

<!-- ══ Firebase ══ -->
<script type="module">
import { initializeApp }   from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged, updatePassword }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, getDocs, deleteDoc, query, orderBy, serverTimestamp }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const app  = initializeApp({
  apiKey:"AIzaSyCVk2miG5TK1ffTofXLh0hHgeSbOvmIgZ8",
  authDomain:"kensetsu-nippo-842a2.firebaseapp.com",
  projectId:"kensetsu-nippo-842a2",
  storageBucket:"kensetsu-nippo-842a2.firebasestorage.app",
  messagingSenderId:"702880974315",
  appId:"1:702880974315:web:985321dc9180046629c5ae"
});
const auth = getAuth(app);
const db   = getFirestore(app);

// ── Functions ──
const FUNC_BASE = (location.hostname==='localhost'||location.hostname==='127.0.0.1')
  ? 'http://localhost:5001/kensetsu-nippo-842a2/us-central1'
  : 'https://us-central1-kensetsu-nippo-842a2.cloudfunctions.net';
window._FUNC = FUNC_BASE;

// ── Firestore ショートカット ──
window._db  = db;
window._doc = (path,...args) => doc(db, path, ...args);
window._col = (path) => collection(db, path);
window._set = setDoc; window._get = getDoc; window._gets = getDocs;
window._del = deleteDoc; window._upd = updateDoc;
window._ts  = serverTimestamp; window._ord = orderBy; window._q = query;

// ── Auth ──
window.doLogin = async function(){
  const e=document.getElementById('lemail').value.trim();
  const p=document.getElementById('lpass').value;
  const err=document.getElementById('lerr');
  err.textContent='';
  if(!e||!p){err.textContent='入力してください';return;}
  document.getElementById('lbtn').disabled=true;
  try{ await signInWithEmailAndPassword(auth,e,p); }
  catch(ex){
    err.textContent={'auth/invalid-credential':'メールまたはパスワードが違います','auth/too-many-requests':'しばらく待ってください'}[ex.code]||'ログイン失敗';
    document.getElementById('lbtn').disabled=false;
  }
};
window.doLogout = ()=>signOut(auth);
window.togglePV = id=>{ const el=document.getElementById(id); el.type=el.type==='password'?'text':'password'; };

onAuthStateChanged(auth, async user=>{
  if(!user){ showLogin(); return; }
  window._uid=user.uid;
  try{
    const snap=await getDoc(doc(db,'users',user.uid));
    if(!snap.exists()){ await signOut(auth); document.getElementById('lerr').textContent='登録されていません'; return; }
    const ud=snap.data();
    window._isAdmin=!!ud.isAdmin;
    if(ud.mustChangePassword){ showCP(); return; }
  }catch(ex){ console.error(ex); }
  showApp();
});

window.doCP = async function(){
  const np=document.getElementById('cpnp').value;
  const np2=document.getElementById('cpnp2').value;
  const err=document.getElementById('cperr');
  err.textContent='';
  if(np.length<6){err.textContent='6文字以上';return;}
  if(np!==np2){err.textContent='パスワードが一致しません';return;}
  try{
    await updatePassword(auth.currentUser,np);
    await updateDoc(doc(db,'users',auth.currentUser.uid),{mustChangePassword:false});
    showApp();
  }catch(ex){err.textContent='変更失敗: '+ex.message;}
};

// 管理：ユーザー追加
window.addUser = async function(){
  const name=document.getElementById('aname').value.trim();
  const email=document.getElementById('aemail').value.trim();
  const pass=document.getElementById('apass').value;
  const err=document.getElementById('aerr');
  err.style.color='var(--red)'; err.textContent='';
  if(!name||!email||pass.length<6){err.textContent='全項目を正しく入力してください';return;}
  document.getElementById('aaddbtn').disabled=true;
  try{
    const c=await createUserWithEmailAndPassword(auth,email,pass);
    await setDoc(doc(db,'users',c.user.uid),{uid:c.user.uid,name,email,isAdmin:false,mustChangePassword:true,createdAt:serverTimestamp()});
    err.style.color='var(--green)'; err.textContent='✅ '+name+' を登録しました';
    ['aname','aemail','apass'].forEach(id=>document.getElementById(id).value='');
    loadUsers();
  }catch(ex){
    err.textContent={'auth/email-already-in-use':'このメールは登録済みです'}[ex.code]||ex.message;
  }
  document.getElementById('aaddbtn').disabled=false;
};
window.genPass = ()=>{ let c='ABCDEFGHJKMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789!@#',p=''; for(let i=0;i<10;i++)p+=c[Math.floor(Math.random()*c.length)]; document.getElementById('apass').value=p; };
window.loadUsers = async function(){
  const el=document.getElementById('userList'); el.innerHTML='読み込み中...';
  try{
    const snap=await getDocs(query(collection(db,'users'),orderBy('name')));
    if(snap.empty){el.innerHTML='<div style="color:var(--light);font-size:13px;">ユーザーなし</div>';return;}
    el.innerHTML=snap.docs.map(d=>{
      const u=d.data();
      return `<div class="user-item">
        <div><div style="font-weight:700;font-size:13px;">${u.name||'(なし)'}${u.isAdmin?'<span style="background:var(--amber);color:#fff;font-size:10px;padding:1px 6px;border-radius:4px;margin-left:4px;">管理者</span>':''}</div>
        <div style="font-size:11px;color:var(--sub);">${u.email||d.id}${u.mustChangePassword?'<span style="background:#FEF3C7;color:var(--amber);font-size:10px;padding:1px 5px;border-radius:4px;margin-left:4px;">仮PW</span>':''}</div></div>
        <button onclick="delUser('${d.id}')" style="background:#FEF2F2;border:1px solid #FECACA;color:var(--red);border-radius:7px;padding:4px 10px;font-size:11px;cursor:pointer;">削除</button>
      </div>`;
    }).join('');
  }catch(ex){el.innerHTML='<div style="color:var(--red);font-size:12px;">'+ex.message+'</div>';}
};
window.delUser = async(uid)=>{
  if(!confirm('このユーザーを削除しますか？'))return;
  try{ await deleteDoc(doc(db,'users',uid)); loadUsers(); }catch(ex){alert(ex.message);}
};
</script>

<!-- ══ ログイン画面 ══ -->
<div id="loginWrap">
  <div class="login-box">
    <div style="font-size:56px;margin-bottom:8px;">🏛️</div>
    <div style="font-size:22px;font-weight:800;color:var(--primary);margin-bottom:4px;">宅建達人 AI</div>
    <div style="font-size:12px;color:var(--sub);margin-bottom:22px;">3AI構成 × 3回深掘り</div>
    <div class="lfield"><label>メール</label><input type="email" id="lemail" placeholder="example@email.com" autocomplete="email" onkeydown="if(event.key==='Enter')document.getElementById('lpass').focus()"></div>
    <div class="lfield"><label>パスワード</label>
      <div style="position:relative;"><input type="password" id="lpass" placeholder="パスワード" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()" style="width:100%;padding:12px 44px 12px 14px;border:1.5px solid var(--border);border-radius:12px;font-size:15px;outline:none;font-family:var(--font);">
      <button onclick="togglePV('lpass')" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:16px;cursor:pointer;color:var(--light);">👁</button></div>
    </div>
    <div class="lerr" id="lerr"></div>
    <button class="login-btn" id="lbtn" onclick="doLogin()">🔑 ログイン</button>
  </div>
</div>

<!-- ══ 仮PW変更 ══ -->
<div id="cpWrap" style="position:fixed;inset:0;background:var(--bg);display:none;align-items:center;justify-content:center;padding:24px;z-index:9998;">
  <div class="cp-box">
    <div style="font-size:18px;font-weight:800;color:var(--primary);text-align:center;margin-bottom:6px;">🔐 パスワード変更</div>
    <div style="font-size:13px;color:var(--sub);text-align:center;margin-bottom:18px;">初回ログインです。新しいパスワードを設定してください。</div>
    <div class="lfield"><label>新しいパスワード（6文字以上）</label><input type="password" id="cpnp" placeholder="新しいパスワード"></div>
    <div class="lfield"><label>確認</label><input type="password" id="cpnp2" placeholder="もう一度入力" onkeydown="if(event.key==='Enter')doCP()"></div>
    <div class="lerr" id="cperr"></div>
    <button class="login-btn" onclick="doCP()">✅ 変更して開始</button>
  </div>
</div>

<!-- ══ 管理モーダル ══ -->
<div id="adminModal">
  <div class="admin-inner">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h2 style="font-size:17px;font-weight:800;">👤 ユーザー管理</h2>
      <button onclick="closeAdmin()" style="background:none;border:none;font-size:22px;cursor:pointer;color:var(--light);">✕</button>
    </div>
    <div class="card">
      <div class="card-title">➕ 新規登録</div>
      <div class="afield"><label>表示名</label><input type="text" id="aname" class="ainp" placeholder="山田 太郎"></div>
      <div class="afield"><label>メール</label><input type="email" id="aemail" class="ainp" placeholder="example@email.com"></div>
      <div class="afield"><label>仮パスワード</label>
        <div style="position:relative;"><input type="text" id="apass" class="ainp" placeholder="自動生成推奨" style="padding-right:70px;">
        <button onclick="genPass()" style="position:absolute;right:6px;top:50%;transform:translateY(-50%);background:var(--primary);color:#fff;border:none;border-radius:6px;padding:4px 9px;font-size:11px;cursor:pointer;">生成</button></div>
      </div>
      <div class="lerr" id="aerr" style="text-align:left;"></div>
      <button class="big-btn" id="aaddbtn" onclick="addUser()">登録する</button>
    </div>

async function callAI(prompt, useSearch=false, mediaContents=[]){
  var body={prompt, model:'gemini-2.5-flash', mode:'normal', useSearch};
  if(mediaContents.length>0) body.mediaContents=mediaContents;
  var r=await fetch(window._FUNC+'/askAI',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-access-key':'HeartsHouse2026Key'},
    body:JSON.stringify(body)
  });
  if(!r.ok) throw new Error('HTTP '+r.status);
  var d=await r.json();
  return d?.data?.text||d?.candidates?.[0]?.content?.parts?.[0]?.text||d?.text||'応答なし';
}

function parseJ(raw){
  try{
    var c=raw.replace(/```json\s*/g,'').replace(/```\s*/g,'').trim();
    var m=c.match(/(\[[\s\S]+\]|\{[\s\S]+\})/);
    if(m) return JSON.parse(m[1]);
  }catch(e){}
  return null;
}

async function deepSearch(question, aiKey){
  var sys=AI_DEF[aiKey].sys;
  if(qCtx) sys+='\n\n【学習中の問題】\n'+qCtx;
  var prompt=sys+'\n\n【質問】'+question+'\n\n以下の構成で回答してください：\n## ✅ 結論\n## 📖 詳細解説（法令根拠・条文番号付き）\n## ⚠️ 試験のポイント（数値・例外・ひっかけ）\n## 📝 確認一問一答（3問・解説付き）';
  var answer=await callAI(prompt,true,[]);
  return {
    question:question,
    steps:[{step:1,label:'解説',content:answer}],
    finalAnswer:answer,
    relatedQ:[]
  };
}

function parseDives(text){
  var dives=[],clean=[];
  text.split('\n').forEach(l=>{var m=l.match(/^DEEPDIVE_[123]:\s*(.+)/);if(m)dives.push(m[1].trim());else clean.push(l);});
  return{text:clean.join('\n').trim(),dives};
}
function parseRelated(text){
  var related=[];
  text.split('\n').forEach(l=>{var m=l.match(/関連.*?[：:]\s*(.+)/);if(m)related.push(m[1].trim());});
  return{text,related:related.slice(0,3)};
}

  sw('chat');
  setQCtx(q);
  curAI='master';
  setAI('master');
  send('この問題の①正解の法令根拠（条文番号付き）②各誤り肢の解説③ひっかけポイント④関連事項 を教えてください。');
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function md2h(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/^## (.+)$/gm,'<h2>$1</h2>').replace(/^### (.+)$/gm,'<h3>$1</h3>').replace(/\n/g,'<br>');}

function setYear(y){

function onPdf(input){
  var f=input.files[0];if(!f)return;
  document.getElementById('pdfName').textContent='選択: '+f.name;
  var r=new FileReader();r.onload=e=>collectPdfB64=e.target.result.split(',')[1];r.readAsDataURL(f);
}
function parseNos(str){
  var nos=[];str.split(',').forEach(p=>{p=p.trim();var m=p.match(/^(\d+)-(\d+)$/);
    if(m){for(var i=+m[1];i<=+m[2];i++)nos.push(i);}else if(/^\d+$/.test(p))nos.push(+p);});
  return nos;
}

async function saveQ(q){
  var id=q.year+'_'+String(q.no).padStart(2,'0');
  await window._set(window._doc('takken_questions',id),{...q,id,updatedAt:window._ts()});
  return id;
}

// 各収集方法
var JSON_FMT='以下のJSON配列形式のみで回答（前後テキスト不要）：\n[{"year":年度数値,"no":問番号数値,"category":"権利関係|宅建業法|法令上の制限|税・その他","question":"問題文全文","choices":{"1":"","2":"","3":"","4":""},"answer":正解番号,"explanation":"解説","keywords":[]}]';

async function collectB(year,onLog){
  onLog('📡 '+year+'年 全50問を一括検索中...','');
  var raw=await callAI(AI_DEF.collector.sys+'\n\nGoogle検索で宅建試験'+year+'年の本試験全50問を調べてください。\n'+JSON_FMT,true);
  var qs=parseJ(raw);
  if(!qs||!Array.isArray(qs))throw new Error('JSON解析失敗。再試行してください。');
  return qs.map(q=>({...q,year:+year,source:'bulk'}));
}

async function collectE(year,onLog){
  onLog('📡 '+year+'年 前半25問を検索中...','');
  var r1=await callAI(AI_DEF.collector.sys+'\n\nGoogle検索で宅建試験'+year+'年 問1〜問25を調べてください。\n'+JSON_FMT,true);
  var q1=parseJ(r1)||[];
  onLog('📡 '+year+'年 後半25問を検索中...','');
  var r2=await callAI(AI_DEF.collector.sys+'\n\nGoogle検索で宅建試験'+year+'年 問26〜問50を調べてください。\n'+JSON_FMT,true);
  var q2=parseJ(r2)||[];
  return [...q1,...q2].map(q=>({...q,year:+year,source:'split'}));
}

async function collectC(year,no,onLog){
  onLog('🔍 '+year+'年 問'+no+' STEP1：問題文取得...','');
  var s1=await callAI(AI_DEF.collector.sys+'\n\nGoogle検索で宅建試験'+year+'年 問'+no+'の問題文と選択肢を調べてください。\n{"year":'+year+',"no":'+no+',"category":"分野","question":"問題文","choices":{"1":"","2":"","3":"","4":""}}',true);
  var q1=parseJ(s1);if(!q1)throw new Error('問題取得失敗');
  onLog('🔍 '+year+'年 問'+no+' STEP2：正解を複数ソースで確認...','');
  var s2=await callAI('宅建試験'+year+'年 問'+no+'の正解番号を複数サイトで確認してください。\n問題文：'+(q1.question||'')+'\n\n正解番号のみ返してください：ANSWER:数値',true);
  var am=s2.match(/ANSWER[：:]\s*([1-4])/);var ans=am?+am[1]:(q1.answer||1);
  onLog('🔍 '+year+'年 問'+no+' STEP3：解説を強化中...','');
  var s3=await callAI(AI_DEF.master.sys+'\n\n宅建試験'+year+'年 問'+no+'（正解：肢'+ans+'）について①正解の法令根拠 ②各誤り肢の解説 ③ひっかけポイント を詳しく解説してください。',true);
  return{...q1,year:+year,no:+no,answer:ans,explanation:s3.trim(),source:'deep'};
}

async function collectA(year,no,onLog){
  onLog('🔗 '+year+'年 問'+no+' URL解析中...','');
  var url='https://takken-siken.com/kakomon/'+year+'/'+String(no).padStart(2,'0')+'.html';
  var raw=await callAI(AI_DEF.collector.sys+'\n\nGoogle検索でこのURLの宅建過去問を調べてJSON形式で返してください。\nURL: '+url+'\n{"year":'+year+',"no":'+no+',"category":"分野","question":"問題文","choices":{"1":"","2":"","3":"","4":""},"answer":正解番号,"explanation":"解説","keywords":[]}',true);
  var q=parseJ(raw);if(!q)throw new Error('URL解析失敗');
  return{...q,year:+year,no:+no,source:'url'};
}

async function collectD(pdfB64,year,onLog){
  onLog('📄 PDFを解析中（全問一括抽出）...','');
  var raw=await callAI(AI_DEF.collector.sys+'\n\nこのPDFは宅建試験'+year+'年の本試験問題です。全問題を以下のJSON配列で抽出してください。\n'+JSON_FMT,false,[{inlineData:{mimeType:'application/pdf',data:pdfB64}}]);
  var qs=parseJ(raw);if(!qs||!Array.isArray(qs))throw new Error('PDF解析失敗');
  return qs.map(q=>({...q,year:+year,source:'pdf'}));
}

async function runCollect(){
  if(collectBusy)return;
  if(!window._db){alert('Firebase未接続');return;}
  collectBusy=true;
  var btn=document.getElementById('runBtn');btn.disabled=true;btn.textContent='収集中...';
  var logWrap=document.getElementById('logWrap');logWrap.style.display='block';
  var logEl=document.getElementById('collectLog');logEl.innerHTML='';
  var prog=document.getElementById('collectProg');var progLbl=document.getElementById('progLabel');
  prog.value=0;

  function onLog(msg,type){
    var d=document.createElement('div');
    d.className=type==='ok'?'log-ok':type==='err'?'log-err':'';
    d.textContent=msg;logEl.appendChild(d);logEl.scrollTop=logEl.scrollHeight;
  }

  try{
    var questions=[];
    if(collectMethod==='B'){
      questions=await collectB(collectYear,onLog);
    }else if(collectMethod==='E'){
      questions=await collectE(collectYear,onLog);
    }else if(collectMethod==='D'){
      if(!collectPdfB64){alert('PDFを選択してください');collectBusy=false;btn.disabled=false;btn.textContent='🚀 収集スタート';return;}
      questions=await collectD(collectPdfB64,collectYear,onLog);
    }else if(collectMethod==='A'){
      var nos=parseNos(collectNos||'1-10');
      for(var i=0;i<nos.length;i++){
        try{questions.push(await collectA(collectYear,nos[i],onLog));}catch(e){onLog('❌ 問'+nos[i]+': '+e.message,'err');}
        prog.value=Math.round((i+1)/nos.length*50);progLbl.textContent=Math.round((i+1)/nos.length*50)+'%';
        await new Promise(r=>setTimeout(r,800));
      }
    }else if(collectMethod==='C'){
      var nos=parseNos(collectNos||'1-5');
      for(var i=0;i<nos.length;i++){
        try{questions.push(await collectC(collectYear,nos[i],onLog));}catch(e){onLog('❌ 問'+nos[i]+': '+e.message,'err');}
        prog.value=Math.round((i+1)/nos.length*50);progLbl.textContent=Math.round((i+1)/nos.length*50)+'%';
        await new Promise(r=>setTimeout(r,500));
      }
    }

    if(questions.length>0){
      onLog('💾 Firestoreに保存中... ('+questions.length+'問)','');
      var saved=0;
      for(var i=0;i<questions.length;i++){
        try{await saveQ(questions[i]);saved++;prog.value=50+Math.round((i+1)/questions.length*50);progLbl.textContent=(50+Math.round((i+1)/questions.length*50))+'%';}
        catch(e){onLog('保存エラー 問'+questions[i].no+': '+e.message,'err');}
      }
      onLog('✅ 完了！ '+saved+'問保存しました。','ok');
      prog.value=100;progLbl.textContent='100%';
      allQ=[...allQ,...questions.filter(q=>!allQ.find(e=>e.year===q.year&&e.no===q.no))];
      updateFsCount();
    }else{
      onLog('⚠️ 取得問題0件。方法を変えて再試行してください。','err');
    }
  }catch(e){onLog('❌ 収集エラー: '+e.message,'err');}
  collectBusy=false;btn.disabled=false;btn.textContent='🚀 もう一度収集';
}

function setQM(m){
  quizMode=m;
  document.querySelectorAll('.ai-btn[data-qm]').forEach(function(b){
    var on=b.dataset.qm===m;b.classList.toggle('active',on);

  });

function updateQuizCnt(){var n=filterQ(quizF).length;var el=document.getElementById('quizCnt');if(el)el.textContent=n;}

function startQuiz(){
  var qs=filterQ(quizF);if(!qs.length)return;
  if(quizMode==='random') qs=qs.sort(()=>Math.random()-.5).slice(0,20);
  else if(quizMode==='exam') qs=qs.sort(()=>Math.random()-.5).slice(0,50);
  else qs=qs.sort((a,b)=>b.year-a.year||a.no-b.no);
  quizState={qs,cur:0,ans:{},finished:false};
  document.getElementById('quizStart').style.display='none';
  var qa=document.getElementById('quizArea');qa.style.display='block';
  renderQCard();
}

function renderQCard(){
  var qa=document.getElementById('quizArea');if(!qa||!quizState)return;
  if(quizState.finished){renderResult(qa);return;}
  var q=quizState.qs[quizState.cur];
  var ua=quizState.ans[quizState.cur];
  var hasA=ua!==undefined;
  var isRev=quizMode==='reveal';
  var pct=Math.round((quizState.cur+1)/quizState.qs.length*100);

  var html='<div style="height:5px;background:var(--border);border-radius:3px;margin-bottom:10px;">'
    +'<div style="height:100%;width:'+pct+'%;background:var(--primary);border-radius:3px;transition:width .3s;"></div></div>'
    +'<div style="text-align:right;font-size:12px;color:var(--sub);margin-bottom:10px;">'+(quizState.cur+1)+'/'+quizState.qs.length+'</div>'
    +'<div style="margin-bottom:10px;">'
    +'<span class="chip" style="background:#FEF3C7;color:var(--amber);">'+q.year+'年</span>'
    +'<span class="chip" style="background:#EFF6FF;color:var(--primary);">'+q.category+'</span>'
    +'<span class="chip" style="background:#F5F3FF;color:var(--purple);">問'+q.no+'</span>'
    +(q.source?'<span class="chip" style="background:#F5F3FF;color:var(--purple);">AI</span>':'<span class="chip" style="background:#F0FDF4;color:var(--green);">本物</span>')
    +'</div>'
    +'<div style="background:#fff;border:1px solid var(--border);border-radius:12px;padding:15px;margin-bottom:12px;font-size:14px;line-height:1.8;color:var(--text);white-space:pre-wrap;">'+esc(q.question)+'</div>'
    +'<div>';

  [1,2,3,4].forEach(function(n){
    var isCor=n===q.answer,isU=n===ua,isW=isU&&!isCor;
    var isWQ=q.question&&(q.question.indexOf('誤っている')>=0||q.question.indexOf('誤りはどれか')>=0);
    var smoked=quizMode==='smoke'&&(isWQ?isCor:!isCor);
    var seibunHide=quizMode==='seibun_only'&&!hasA&&(isWQ?isCor:!isCor);
    if(smoked&&!hasA){
      html+='<div class="choice" style="background:#1a0a2e;border-color:#3d1f6e;cursor:not-allowed;opacity:.5"><div class="choice-num" style="background:#3d1f6e;color:#7c3aed">🔥</div><span style="color:#4a3060;font-size:13px">誤文（スモーク済み）</span></div>';
      return;
    }
    if(seibunHide){return;}
    if(quizMode==='seibun_only'&&!hasA&&(isWQ?!isCor:isCor)){
      html+='<div class="choice correct" style="border:2px solid #059669"><div class="choice-num" style="background:#059669;color:#fff">✓</div><span>'+esc(q.choices[n])+'</span><span style="margin-left:auto;font-size:10px;background:#059669;color:#fff;padding:2px 7px;border-radius:6px;flex-shrink:0">正文</span></div>';
      return;
    }
    if(smoked&&hasA){
      html+='<div class="choice wrong" style="background:#1a0505;border-color:#7f1d1d;opacity:.55"><div class="choice-num" style="background:#7f1d1d;color:#fca5a5">🔥</div><span style="text-decoration:line-through;color:#7f1d1d;font-size:13px">'+esc(q.choices[n])+'</span></div>';
      return;
    }
    var cls='choice';
    if(isRev||quizMode==='reveal'){cls+=isCor?' correct':isW?' wrong':' dimmed';}
    else if(hasA){cls+=isCor?' correct':isW?' wrong':'';}
    var onclick=!hasA?'onclick="ansQ('+n+')"':'';
    html+='<div class="'+cls+'" '+onclick+'><div class="choice-num">'+(isCor&&(hasA||isRev)?'✓':isW?'✗':n)+'</div><span>'+esc(q.choices[n])+'</span>'
      +(isCor&&(hasA||isRev)?'<span style="margin-left:auto;font-size:10px;background:var(--green);color:#fff;padding:2px 7px;border-radius:6px;flex-shrink:0">正解</span>':'')
      +'</div>';
  });
  html+='</div>';

  if(!hasA&&isRev)html+='<div style="margin-top:8px;padding:9px 12px;background:#F0FDF4;border-radius:9px;font-size:12px;color:var(--green);">💡 緑が正解です。選ぶと解説が表示されます</div>';

  if(hasA){
    html+='<div class="expl"><div class="expl-title">📖 解説</div>'+esc(q.explanation)+'</div>'
      +'<div style="display:flex;gap:8px;margin-top:10px;">'
      +'<button data-qid="'+storeQ(q)+'" onclick="askQ(this.dataset.qid)" style="flex:1;padding:11px;border-radius:10px;border:2px solid var(--primary);background:#EFF6FF;color:var(--primary);font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);">🤖 AIに聞く</button>'
      +'<button onclick="nextQ()" style="flex:2;padding:11px;border-radius:10px;border:none;background:var(--primary);color:#fff;font-size:14px;font-weight:800;cursor:pointer;font-family:var(--font);">'
      +(quizState.cur+1>=quizState.qs.length?'結果を見る 📊':'次の問題 →')+'</button>'
      +'</div>';
  }
  qa.innerHTML=html;qa.scrollTop=0;
}

function ansQ(n){
  if(!quizState||quizState.ans[quizState.cur]!==undefined)return;
  quizState.ans[quizState.cur]=n;
  renderQCard();
  // 統計保存
  if(window._db&&window._uid){
    var q=quizState.qs[quizState.cur];
    var id=window._uid+'_'+q.year+'_'+q.no+'_'+Date.now();
    window._set(window._doc('takken_stats',id),{uid:window._uid,year:q.year,no:q.no,category:q.category,correct:n===q.answer,answeredAt:window._ts()});
  }

  if(quizMode==='seibun_only'||quizMode==='smoke'){setTimeout(function(){if(quizState&&!quizState.finished)nextQ();},1800);}
}
function nextQ(){
  if(!quizState)return;
  var n=quizState.cur+1;
  if(n>=quizState.qs.length){quizState.finished=true;renderQCard();return;}
  quizState.cur=n;renderQCard();
}
function renderResult(el){
  var qs=quizState.qs,ans=quizState.ans;
  var score=qs.reduce((a,q,i)=>a+(ans[i]===q.answer?1:0),0);
  var pct=Math.round(score/qs.length*100);
  var g=pct>=80?{l:'合格圏',c:'var(--green)',b:'#F0FDF4'}:pct>=60?{l:'もう少し',c:'var(--amber)',b:'#FFFBEB'}:{l:'要復習',c:'var(--red)',b:'#FEF2F2'};
  el.innerHTML='<div class="card" style="text-align:center;padding:24px;">'
    +'<div style="font-size:52px;font-weight:800;color:'+g.c+';line-height:1;">'+score+'</div>'
    +'<div style="font-size:15px;color:var(--sub);margin-bottom:6px;">/ '+qs.length+' 問正解</div>'
    +'<div style="font-size:26px;font-weight:800;color:'+g.c+';">'+pct+'%</div>'
    +'<div style="display:inline-block;margin-top:8px;padding:5px 18px;background:'+g.b+';border-radius:18px;font-size:14px;font-weight:700;color:'+g.c+';">'+g.l+'</div></div>'
    +'<div style="display:flex;flex-direction:column;gap:7px;margin-bottom:12px;">'
    +qs.map((q,i)=>{var ok=ans[i]===q.answer;return '<div style="background:#fff;border:1px solid var(--border);border-left:4px solid '+(ok?'var(--green)':'var(--red)')+';border-radius:9px;padding:10px 13px;display:flex;align-items:center;gap:8px;">'
      +'<span>'+(ok?'✅':'❌')+'</span><div style="flex:1;"><div style="font-size:12px;font-weight:700;">'+q.year+'年 問'+q.no+'</div><div style="font-size:11px;color:var(--sub);">'+q.category+'</div></div>'
      +(!ok?'<div style="font-size:11px;text-align:right;"><div>正解：<strong style="color:var(--green);">'+q.answer+'</strong></div><div>回答：<strong style="color:var(--red);">'+(ans[i]||'未')+'</strong></div></div>':'')+'</div>';}).join('')
    +'</div>'
    +'<div style="display:flex;gap:10px;">'
    +'<button onclick="resetQuiz()" style="flex:1;padding:14px;border-radius:12px;border:2px solid var(--border);background:#fff;color:var(--text);font-size:15px;font-weight:700;cursor:pointer;font-family:var(--font);">← やり直す</button>'
    +'<button onclick="askWeak()" style="flex:2;padding:14px;border-radius:12px;border:none;background:var(--primary);color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--font);">🤖 AIに解説</button>'
    +'</div>';
}
function resetQuiz(){
  quizState=null;
  document.getElementById('quizStart').style.display='block';
  document.getElementById('quizArea').style.display='none';
  document.getElementById('quizArea').innerHTML='';
}
function askWeak(){
  if(!quizState)return;
  var wrong=quizState.qs.filter((q,i)=>quizState.ans[i]!==q.answer);
  var msg=wrong.length===0?'全問正解でした！🎉':
    '以下の問題を間違えました。解説してください。\n'+wrong.map(q=>'・'+q.year+'年 問'+q.no+'（'+q.category+'）').join('\n');
  curAI='master';sw('chat');send(msg);
}

function initSeibun(){
  makeFilter('seibunFilterBar',seibunF,'cat','setSeibunCat');
  buildSeibun();
}
function setSeibunCat(c){seibunF.cat=c;makeFilter('seibunFilterBar',seibunF,'cat','setSeibunCat');buildSeibun();}
function buildSeibun(){
  var qs=filterQ(seibunF).filter(q=>q.choices&&q.choices[q.answer]).sort(()=>Math.random()-.5);
  seibunList=qs.map(q=>({text:q.choices[q.answer],q}));seibunIdx=0;renderSeibun();
}
function seibunNav(d){
  seibunIdx=Math.max(0,Math.min(seibunList.length-1,seibunIdx+d));renderSeibun();
}
function renderSeibun(){
  var el=document.getElementById('seibunMain');if(!el||!seibunList.length){el.innerHTML='<div style="padding:40px;text-align:center;color:var(--light);">問題がありません</div>';return;}
  var item=seibunList[seibunIdx];var pct=Math.round((seibunIdx+1)/seibunList.length*100);
  document.getElementById('seibunPos').textContent=(seibunIdx+1)+'/'+seibunList.length;
  document.getElementById('seibunProg').style.width=pct+'%';
  document.getElementById('seibunBack').disabled=seibunIdx===0;
  document.getElementById('seibunBack').style.color=seibunIdx===0?'var(--light)':'var(--sub)';
  document.getElementById('seibunNext').textContent=seibunIdx>=seibunList.length-1?'✅ 完了！':'次へ →';
  document.getElementById('seibunNext').disabled=seibunIdx>=seibunList.length-1;

  el.innerHTML='<div style="margin-bottom:12px;display:flex;gap:6px;flex-wrap:wrap;">'
    +'<span class="chip" style="background:#DCFCE7;color:var(--green);">'+item.q.year+'年 問'+item.q.no+'</span>'
    +'<span class="chip" style="background:#DCFCE7;color:var(--green);">'+item.q.category+'</span>'
    +'<span class="chip" style="background:#DCFCE7;color:var(--green);">肢'+item.q.answer+'（正解）</span>'
    +'</div>'
    +'<div class="seibun-text">'+esc(item.text)+'</div>'
    +'<div style="background:#F0FDF4;border-radius:12px;padding:12px 14px;margin-top:12px;">'
    +'<div onclick="var b=document.getElementById(\'sqbody\');b.style.display=b.style.display===\'none\'?\'block\':\'none\';" style="font-size:12px;font-weight:700;color:var(--green);cursor:pointer;display:flex;justify-content:space-between;"><span>📋 問題文を見る</span><span>▼</span></div>'
    +'<div id="sqbody" style="display:none;font-size:13px;color:var(--sub);line-height:1.8;margin-top:7px;">'+esc(item.q.question)+'</div>'
    +'</div>'
    +'<button onclick="askQ(storeQ(item.q))" style="width:100%;margin-top:10px;padding:12px;border-radius:12px;border:2px solid var(--primary);background:#EFF6FF;color:var(--primary);font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font);">🤖 AIに詳しく聞く</button>';
  el.scrollTop=0;
}

function initStudy(){
  makeFilter('studyFilterBar',studyF,'cat','setStudyCat');
  renderStudy();
}
function setStudyCat(c){studyF.cat=c;studyPage=0;makeFilter('studyFilterBar',studyF,'cat','setStudyCat');renderStudy();}
function renderStudy(){
  var qs=filterQ(studyF);
  var el=document.getElementById('studyCnt');if(el)el.textContent=qs.length+'問ヒット';
  var total=Math.ceil(qs.length/STUDY_PER);
  var pageQs=qs.slice(studyPage*STUDY_PER,(studyPage+1)*STUDY_PER);
  var list=document.getElementById('studyList');if(!list)return;
  if(!pageQs.length){list.innerHTML='<div style="padding:40px;text-align:center;color:var(--light);">該当する問題がありません</div>';return;}
  list.innerHTML=pageQs.map(q=>{
    var id='st'+q.year+q.no;
    return '<div class="q-card">'
      +'<div class="q-head" onclick="toggleSt(\''+id+'\')">'
      +'<div style="flex:1;">'
      +'<div style="margin-bottom:5px;">'
      +'<span class="chip" style="background:#FEF3C7;color:var(--amber);">'+q.year+'年</span>'
      +'<span class="chip" style="background:#EFF6FF;color:var(--primary);">'+q.category+'</span>'
      +(q.source?'<span class="chip" style="background:#F5F3FF;color:var(--purple);">AI</span>':'<span class="chip" style="background:#F0FDF4;color:var(--green);">本物</span>')
      +'</div>'
      +'<div style="font-size:13px;color:var(--text);line-height:1.7;">'+esc(q.question.slice(0,55))+'…</div></div>'
      +'<span id="arr'+id+'" style="color:var(--light);font-size:18px;">▼</span></div>'
      +'<div class="q-body" id="'+id+'">'
      +'<div style="font-size:13px;color:var(--text);line-height:1.8;padding:10px 0;">'+esc(q.question)+'</div>'
      +[1,2,3,4].map(n=>{
        var isA=n===q.answer;
        return '<div class="choice'+(isA?' correct':' dimmed')+'">'
          +'<div class="choice-num" style="background:'+(isA?'var(--green)':'var(--border)')+';color:'+(isA?'#fff':'var(--sub)')+';">'+(isA?'✓':n)+'</div>'
          +'<span>'+esc(q.choices[n])+'</span></div>';
      }).join('')
      +'<div class="expl"><div class="expl-title">📖 解説</div>'+esc(q.explanation)+'</div>'
      +'<button onclick="askQ(storeQ(q))" style="width:100%;margin-top:10px;padding:12px;border-radius:10px;border:none;background:var(--primary);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font);">🤖 AIに詳しく聞く</button>'
      +'</div></div>';
  }).join('');
  // ページネーション
  if(total>1){
    var pg='<div style="display:flex;justify-content:center;gap:7px;margin-top:12px;flex-wrap:wrap;">';
    for(var i=0;i<total;i++)pg+='<button onclick="studyPage='+i+';renderStudy();" style="width:36px;height:36px;border-radius:8px;border:2px solid '+(i===studyPage?'var(--primary)':'var(--border)')+';background:'+(i===studyPage?'var(--primary)':'#fff')+';color:'+(i===studyPage?'#fff':'var(--sub)')+';font-size:14px;font-weight:700;cursor:pointer;">'+(i+1)+'</button>';
    list.innerHTML+=pg+'</div>';
  }
}
function toggleSt(id){
  var b=document.getElementById(id),a=document.getElementById('arr'+id);
  if(!b)return;var o=b.classList.contains('open');
  b.classList.toggle('open',!o);if(a)a.textContent=o?'▼':'▲';
}
