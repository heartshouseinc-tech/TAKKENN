<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>宅建達人 AI Pro</title>
<style>
:root{
  --bg:#F7F9FC;--surface:#fff;--border:#E4E9F0;
  --primary:#2563EB;--green:#16A34A;--red:#DC2626;
  --amber:#D97706;--purple:#7C3AED;--teal:#0D9488;
  --text:#111827;--sub:#6B7280;--light:#9CA3AF;
  --font:'Hiragino Sans','Noto Sans JP','Yu Gothic',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;height:100dvh;display:flex;flex-direction:column;overflow:hidden;}
#loginWrap{position:fixed;inset:0;background:linear-gradient(160deg,#dbeafe,#eff6ff,#f0fdf4);display:flex;align-items:center;justify-content:center;padding:24px;z-index:9999;}
.login-box{background:var(--surface);padding:32px 24px;border-radius:20px;box-shadow:0 10px 25px rgba(0,0,0,0.05);width:100%;max-width:360px;text-align:center;}
.login-title{font-size:22px;font-weight:800;color:var(--primary);margin-bottom:8px;letter-spacing:-0.5px;}
.login-sub{font-size:12px;color:var(--sub);margin-bottom:24px;}
.input-group{width:100%;margin-bottom:14px;text-align:left;}
.input-lbl{font-size:11px;font-weight:700;color:var(--sub);margin-bottom:4px;display:block;}
.login-input{width:100%;padding:13px 14px;border:1.5px solid var(--border);border-radius:12px;font-size:15px;outline:none;font-family:inherit;background:var(--bg);}
.login-input:focus{border-color:var(--primary);background:#fff;}
.pwd-container{position:relative;display:flex;align-items:center;}
.pwd-container .login-input{padding-right:44px;}
.pwd-manage-btn{position:absolute;right:4px;top:50%;transform:translateY(-50%);width:36px;height:36px;border:none;background:transparent;color:var(--light);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;border-radius:50%;}
.pwd-manage-btn:active{background:rgba(0,0,0,0.05);color:var(--sub);}
.login-btn{width:100%;padding:14px;border:none;border-radius:12px;background:var(--primary);color:#fff;font-size:16px;font-weight:700;cursor:pointer;margin-top:10px;box-shadow:0 4px 12px rgba(37,99,235,0.2);}
.login-btn:active{opacity:0.9;}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.hdr-logo{font-size:18px;font-weight:900;color:var(--primary);letter-spacing:-0.5px;}
.hdr-stats{font-size:12px;color:var(--sub);font-weight:500;}
.tab-panel{display:none;flex:1;flex-direction:column;overflow:hidden;}
.tab-panel.active{display:flex;}
.scroll-content{flex:1;overflow-y:auto;padding:16px;position:relative;}
.nav-bar{background:var(--surface);border-top:1px solid var(--border);display:flex;height:64px;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom);}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--light);cursor:pointer;user-select:none;}
.nav-item.active{color:var(--primary);}
.nav-icon{font-size:20px;margin-bottom:3px;}
.nav-label{font-size:10px;font-weight:700;}
.quiz-card{background:var(--surface);border-radius:16px;border:1px solid var(--border);padding:16px;margin-bottom:12px;}
.q-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--sub);font-weight:700;margin-bottom:8px;}
.q-text{font-size:14.5px;line-height:1.6;font-weight:500;margin-bottom:16px;white-space:pre-wrap;}
.choice-list{display:flex;flex-direction:column;gap:8px;}
.choice-item{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:12px 14px;font-size:13.5px;line-height:1.5;cursor:pointer;display:flex;gap:10px;}
.choice-item.correct{background:#DCFCE7;border-color:var(--green);color:#166534;font-weight:700;}
.choice-item.wrong{background:#FEE2E2;border-color:var(--red);color:#991B1B;opacity:0.8;}
.choice-num{font-weight:700;color:var(--sub);flex-shrink:0;}
.choice-item.correct .choice-num{color:var(--green);}
.choice-item.wrong .choice-num{color:var(--red);}
.result-box{margin-top:16px;padding-top:16px;border-top:1px dashed var(--border);display:none;}
.res-status{font-size:16px;font-weight:800;margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.res-status.ok{color:var(--green);}
.res-status.ng{color:var(--red);}
.exp-text{font-size:13px;line-height:1.6;color:var(--text);background:var(--bg);padding:12px;border-radius:10px;margin-bottom:12px;}
.ai-ask-btn{width:100%;padding:10px;border:1px solid var(--purple);background:rgba(124,58,237,0.05);color:var(--purple);font-size:13px;font-weight:700;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;}
.filter-row{display:flex;gap:8px;margin-bottom:12px;flex-shrink:0;}
.select-box{flex:1;padding:10px;background:var(--surface);border:1px solid var(--border);border-radius:10px;font-size:13px;color:var(--text);font-weight:500;outline:none;}
.phrase-card{background:var(--surface);border-radius:12px;border:1px solid var(--border);padding:14px;margin-bottom:8px;}
.phrase-tag{font-size:10px;font-weight:700;color:var(--primary);margin-bottom:4px;}
.phrase-text{font-size:13.5px;line-height:1.6;color:var(--text);}
.phrase-btn{padding:6px 12px;font-size:11px;font-weight:700;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--sub);cursor:pointer;font-family:inherit;}
.phrase-btn:active{background:rgba(37,99,235,0.05);color:var(--primary);border-color:var(--primary);}
.chat-container{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}
.chat-msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;}
.msg-bubble{max-width:85%;padding:12px 14px;border-radius:16px;font-size:13.5px;line-height:1.6;white-space:pre-wrap;}
.msg-bubble.user{background:var(--primary);color:#fff;align-self:flex-end;border-bottom-right-radius:2px;}
.msg-bubble.ai{background:var(--surface);color:var(--text);border:1px solid var(--border);align-self:flex-start;border-bottom-left-radius:2px;}
.chat-input-row{background:var(--surface);border-top:1px solid var(--border);padding:10px 12px;display:flex;gap:8px;align-items:center;padding-bottom:calc(10px + env(safe-area-inset-bottom));}
.chat-txa{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:8px 14px;font-size:14px;font-family:inherit;outline:none;resize:none;max-height:80px;height:38px;}
.chat-send{width:38px;height:38px;border-radius:50%;background:var(--primary);border:none;color:#fff;font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.empty-state{text-align:center;padding:40px 20px;font-size:13px;color:var(--light);}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);color:#fff;padding:8px 16px;border-radius:20px;font-size:12px;z-index:9999;opacity:0;transition:opacity 0.2s;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;}
</style>
</head>
<body>
<div id="loginWrap">
  <div class="login-box">
    <div class="login-title">宅建達人 AI Pro</div>
    <div class="login-sub">メールアドレスと仮パスワードを入力</div>
    <div class="input-group">
      <span class="input-lbl">メールアドレス</span>
      <input type="email" id="emailInput" class="login-input" placeholder="example@domain.com" autocomplete="username">
    </div>
    <div class="input-group">
      <span class="input-lbl">仮パスワード</span>
      <div class="pwd-container">
        <input type="password" id="passInput" class="login-input" placeholder="Temporary Password" autocomplete="current-password">
        <button type="button" class="pwd-manage-btn" id="pwdToggleBtn" onclick="togglePasswordVisibility()">👁️</button>
      </div>
    </div>
    <button class="login-btn" onclick="checkAuth()">ログイン</button>
  </div>
</div>
<div class="header">
  <div class="hdr-logo">宅建達人 AI Pro</div>
  <div class="hdr-stats" id="hdrStats">正解率: --% (0/0)</div>
</div>
<div id="panel-0" class="tab-panel active">
  <div class="filter-row" style="padding:12px 16px 0 16px;">
    <select class="select-box" id="quizCatSel" onchange="renderQuizList()">
      <option value="all">すべての科目</option>
      <option value="権利関係">権利関係</option>
      <option value="宅建業法">宅建業法</option>
    </select>
  </div>
  <div class="scroll-content" id="quizContainer"></div>
</div>
<div id="panel-1" class="tab-panel">
  <div class="filter-row" style="padding:12px 16px 0 16px;">
    <select class="select-box" id="correctCatSel" onchange="renderCorrectPhrases()">
      <option value="all">すべての科目</option>
      <option value="権利関係">権利関係</option>
      <option value="宅建業法">宅建業法</option>
    </select>
  </div>
  <div class="scroll-content" id="correctList"></div>
</div>
<div id="panel-2" class="tab-panel">
  <div class="chat-container">
    <div class="chat-msgs" id="chatMsgs"></div>
    <div class="chat-input-row">
      <textarea class="chat-txa" id="aiInput" rows="1" placeholder="AIに宅建の疑問を聞く..."></textarea>
      <button class="chat-send" onclick="sendAIChat()">➔</button>
    </div>
  </div>
</div>
<div class="nav-bar">
  <div class="nav-item active" onclick="switchTab(0)">
    <span class="nav-icon">📝</span>
    <span class="nav-label">四肢択一</span>
  </div>
  <div class="nav-item" onclick="switchTab(1)">
    <span class="nav-icon">✨</span>
    <span class="nav-label">正文ノック</span>
  </div>
  <div class="nav-item" onclick="switchTab(2)">
    <span class="nav-icon">🤖</span>
    <span class="nav-label">AI相談</span>
  </div>
</div>
<div id="toast"></div>
<script>
var EP = 'https://us-central1-kensetsu-nippo-842a2.cloudfunctions.net/askAI';
var KEY = 'HeartsHouse2026Key'; 
var stats = { correct: 0, total: 0 };
var messages = [];
var MOCK_DATA = [
  {
    year: 2022, no: 4, category: "権利関係",
    question: "AがBから土地を購入する契約を結んだが、Bがその土地をCにも二重売買し、Cが先に登記を備えてしまった。この場合に関する次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。",
    choices: {
      1: "Cが二重売買の事実を知っていた（悪意）としても、背信的悪意者と認められない限り、AはCに対して土地の所有権を主張できない。",
      2: "CがBの裏切りを積極的にそそのかしたような背信的悪意者である場合、Aは登記がなくてもCに所有権を主張できる。",
      3: "Aが先に土地の引き渡しを受けて占有していたとしても、Cが先に登記を備えた以上、Cが原則として所有権を対抗できる。",
      4: "BがCに売却して登記を移した後は、AはBに対して履行不能による契約解除をすることはできるが、損害賠償請求はできない。"
    },
    answer: 4,
    explanation: "二重売買によって履行不能となった場合、買主Aは売主Bに対して契約の解除だけでなく、損害賠償請求も行うことができます（民法415条、542条）。したがって肢4が「損害賠償請求はできない」とする点が誤りです。",
    keywords: ["二重売買", "不動産登記", "履行不能", "背信的悪意者"]
  },
  {
    year: 2023, no: 8, category: "権利関係",
    question: "賃貸借契約に関する次の記述のうち、民法の規定及び判例によれば、誤っているものはどれか。",
    choices: {
      1: "賃借人が適法に賃貸物を転貸したときは、転借人は賃貸人に対して直接に義務を負う。",
      2: "賃貸借契約が終了した場合において、賃借人が支出した有益費の償還を賃貸人に請求するときは、賃貸借の終了時に支出した時から直ちに請求できる。",
      3: "売買契約において、買主が売主に解約手付を交付した場合、売主が契約の履行に着手するまでは、買主はその手付を放棄して契約を解除することができる。",
      4: "賃貸借契約の目的物の返還後に賃借人の債務不履行が判明した場合、敷金は当然には債務不履行による損害賠償債務には充当されない。"
    },
    answer: 2,
    explanation: "有益費は賃貸借終了時に賃貸人の選択により償還（民法608条2項）。「支出した時から直ちに」請求できるのは必要費のみ（同条1項）。よって肢2が誤り。",
    keywords: ["有益費", "必要費", "賃貸借"]
  },
  {
    year: 2021, no: 37, category: "宅建業法",
    question: "宅地建物取引業者が行う宅地建物取引業法第35条に規定する重要事項の説明に関する次の記述のうち、正しいものはどれか。",
    choices: {
      1: "区分所有建物の売買の媒介を行う場合、当該1棟の建物及びその敷地の管理が委託されているときは、その委託を受けている者の氏名及び住所を説明しなければならない。",
      2: "建物の売買の媒介を行う場合、当該建物について、石綿の使用の有無の調査の結果が記録されているときは、その内容を説明しなければならないが、調査が行われていない場合には調査を実施した上で説明しなければならない。",
      3: "建物の売買の媒介を行う場合、当該建物が既存の建物であるときは、建物状況調査を実施した上で、その結果を説明しなければならない。",
      4: "宅地の売買の媒介を行う場合、移転登記の申請時期については説明の対象とならないが、代金以外に授受される金銭の額については説明しなければならない。"
    },
    answer: 1,
    explanation: "区分所有建物の管理が委託されている場合、その委託を受けている者の氏名（商号・名称）および住所（主たる事務所の所在地）は重要事項説明の対象です（宅建業法35条1項、同法施行規則16条の2）。よって肢1が正しい。",
    keywords: ["重要事項説明", "35条書面", "区分所有建物", "管理委託"]
  }
];
function esc(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
var _t;
function showToast(m) { var t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); clearTimeout(_t); _t = setTimeout(function() { t.classList.remove('show'); }, 2000); }
window.addEventListener('DOMContentLoaded', function() {
  if (localStorage.getItem('hh_auth_logged') === 'true') {
    document.getElementById('loginWrap').style.display = 'none';
    initApp();
  }
});
function togglePasswordVisibility() {
  var pInp = document.getElementById('passInput');
  var pBtn = document.getElementById('pwdToggleBtn');
  if (pInp.type === 'password') {
    pInp.type = 'text';
    pBtn.textContent = '🙈';
  } else {
    pInp.type = 'password';
    pBtn.textContent = '👁️';
  }
}
function checkAuth() {
  var mail = document.getElementById('emailInput').value.trim();
  var pass = document.getElementById('passInput').value.trim();
  if (!mail || !pass) {
    alert('メールアドレスとパスワードを入力してください');
    return;
  }
  localStorage.setItem('hh_auth_logged', 'true');
  document.getElementById('loginWrap').style.display = 'none';
  initApp();
}
function initApp() {
  renderQuizList();
  renderCorrectPhrases();
  initChat();
}
function switchTab(idx) {
  document.querySelectorAll('.nav-item').forEach(function(el, i) {
    el.classList.toggle('active', i === idx);
  });
  document.querySelectorAll('.tab-panel').forEach(function(el, i) {
    el.classList.toggle('active', i === idx);
  });
}
function updateStats() {
  var el = document.getElementById('hdrStats');
  if (stats.total === 0) {
    el.textContent = '正解率: --% (0/0)';
  } else {
    var rate = Math.round((stats.correct / stats.total) * 100);
    el.textContent = '正解率: ' + rate + '% (' + stats.correct + '/' + stats.total + ')';
  }
}
function renderQuizList() {
  var container = document.getElementById('quizContainer');
  if (!container) return;
  container.innerHTML = '';
  var cat = document.getElementById('quizCatSel').value;
  var filtered = MOCK_DATA.filter(function(q) {
    return cat === 'all' || q.category === cat;
  });
  filtered.forEach(function(q, idx) {
    var card = document.createElement('div');
    card.className = 'quiz-card';
    card.id = 'q-card-' + idx;
    var choicesHtml = '';
    for (var key in q.choices) {
      choicesHtml += '<div class="choice-item" onclick="selectChoice(' + idx + ', ' + key + ', this)">' +
        '<span class="choice-num">' + key + '.</span>' +
        '<span>' + esc(q.choices[key]) + '</span>' +
        '</div>';
    }
    card.innerHTML = 
      '<div class="q-meta"><span>' + esc(q.category) + '</span><span>' + q.year + '年 問' + q.no + '</span></div>' +
      '<div class="q-text">' + esc(q.question) + '</div>' +
      '<div class="choice-list">' + choicesHtml + '</div>' +
      '<div class="result-box" id="res-box-' + idx + '">' +
        '<div class="res-status" id="res-status-' + idx + '"></div>' +
        '<div class="exp-text"><strong>【解説】</strong><br>' + esc(q.explanation) + '</div>' +
        '<button class="ai-ask-btn" onclick="askAIForQuiz(' + idx + ')">🤖 この問題をAIに詳しく解説してもらう</button>' +
      '</div>';
    container.appendChild(card);
  });
}
function selectChoice(qIdx, choiceKey, el) {
  var card = document.getElementById('q-card-' + qIdx);
  if (card.getAttribute('data-answered')) return;
  card.setAttribute('data-answered', 'true');
  var q = MOCK_DATA[qIdx];
  var isCorrect = (choiceKey === q.answer);
  stats.total++;
  if (isCorrect) stats.correct++;
  updateStats();
  var items = card.querySelectorAll('.choice-item');
  items.forEach(function(item, i) {
    var k = i + 1;
    if (k === q.answer) item.classList.add('correct');
    if (k === choiceKey && !isCorrect) item.classList.add('wrong');
  });
  var resBox = document.getElementById('res-box-' + qIdx);
  var resStatus = document.getElementById('res-status-' + qIdx);
  resBox.style.display = 'block';
  if (isCorrect) {
    resStatus.className = 'res-status ok';
    resStatus.innerHTML = '⭕ 正解！';
  } else {
    resStatus.className = 'res-status ng';
    resStatus.innerHTML = '❌ 不正解（正解は ' + q.answer + '）';
  }
}
function renderCorrectPhrases() {
  var list = document.getElementById('correctList');
  if (!list) return;
  list.innerHTML = '';
  var cat = document.getElementById('correctCatSel').value;
  var filtered = MOCK_DATA.filter(function(q) {
    return cat === 'all' || q.category === cat;
  });
  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-state">該当するデータがありません</div>';
    return;
  }
  filtered.forEach(function(q) {
    var correctIdx = q.answer;
    var phrase = q.choices[correctIdx];
    if (!phrase) return;
    var card = document.createElement('div');
    card.className = 'phrase-card';
    card.innerHTML = 
      '<div class="phrase-tag">' + esc(q.category) + '（' + q.year + '年 問' + q.no + '）</div>' +
      '<div class="phrase-text">' + esc(phrase) + '</div>' +
      '<div style="display:flex; justify-content:flex-end; margin-top:8px;">' +
        '<button class="phrase-btn">💡 AIに詳しく聞く</button>' +
      '</div>';
    var btn = card.querySelector('.phrase-btn');
    if (btn) {
      btn.onclick = function() {
        switchTab(2);
        var aiInput = document.getElementById('aiInput');
        if (aiInput) {
          aiInput.value = '宅建試験の過去問から、以下の正しい記述（正文）について、なぜこれが正しいのか根拠となる民法や宅建業法のルールを分かりやすく解説してください。\n\n' +
                          '【問題背景】' + q.year + '年 問' + q.no + '（' + q.category + '）\n' +
                          '【記述】' + phrase;
          sendAIChat();
        }
      };
    }
    list.appendChild(card);
  });
}
function askAIForQuiz(idx) {
  var q = MOCK_DATA[idx];
  switchTab(2);
  var aiInput = document.getElementById('aiInput');
  if (aiInput) {
    aiInput.value = '宅建過去問の解説をお願いします。\n\n' +
                    '【問題】' + q.year + '年 問' + q.no + ' (' + q.category + ')\n' + q.question + '\n\n' +
                    '【正解】' + q.answer + '\n' +
                    '【解説】' + q.explanation + '\n\n' +
                    'この問題のひっかけポイントや、周辺知識を深く解説してください。';
    sendAIChat();
  }
}
function initChat() {
  var chat = document.getElementById('chatMsgs');
  if (!chat) return;
  chat.innerHTML = '';
  appendMsg('ai', '宅建達人 AIアシスタントです！🎓\n権利関係の民法から宅建業法、法令上の制限まで、過去問に関する疑問やひっかけ対策など、なんでも気軽に聞いてください。');
}
function appendMsg(role, text) {
  var chat = document.getElementById('chatMsgs');
  if (!chat) return;
  var b = document.createElement('div');
  b.className = 'msg-bubble ' + role;
  b.textContent = text;
  chat.appendChild(b);
  chat.scrollTop = chat.scrollHeight;
}
async function sendAIChat() {
  var inp = document.getElementById('aiInput');
  if (!inp) return;
  var text = inp.value.trim();
  if (!text) return;
  appendMsg('user', text);
  inp.value = '';
  inp.style.height = '38px';
  appendMsg('ai', '思考中...');
  var msgs = document.getElementById('chatMsgs');
  var lastAiBubble = msgs.lastChild;
  try {
    var systemPrompt = 'あなたは宅建（宅地建物取引士）国家試験の合格へと導くプロフェッショナルAI講師です。' +
                       '受験生が過去問のひっかけに惑わされないよう、法律（民法、宅建業法など）の条文や判例をベースに、具体的でわかりやすい解説を行ってください。';
    var body = {
      model: 'gemini-2.5-flash',
      mode: 'normal',
      prompt: systemPrompt + '\n\nユーザーの質問:\n' + text,
      useSearch: false,
      useCache: false
    };
    var r = await fetch(EP, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-access-key': KEY
      },
      body: JSON.stringify(body)
    });
    var d = await r.json().catch(function() { return {}; });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    var aiResponse = d?.data?.text || d?.candidates?.[0]?.content?.parts?.[0]?.text || d?.text || '申し訳ありません、解説の取得に失敗しました。';
    lastAiBubble.textContent = aiResponse;
    document.getElementById('chatMsgs').scrollTop = document.getElementById('chatMsgs').scrollHeight;
  } catch (e) {
    lastAiBubble.textContent = '❌ エラーが発生しました: ' + e.message;
  }
}
var txa = document.getElementById('aiInput');
if (txa) {
  txa.oninput = function() {
    this.style.height = '38px';
    this.style.height = Math.min(this.scrollHeight, 80) + 'px';
  };
}
</script>
